repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Local hooks — gate types and tests on push so a broken tree can't land.
  # Pre-commit (file-by-file) runs ruff. Pre-push runs the slow checks.
  - repo: local
    hooks:
      - id: conventional-commit
        name: Conventional Commits subject
        entry: scripts/check-commit-msg.sh
        language: system
        stages: [commit-msg]
      - id: mypy
        name: mypy (src)
        entry: mypy
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: build-wheel
        name: python -m build (sdist + wheel)
        entry: python -m build --sdist --wheel
        language: system
        pass_filenames: false
        stages: [pre-push]
