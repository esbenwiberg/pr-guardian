<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PR Guardian — Review Wizard (Prototype G)</title>
<style>
  :root {
    --bg: #0b1220;
    --panel: rgba(15,23,42,0.55);
    --panel-2: rgba(15,23,42,0.35);
    --border: rgba(51,65,85,0.55);
    --text: #e2e8f0;
    --muted: #94a3b8;
    --dim: #64748b;
    --indigo: #a5b4fc;
    --indigo-bg: rgba(99,102,241,0.15);
    --green: #34d399;
    --orange: #fb923c;
    --red: #f87171;
    --yellow: #facc15;
    --blue: #60a5fa;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif; font-size: 15px; line-height: 1.65; }
  .mono, code, pre { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  a { color: var(--indigo); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; height: 56px; padding: 0 24px; border-bottom: 1px solid var(--border); background: rgba(11,18,32,0.92); backdrop-filter: blur(8px); font-size: 13px; }
  .crumbs { color: var(--muted); }
  .crumbs strong { color: var(--text); font-weight: 600; }
  .crumbs span.sep { color: var(--dim); margin: 0 6px; }
  .verdict-chip { display: inline-flex; align-items: center; gap: 8px; padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; background: rgba(234,179,8,0.10); color: var(--yellow); border: 1px solid rgba(234,179,8,0.3); }

  /* Step pips */
  #pips-nav { position: sticky; top: 56px; z-index: 9; padding: 14px 24px; border-bottom: 1px solid var(--border); background: rgba(11,18,32,0.90); backdrop-filter: blur(8px); }
  .pips { max-width: 920px; margin: 0 auto; display: flex; align-items: center; gap: 6px; }
  .pip { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 12.5px; color: var(--muted); border: 1px solid transparent; user-select: none; transition: background 0.12s, color 0.12s, border-color 0.12s; }
  .pip:hover { background: rgba(255,255,255,0.04); color: var(--text); }
  .pip.active { background: var(--indigo-bg); color: var(--indigo); border-color: rgba(99,102,241,0.4); font-weight: 600; }
  .pip.done { color: var(--dim); }
  .pip.done .pip-num { background: rgba(16,185,129,0.15); color: var(--green); }
  .pip-num { width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; background: rgba(51,65,85,0.5); color: var(--muted); }
  .pip.active .pip-num { background: rgba(99,102,241,0.25); color: var(--indigo); }
  .pip-sep { width: 18px; height: 1px; background: var(--border); flex-shrink: 0; }

  /* Step body */
  main { max-width: 760px; margin: 0 auto; padding: 36px 24px 30px; min-height: 60vh; }

  .eyebrow { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
  h1.step-title { font-size: 28px; font-weight: 600; margin: 0 0 12px; letter-spacing: -0.01em; line-height: 1.22; }
  .subtitle { color: var(--muted); margin: 0 0 26px; font-size: 15px; font-style: italic; }
  .stats { display: flex; gap: 18px; flex-wrap: wrap; padding: 12px 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin-bottom: 32px; font-size: 13px; color: var(--muted); }
  .stats span strong { color: var(--text); font-weight: 600; }

  /* Briefing W/W/H */
  .wwh { margin-bottom: 32px; }
  .wwh-block { margin-bottom: 22px; }
  .wwh-block:last-child { margin-bottom: 0; }
  .wwh-label { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--dim); margin-bottom: 6px; }
  .wwh p { margin: 0 0 10px; font-size: 15px; line-height: 1.7; color: #d6dde8; }
  .wwh p:last-child { margin-bottom: 0; }
  .wwh code { background: rgba(148,163,184,0.10); padding: 1px 5px; border-radius: 3px; font-size: 0.86em; color: var(--text); }
  .wwh em { color: var(--text); font-style: italic; }
  .wwh strong { color: var(--text); }

  /* Capability map preview (in briefing) */
  .cap-preview { padding: 18px 22px; border: 1px solid var(--border); border-radius: 10px; background: var(--panel-2); margin-top: 22px; }
  .cap-preview-label { font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 12px; }
  .cap-preview-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-size: 13.5px; }
  .cap-preview-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cap-preview-dot.has { background: var(--orange); }
  .cap-preview-dot.clean { background: var(--green); }
  .cap-preview-name { flex: 1; color: var(--text); }
  .cap-preview-meta { color: var(--dim); font-size: 12px; }
  .cap-preview-tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; }
  .cap-preview-tag.has { background: rgba(251,146,60,0.12); color: var(--orange); }
  .cap-preview-tag.clean { background: rgba(16,185,129,0.10); color: var(--green); }

  /* Capability step header */
  .cap-intent { font-size: 16px; line-height: 1.7; color: #d6dde8; margin: 0 0 28px; }
  .cap-intent code { background: rgba(148,163,184,0.10); padding: 1px 5px; border-radius: 3px; font-size: 0.86em; color: var(--text); }
  .cap-intent em { color: var(--text); font-style: italic; }
  .cap-intent strong { color: var(--text); }

  /* Concern card */
  .concern { padding: 18px 20px; border-radius: 10px; background: rgba(2,6,23,0.4); border: 1px solid var(--border); border-left: 3px solid var(--border); margin-bottom: 16px; transition: border-color 0.15s, background 0.15s; }
  .concern.sev-low { border-left-color: var(--blue); }
  .concern.sev-medium { border-left-color: var(--yellow); }
  .concern.sev-high { border-left-color: var(--orange); }
  .concern.sev-critical { border-left-color: var(--red); }
  .concern.decided-accepted { background: rgba(99,102,241,0.04); }
  .concern.decided-fix { background: rgba(249,115,22,0.04); }
  .concern.decided-dismissed { opacity: 0.55; }
  .concern-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
  .concern-head h3 { margin: 0; font-size: 16px; font-weight: 600; color: var(--text); flex: 1; min-width: 0; }
  .pill { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; }
  .pill.sev-low      { background: rgba(59,130,246,0.12); color: var(--blue); }
  .pill.sev-medium   { background: rgba(234,179,8,0.10); color: var(--yellow); }
  .pill.sev-high     { background: rgba(249,115,22,0.12); color: var(--orange); }
  .pill.sev-critical { background: rgba(239,68,68,0.12); color: var(--red); }
  .pill.cwe { background: rgba(148,163,184,0.10); color: var(--muted); font-family: ui-monospace, monospace; font-weight: 500; }
  .pill.muted { background: rgba(100,116,139,0.15); color: var(--muted); font-weight: 500; }
  .decided-tag { font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; }
  .decided-tag.accepted { background: rgba(99,102,241,0.18); color: var(--indigo); }
  .decided-tag.fix { background: rgba(249,115,22,0.15); color: var(--orange); }
  .decided-tag.dismissed { background: rgba(100,116,139,0.18); color: var(--muted); }

  .concern-prose { font-size: 14.5px; line-height: 1.65; color: #d6dde8; }
  .concern-prose p { margin: 0 0 8px; }
  .concern-prose p:last-child { margin-bottom: 0; }
  .concern-prose code { background: rgba(148,163,184,0.10); padding: 1px 5px; border-radius: 3px; font-size: 12.5px; color: var(--text); }

  details.expander { margin-top: 8px; }
  details.expander summary { cursor: pointer; font-size: 12.5px; color: var(--indigo); padding: 4px 0; display: inline-block; list-style: none; user-select: none; }
  details.expander summary::-webkit-details-marker { display: none; }
  details.expander summary::before { content: "▸ "; color: var(--dim); }
  details.expander[open] summary::before { content: "▾ "; }
  details.expander summary:hover { color: #c7d2fe; }

  .hunk { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: rgba(2,6,23,0.6); margin-top: 8px; font-family: ui-monospace, monospace; }
  .hunk-header { font-size: 11px; padding: 5px 12px; color: var(--muted); background: rgba(30,41,59,0.6); border-bottom: 1px solid var(--border); }
  .hunk pre { margin: 0; padding: 8px 0; font-size: 12.5px; line-height: 1.55; overflow-x: auto; }
  .hunk .row { display: flex; padding: 0 4px; white-space: pre; }
  .hunk .ln { width: 38px; text-align: right; padding-right: 10px; color: rgba(148,163,184,0.4); user-select: none; flex-shrink: 0; }
  .hunk .marker { width: 14px; user-select: none; flex-shrink: 0; color: var(--dim); }
  .hunk .add { background: rgba(16,185,129,0.07); }
  .hunk .add .content, .hunk .add .marker { color: #6ee7b7; }
  .hunk .del { background: rgba(239,68,68,0.07); }
  .hunk .del .content, .hunk .del .marker { color: #fca5a5; }
  .hunk .ctx .content { color: #cbd5e1; }

  .fix-hint { margin-top: 8px; padding: 11px 13px; border-radius: 6px; background: rgba(16,185,129,0.04); border: 1px solid rgba(16,185,129,0.2); font-size: 13px; line-height: 1.6; color: #d6dde8; }
  .fix-hint strong { color: var(--green); display: block; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; }

  /* Per-concern action buttons */
  .concern-actions { display: flex; gap: 6px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .concern-actions button { font-family: inherit; font-size: 12.5px; font-weight: 600; padding: 6px 11px; border-radius: 6px; border: 1px solid var(--border); background: rgba(30,41,59,0.6); color: var(--text); cursor: pointer; }
  .concern-actions button.primary    { background: rgba(99,102,241,0.18); border-color: rgba(99,102,241,0.5); color: var(--indigo); }
  .concern-actions button.primary:hover { background: rgba(99,102,241,0.28); }
  .concern-actions button:hover { background: rgba(51,65,85,0.7); }
  .concern-actions button.active     { background: rgba(99,102,241,0.28); border-color: rgba(99,102,241,0.6); }
  .concern-actions button.danger.active { background: rgba(249,115,22,0.18); border-color: rgba(249,115,22,0.5); color: var(--orange); }
  .concern-actions button.ghost.active  { background: rgba(100,116,139,0.18); border-color: rgba(100,116,139,0.4); color: var(--muted); }
  .concern-actions button.ghost { background: transparent; }
  .concern-actions .clear { margin-left: auto; font-size: 11.5px; color: var(--dim); background: transparent; border: 0; cursor: pointer; padding: 4px 6px; }
  .concern-actions .clear:hover { color: var(--muted); }

  /* Wrap-up */
  .summary-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 24px; }
  @media (max-width: 600px) { .summary-grid { grid-template-columns: 1fr 1fr; } }
  .summary-card { padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--panel-2); }
  .summary-card .num { font-size: 22px; font-weight: 600; color: var(--text); }
  .summary-card .lbl { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); margin-top: 2px; }
  .summary-card.accept .num  { color: var(--indigo); }
  .summary-card.fix .num     { color: var(--orange); }
  .summary-card.dismiss .num { color: var(--muted); }
  .summary-card.pending .num { color: var(--yellow); }

  .also-reviewed { padding: 14px 18px; border: 1px dashed var(--border); border-radius: 8px; background: rgba(15,23,42,0.4); font-size: 13px; line-height: 1.6; color: var(--muted); margin-bottom: 18px; }
  .also-reviewed strong { color: var(--text); }
  .noise-line { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
  .noise-line strong { color: var(--text); }

  .comment-label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 8px; }
  .comment-box { width: 100%; min-height: 110px; padding: 12px 14px; background: rgba(2,6,23,0.5); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.55; resize: vertical; }
  .comment-box:focus { outline: none; border-color: rgba(99,102,241,0.5); }

  .final-actions { display: flex; gap: 8px; margin-top: 22px; flex-wrap: wrap; }
  .final-actions button { font-family: inherit; font-size: 14px; font-weight: 600; padding: 10px 18px; border-radius: 8px; border: 1px solid var(--border); background: rgba(30,41,59,0.6); color: var(--text); cursor: pointer; }
  .final-actions button.primary { background: rgba(99,102,241,0.18); border-color: rgba(99,102,241,0.5); color: var(--indigo); }
  .final-actions button.danger  { background: rgba(239,68,68,0.10); border-color: rgba(239,68,68,0.4); color: var(--red); }
  .final-actions button:hover { filter: brightness(1.15); }

  /* Footer nav (back / next) */
  footer#nav { position: sticky; bottom: 0; z-index: 9; padding: 12px 24px; border-top: 1px solid var(--border); background: rgba(11,18,32,0.92); backdrop-filter: blur(8px); }
  .nav-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .nav-inner button { font-family: inherit; font-size: 13.5px; font-weight: 600; padding: 9px 16px; border-radius: 8px; border: 1px solid var(--border); background: rgba(30,41,59,0.6); color: var(--text); cursor: pointer; }
  .nav-inner button.primary { background: rgba(99,102,241,0.18); border-color: rgba(99,102,241,0.5); color: var(--indigo); }
  .nav-inner button:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav-inner button:hover:not(:disabled) { filter: brightness(1.15); }
  .nav-status { font-size: 12px; color: var(--muted); }

  /* Loading overlay */
  #loading-overlay { position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: var(--bg); }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.2); border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-title { font-size: 17px; font-weight: 600; color: var(--text); }
  .loading-hint { font-size: 13px; color: var(--muted); margin-top: 4px; text-align: center; max-width: 320px; line-height: 1.55; }
  .loading-phase { font-size: 11px; color: var(--dim); margin-top: 8px; min-height: 1.4em; letter-spacing: 0.04em; }
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-title">Building your review wizard…</div>
  <p class="loading-hint">Clustering capabilities with AI. This can take up to 30 seconds on the first load.</p>
  <div class="loading-phase" id="loading-phase">Loading review data…</div>
</div>

<header>
  <div class="crumbs">
    <a href="/reviews">Reviews</a>
    <span class="sep">/</span>
    <a id="hdr-review-link" href="#">Findings</a>
    <span class="sep">/</span>
    <strong>Wizard</strong>
  </div>
  <a id="hdr-chapter-link" href="#" class="verdict-chip" style="background: rgba(99,102,241,0.10); color: var(--indigo); border-color: rgba(99,102,241,0.3); text-decoration: none;">Switch to Chapters →</a>
</header>

<nav id="pips-nav"></nav>
<main id="step"></main>
<footer id="nav"></footer>

<script src="/static/review-helpers.js"></script>
<script>
const { SEV_ORDER, detectRole, escapeHtml } = window.PRG;
const PATH_PARTS = window.location.pathname.split('/');
const REVIEW_ID = PATH_PARTS[PATH_PARTS.indexOf('reviews') + 1];

const ROLE_TO_LAYER = {
  PRODUCTION: 'Code', TEST: 'Tests', INFRA: 'Infra', DOCS: 'Docs',
  CONFIG: 'Config', BUILD: 'Build', DEPENDENCY: 'Deps', GENERATED: 'Generated'
};

// First-sentence-as-question, rest-as-reasoning split.
function splitQuestion(text) {
  if (!text) return { q: 'Concern', rest: [] };
  const t = text.trim();
  const m = t.match(/^(.+?[.!?])(\s+)(.+)$/s);
  if (!m) return { q: t, rest: [] };
  const rest = m[3].trim().split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
  return { q: m[1].trim(), rest };
}

// Extract a minimal hunk for the finding from the file's patch.
// Parse a unified diff patch once into a flat list of { type, n, text }
// rows with line numbers resolved against the new file. Hunk extraction
// for a given finding then becomes a cheap filter.
function parsePatchLines(patch) {
  if (!patch) return { header: '', rows: [] };
  let header = '';
  let cursor = 0;
  const rows = [];
  for (const ln of patch.split('\n')) {
    if (ln.startsWith('@@')) {
      header = ln;
      const m = ln.match(/\+(\d+)/);
      if (m) cursor = parseInt(m[1], 10) - 1;
      continue;
    }
    if (ln === '\\ No newline at end of file') continue;
    let type = 'ctx';
    let advance = true;
    if (ln.startsWith('+')) type = 'add';
    else if (ln.startsWith('-')) { type = 'del'; advance = false; }
    if (advance) cursor += 1;
    rows.push({ type, n: type === 'del' ? null : cursor, text: ln.slice(1) });
  }
  return { header, rows };
}

function extractHunkAroundLine(parsed, findingLine) {
  if (!parsed || !findingLine) return null;
  const captured = parsed.rows.filter(r => r.n != null && Math.abs(r.n - findingLine) <= 4);
  if (!captured.length) return null;
  return { header: parsed.header, lines: captured.slice(0, 12) };
}

function buildCapabilitiesAndDecisions(reviewData, diffData, capsData) {
  const files = (diffData?.files) || [];

  // Only `decision`-class findings become wizard concerns. `fyi` and
  // `noise` (including dismissed) findings are kept for the wrap-up
  // counts but never surfaced as a per-concern card.
  const findingsByFile = {};
  for (const agent of (reviewData.agent_results || [])) {
    for (const f of (agent.findings || [])) {
      if (!f.file || f.triage !== "decision") continue;
      if (!findingsByFile[f.file]) findingsByFile[f.file] = [];
      findingsByFile[f.file].push({ ...f, agent_name: agent.agent_name });
    }
  }
  const parsedPatchByPath = {};
  for (const f of files) parsedPatchByPath[f.path] = parsePatchLines(f.patch || '');

  const annotated = files.map(f => ({
    ...f,
    role: detectRole(f.path),
    locs: (f.additions || 0) + (f.deletions || 0),
    findings: findingsByFile[f.path] || [],
  }));
  const fileByPath = {};
  for (const f of annotated) fileByPath[f.path] = f;

  // Group files into capabilities. Prefer the LLM clusters from /capabilities
  // (Phase 3a) when they validated successfully; otherwise fall back to the
  // path-prefix heuristic.
  const groups = {};
  const groupOrder = [];
  const groupNames = {};   // prefix → display name (LLM may name capabilities richly)
  const groupIntents = {}; // prefix → LLM-supplied intent text

  if (capsData?.source === "llm" && Array.isArray(capsData.capabilities) && capsData.capabilities.length) {
    capsData.capabilities.forEach((cap, idx) => {
      const key = `llm-${idx}`;
      const bucket = [];
      for (const path of (cap.files || [])) {
        // Use the real diff entry when available. When the diff endpoint failed
        // (e.g. expired platform credentials), fileByPath is empty — create a
        // synthetic stub so LLM clusters still render and are walkable.
        bucket.push(fileByPath[path] || {
          path,
          role: detectRole(path),
          locs: 0,
          additions: 0,
          deletions: 0,
          findings: findingsByFile[path] || [],
        });
      }
      if (!bucket.length) return;
      groups[key] = bucket;
      groupOrder.push(key);
      groupNames[key] = cap.name || `Capability ${idx + 1}`;
      groupIntents[key] = cap.intent || '';
    });
    // Any diff file the LLM didn't assign to a capability gets bundled into
    // a final "Other" group (defensive — server-side validation should already
    // prevent this, but guards against any mismatch).
    const claimed = new Set(Object.values(groups).flat().map(f => f.path));
    const orphans = annotated.filter(f => !claimed.has(f.path));
    if (orphans.length) {
      const key = `llm-other`;
      groups[key] = orphans;
      groupOrder.push(key);
      groupNames[key] = "Other";
      groupIntents[key] = "Files the clusterer didn't assign to a named capability.";
    }
  } else {
    // Path-prefix fallback. Also pulls in files that only appear in stored
    // findings (i.e. when the diff endpoint was unavailable), so capability
    // steps still render even when live platform access has expired.
    const diffPaths = new Set(annotated.map(f => f.path));
    const fallbackFiles = [
      ...annotated,
      ...Object.keys(findingsByFile)
        .filter(p => !diffPaths.has(p))
        .map(p => ({
          path: p,
          role: detectRole(p),
          locs: 0,
          additions: 0,
          deletions: 0,
          findings: findingsByFile[p],
        })),
    ];
    for (const f of fallbackFiles) {
      const parts = f.path.split('/');
      const prefix = parts.length > 2 ? parts.slice(0, 2).join('/') : (parts[0] || 'root');
      if (!groups[prefix]) { groups[prefix] = []; groupOrder.push(prefix); }
      groups[prefix].push(f);
    }
  }

  // Build capabilities + a parallel map { capId → {files, findings} } so the
  // capability objects exposed to the renderer stay clean (no internal
  // bookkeeping fields to drop later).
  const capContents = {};
  const capabilities = groupOrder.map((groupKey, idx) => {
    const fs = groups[groupKey];
    const findings = fs.flatMap(f => f.findings);
    const layers = Array.from(new Set(fs.map(f => ROLE_TO_LAYER[f.role] || 'Code')));
    const locs = fs.reduce((s, f) => s + f.locs, 0);
    const id = `cap-${idx + 1}`;
    capContents[id] = { files: fs, findings };
    const name = groupNames[groupKey] || groupKey;
    const intent = groupIntents[groupKey]
      || `${fs.length} file${fs.length === 1 ? '' : 's'} touching ${layers.join(' / ')} (${locs} LOC). ` +
         (findings.length === 0
           ? `The agent reviewed this group and surfaced no concerns for you.`
           : `The agent surfaced ${findings.length} concern${findings.length === 1 ? '' : 's'} here — see below.`);
    return {
      id,
      name,
      intent,
      files: fs.length,
      locs,
      layers,
      clean: findings.length === 0,
    };
  });
  // Stable sort: non-clean first, original order preserved inside each group
  // (so LLM-supplied capability ordering survives — the LLM may intentionally
  // place the most-important capability first).
  capabilities.sort((a, b) => Number(a.clean) - Number(b.clean));

  const decisions = [];
  for (const cap of capabilities) {
    const sorted = capContents[cap.id].findings.slice().sort((a, b) =>
      (SEV_ORDER[a.severity] ?? 9) - (SEV_ORDER[b.severity] ?? 9)
    );
    sorted.forEach((f, j) => {
      const { q, rest } = splitQuestion(f.description || f.category || 'Concern');
      const reasoning = rest.length ? rest : (f.description ? [f.description] : []);
      const hunk = extractHunkAroundLine(parsedPatchByPath[f.file], f.line);
      if (hunk) hunk.file = f.file;
      // Read existing dismissal state (chapter view's dismissals show through here too).
      const dism = f.dismissal;
      const initialState = dism
        ? (dism.status === 'acknowledged' ? 'accepted'
           : dism.status === 'will_fix'   ? 'fix'
           : 'dismissed')
        : 'pending';
      decisions.push({
        id: `d-${cap.id}-${j}`,
        capId: cap.id,
        finding_id: f.id,
        dismissal_id: dism ? dism.id : null,
        initial_state: initialState,
        severity: f.severity || 'low',
        question: q,
        cwe: f.cwe ? [f.cwe] : [],
        reasoning: reasoning.map(escapeHtml),
        hunk,
        fix: f.suggestion ? escapeHtml(f.suggestion) : null,
      });
    });
  }
  return { capabilities, decisions };
}

function buildWWH(reviewData, capabilities, files, capsData) {
  // Prefer the LLM-generated briefing when available; otherwise build a
  // heuristic stub from PR metadata + file roles. Either way, append a single
  // sentence at the end of "how" naming the grouping mode so the reviewer
  // knows whether they're looking at LLM clusters or path-prefix grouping.
  const dirty = capabilities.filter(c => !c.clean);
  const clean = capabilities.filter(c => c.clean);
  const groupedBy = capsData?.source === "llm"
    ? `clustered by capability (LLM)`
    : `grouped by top-level path prefix`;
  const groupingFootnote = ` Split into ${capabilities.length} ` +
    `capabilit${capabilities.length === 1 ? 'y' : 'ies'} ` +
    `(${dirty.length} with concerns, ${clean.length} clean), ${groupedBy}.`;

  const llmBriefing = capsData?.briefing;
  if (llmBriefing && llmBriefing.what && llmBriefing.why && llmBriefing.how) {
    return {
      what: llmBriefing.what,
      why: llmBriefing.why,
      how: llmBriefing.how + groupingFootnote,
    };
  }

  // Heuristic stub fallback — used when the LLM briefing is unavailable.
  // Derive stats from diff files when available; fall back to capability
  // aggregates when the diff endpoint was unavailable (expired credentials).
  const fileCount = files.length || capabilities.reduce((s, c) => s + c.files, 0);
  const totalLoc = files.reduce((s, f) => s + (f.additions || 0) + (f.deletions || 0), 0)
    || capabilities.reduce((s, c) => s + c.locs, 0);
  const roleCounts = {};
  for (const f of files) {
    const r = detectRole(f.path);
    roleCounts[r] = (roleCounts[r] || 0) + 1;
  }
  const roleSummary = Object.entries(roleCounts)
    .sort((a, b) => b[1] - a[1])
    .map(([r, n]) => `${n} ${r.toLowerCase()}`)
    .join(', ');
  const what = reviewData.title
    ? `<strong>${escapeHtml(reviewData.title)}</strong> — ${fileCount} file${fileCount === 1 ? '' : 's'} changed (${totalLoc.toLocaleString()} LOC across ${roleSummary || 'no recognised roles'}).`
    : `${fileCount} file${fileCount === 1 ? '' : 's'} changed (${totalLoc.toLocaleString()} LOC across ${roleSummary || 'no recognised roles'}).`;
  // reviewData.body is never returned by the API (PR description isn't stored);
  // use the stored AI review summary as a best-effort "why" when available.
  const whyText = reviewData.body || reviewData.summary;
  const why = whyText
    ? escapeHtml(whyText).split(/\n\s*\n/).slice(0, 2).join(' ')
    : `<em>No description provided.</em>`;
  return { what, why, how: groupingFootnote.trim() };
}

function buildStats(reviewData, files, decisions, capabilities) {
  const allFindings = (reviewData.agent_results || []).flatMap(a => a.findings || []);
  const dismissed = allFindings.filter(f => f.dismissal).length;
  const triage = reviewData.triage_counts || { noise: 0, fyi: 0, decision: 0 };
  // noise from triage already includes dismissed; subtract to keep them distinct in the UI.
  const noiseOnly = Math.max(0, (triage.noise || 0) - dismissed);
  // When the diff endpoint was unavailable, derive counts from capabilities
  // so the stats bar shows meaningful numbers rather than "0 files · +0".
  const caps = capabilities || [];
  const fileCount = files.length || caps.reduce((s, c) => s + c.files, 0);
  const totalLoc = files.reduce((s, f) => s + (f.additions || 0) + (f.deletions || 0), 0)
    || caps.reduce((s, c) => s + c.locs, 0);
  return {
    author: reviewData.author || 'unknown',
    commits: reviewData.commits || 0,
    files: fileCount,
    additions: totalLoc,
    total: allFindings.length,
    surfaced: decisions.length,
    fyi: triage.fyi || 0,
    noise: noiseOnly,
    dismissed,
    suppressed: dismissed + (triage.fyi || 0) + noiseOnly,
    risk: reviewData.risk_tier || '—',
  };
}

function setLoadingPhase(text) {
  const el = document.getElementById('loading-phase');
  if (el) el.textContent = text;
}

async function loadAndBuild() {
  if (!REVIEW_ID) throw new Error('No review id in URL');
  // /capabilities runs an LLM call server-side and may take several seconds;
  // we still race it with /review and /diff so the rest of the page is ready
  // the moment it returns.
  setLoadingPhase('Fetching review data and diff…');
  const [reviewResp, diffResp, capsResp] = await Promise.allSettled([
    fetch(`/api/dashboard/reviews/${REVIEW_ID}`),
    fetch(`/api/dashboard/reviews/${REVIEW_ID}/diff`),
    fetch(`/api/dashboard/reviews/${REVIEW_ID}/capabilities`).then(r => {
      setLoadingPhase('AI capability clustering complete.');
      return r;
    }),
  ]);
  if (reviewResp.status !== 'fulfilled' || !reviewResp.value.ok) {
    throw new Error('Failed to load review');
  }
  const reviewData = await reviewResp.value.json();
  if (reviewData.error) throw new Error(reviewData.error);
  const diffData = (diffResp.status === 'fulfilled' && diffResp.value.ok)
    ? await diffResp.value.json() : { files: [] };
  const files = diffData.files || [];
  const capsData = (capsResp.status === 'fulfilled' && capsResp.value.ok)
    ? await capsResp.value.json() : null;

  const { capabilities, decisions } = buildCapabilitiesAndDecisions(reviewData, diffData, capsData);
  window.PR_TITLE = reviewData.title
    ? `${reviewData.repo} #${reviewData.pr_id} — ${reviewData.title}`
    : `${reviewData.repo} #${reviewData.pr_id}`;
  window.PR_STATS = buildStats(reviewData, files, decisions, capabilities);
  window.WWH = buildWWH(reviewData, capabilities, files, capsData);
  window.CAPABILITIES = capabilities;
  window.DECISIONS = decisions;
  window.CAPS_SOURCE = capsData?.source || "fallback_no_call";
}
</script>
<script>
// Populated by initState() after loadAndBuild() resolves.
let decisions, capabilities, stats;
let nonCleanCaps, cleanCaps, steps;
let decisionState;
let reviewerComment = "";
let stepIdx = 0;

function initState() {
  decisions = window.DECISIONS;
  capabilities = window.CAPABILITIES;
  stats = window.PR_STATS;
  // Seed from any existing dismissals on the review (chapter-view dismissals
  // show through here too) so the reviewer sees their prior state on reload.
  decisionState = decisions.map(d => d.initial_state || "pending");
  nonCleanCaps = capabilities.filter(c => !c.clean);
  cleanCaps = capabilities.filter(c => c.clean);
  steps = [
    { kind: "briefing", label: "Briefing" },
    ...nonCleanCaps.map(c => ({ kind: "capability", capId: c.id, label: c.name })),
    { kind: "wrap", label: "Wrap-up" }
  ];
  if (REVIEW_ID) {
    const r = document.getElementById("hdr-review-link");
    const c = document.getElementById("hdr-chapter-link");
    if (r) r.href = `/reviews/${REVIEW_ID}`;
    if (c) c.href = `/reviews/${REVIEW_ID}/human-review`;
  }
}

function showError(err) {
  const msg = err && err.message ? err.message : String(err);
  document.getElementById("step").innerHTML =
    `<div style="padding: 60px 24px; text-align: center; color: #f87171;">
       <h1 class="step-title" style="color: #f87171;">Couldn't load this review</h1>
       <p style="color: var(--muted); margin: 12px 0 0;">${escapeHtml(msg)}</p>
     </div>`;
  document.getElementById("nav").innerHTML = "";
  document.getElementById("pips-nav").innerHTML = "";
}


function decsForCap(capId) {
  return decisions.map((d, i) => ({ d, i })).filter(x => x.d.capId === capId);
}

function isStepDone(idx) {
  const s = steps[idx];
  if (s.kind === "briefing") return idx < stepIdx; // visited
  if (s.kind === "capability") {
    const decs = decsForCap(s.capId);
    return decs.length === 0 || decs.every(({ i }) => decisionState[i] !== "pending");
  }
  return false;
}

// ── Pips ──
function renderPips() {
  const html = steps.map((s, i) => {
    const done = isStepDone(i) && i !== stepIdx;
    const cls = ["pip"];
    if (i === stepIdx) cls.push("active");
    if (done) cls.push("done");
    const num = done ? "✓" : (i + 1);
    return `<div class="${cls.join(' ')}" data-step="${i}">
      <span class="pip-num">${num}</span>
      <span>${escapeHtml(s.label)}</span>
    </div>${i < steps.length - 1 ? '<div class="pip-sep"></div>' : ''}`;
  }).join("");
  document.getElementById("pips-nav").innerHTML = `<div class="pips">${html}</div>`;
  document.querySelectorAll(".pip").forEach(el => {
    el.addEventListener("click", () => { stepIdx = parseInt(el.dataset.step, 10); render(); });
  });
}

// ── Renderers per step kind ──
function renderHunk(h) {
  const rows = h.lines.map(l => {
    const marker = l.type === "add" ? "+" : l.type === "del" ? "-" : " ";
    return `<div class="row ${l.type}"><span class="ln">${l.n}</span><span class="marker">${marker}</span><span class="content">${escapeHtml(l.text)}</span></div>`;
  }).join("");
  return `<div class="hunk"><div class="hunk-header">${escapeHtml(h.file)} &nbsp; ${escapeHtml(h.header)}</div><pre>${rows}</pre></div>`;
}

function renderBriefing() {
  document.getElementById("step").innerHTML = `
    <div class="eyebrow">Step 1 of ${steps.length} · Briefing</div>
    <h1 class="step-title">${escapeHtml(window.PR_TITLE)}</h1>
    <p class="subtitle">A briefing prepared by the review agent. Read this once; we'll walk the capabilities next.</p>
    <div class="stats">
      <span><strong>${escapeHtml(stats.author)}</strong> · ${stats.commits} commits</span>
      <span><strong>${stats.files} files</strong> · +${stats.additions.toLocaleString()}</span>
      <span><strong>${stats.total} findings</strong> · ${stats.surfaced} surfaced · ${stats.suppressed} suppressed</span>
      <span>risk tier <strong>${stats.risk}</strong></span>
    </div>

    <div class="wwh">
      <div class="wwh-block">
        <div class="wwh-label">What this PR does</div>
        <p>${window.WWH.what}</p>
      </div>
      <div class="wwh-block">
        <div class="wwh-label">Why it's here</div>
        <p>${window.WWH.why}</p>
      </div>
      <div class="wwh-block">
        <div class="wwh-label">How it's structured</div>
        <p>${window.WWH.how}</p>
      </div>
    </div>

    <div class="cap-preview">
      <div class="cap-preview-label">The path through this review</div>
      ${capabilities.map(c => {
        const decs = decsForCap(c.id);
        return `<div class="cap-preview-row">
          <span class="cap-preview-dot ${c.clean ? 'clean' : 'has'}"></span>
          <span class="cap-preview-name">${escapeHtml(c.name)}</span>
          <span class="cap-preview-meta">${c.files} files · ${c.locs} LOC</span>
          <span class="cap-preview-tag ${c.clean ? 'clean' : 'has'}">${c.clean ? '✓ clean' : decs.length + ' concern' + (decs.length === 1 ? '' : 's')}</span>
        </div>`;
      }).join("")}
      <p style="font-size: 12.5px; color: var(--muted); margin: 14px 0 0; line-height: 1.55;">
        Clean capabilities are skipped from the wizard — the agent reviewed them and found nothing for you. They're listed at the wrap-up.
      </p>
    </div>
  `;
}

function renderCapability(capId) {
  const cap = capabilities.find(c => c.id === capId);
  const decs = decsForCap(capId);
  const capNum = nonCleanCaps.findIndex(c => c.id === capId) + 1;

  const concernsHtml = decs.map(({ d, i }) => {
    const s = decisionState[i];
    const decidedTag = s === "accepted" ? `<span class="decided-tag accepted">✓ accepted</span>`
                    : s === "fix"       ? `<span class="decided-tag fix">✎ fix requested</span>`
                    : s === "dismissed" ? `<span class="decided-tag dismissed">— dismissed</span>`
                    : "";
    const cwePills = (d.cwe || []).map(c => `<span class="pill cwe">${c}</span>`).join("");
    const reasoning = d.reasoning.map(p => `<p>${p}</p>`).join("");
    const cls = ["concern", `sev-${d.severity}`];
    if (s !== "pending") cls.push(`decided-${s === 'fix' ? 'fix' : s}`);
    return `<div class="${cls.join(' ')}" data-idx="${i}">
      <div class="concern-head">
        <h3>${d.question}</h3>
        <span class="pill sev-${d.severity}">${d.severity.toUpperCase()}</span>
        ${cwePills}
        ${decidedTag}
      </div>
      <div class="concern-prose">${reasoning}</div>
      ${d.hunk ? `<details class="expander">
        <summary>Show the diff</summary>
        ${renderHunk(d.hunk)}
      </details>` : ''}
      ${d.fix ? `<details class="expander">
        <summary>Recommended fix</summary>
        <div class="fix-hint"><strong>Fix sketch</strong>${d.fix}</div>
      </details>` : ""}
      <div class="concern-actions">
        <button class="primary ${s === 'accepted' ? 'active' : ''}" data-act="accept" data-idx="${i}">✓ Accept</button>
        <button class="danger ${s === 'fix' ? 'active' : ''}" data-act="fix" data-idx="${i}">✎ Request fix</button>
        <button class="ghost ${s === 'dismissed' ? 'active' : ''}" data-act="dismiss" data-idx="${i}">— Dismiss</button>
        ${s !== "pending" ? `<button class="clear" data-act="clear" data-idx="${i}">clear</button>` : ""}
      </div>
    </div>`;
  }).join("");

  document.getElementById("step").innerHTML = `
    <div class="eyebrow">Step ${stepIdx + 1} of ${steps.length} · Capability ${capNum} of ${nonCleanCaps.length}</div>
    <h1 class="step-title">${escapeHtml(cap.name)}</h1>
    <p class="cap-intent">${cap.intent}</p>
    ${concernsHtml}
  `;

  document.querySelectorAll("[data-act]").forEach(btn => {
    btn.addEventListener("click", async (e) => {
      e.stopPropagation();
      const act = btn.dataset.act;
      const idx = parseInt(btn.dataset.idx, 10);
      try {
        await applyDecision(idx, act);
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        alert(`Couldn't save decision: ${msg}`);
      }
      render();
    });
  });
}

// Maps the wizard's per-concern action to the dismissal API:
//   accept   → POST dismiss  status=acknowledged
//   fix      → POST dismiss  status=will_fix
//   dismiss  → POST dismiss  status=false_positive
//   clear    → DELETE the existing dismissal
const ACTION_TO_STATUS = { accept: "acknowledged", fix: "will_fix", dismiss: "false_positive" };

async function applyDecision(idx, act) {
  const decision = decisions[idx];
  if (!decision || !decision.finding_id) {
    throw new Error("This finding has no id; cannot persist a decision.");
  }
  if (act === "clear") {
    if (decision.dismissal_id) {
      const resp = await fetch(`/api/dashboard/dismissals/${decision.dismissal_id}`, { method: "DELETE" });
      if (!resp.ok) throw new Error(`HTTP ${resp.status} ${await resp.text()}`);
    }
    decision.dismissal_id = null;
    decisionState[idx] = "pending";
    return;
  }
  const status = ACTION_TO_STATUS[act];
  if (!status) throw new Error(`Unknown action: ${act}`);
  const resp = await fetch(`/api/dashboard/findings/${decision.finding_id}/dismiss`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ status, comment: "" }),
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status} ${await resp.text()}`);
  const body = await resp.json();
  decision.dismissal_id = body.id;
  decisionState[idx] = act;
}

function renderWrap() {
  const accepted = decisionState.filter(s => s === "accepted").length;
  const fixes    = decisionState.filter(s => s === "fix").length;
  const dismissed= decisionState.filter(s => s === "dismissed").length;
  const pending  = decisionState.filter(s => s === "pending").length;
  document.getElementById("step").innerHTML = `
    <div class="eyebrow">Step ${stepIdx + 1} of ${steps.length} · Wrap-up</div>
    <h1 class="step-title">Review summary</h1>
    <p class="subtitle">What you decided. Edit the comment for the author, then send your verdict.</p>

    <div class="summary-grid">
      <div class="summary-card accept"><div class="num">${accepted}</div><div class="lbl">Accepted</div></div>
      <div class="summary-card fix"><div class="num">${fixes}</div><div class="lbl">Fixes requested</div></div>
      <div class="summary-card dismiss"><div class="num">${dismissed}</div><div class="lbl">Dismissed</div></div>
      <div class="summary-card pending"><div class="num">${pending}</div><div class="lbl">Pending</div></div>
    </div>

    <div class="also-reviewed">
      <strong>Also reviewed (clean):</strong> ${cleanCaps.map(c => escapeHtml(c.name)).join(" · ")}.
      The agent looked at these capabilities and surfaced no concerns for you.
    </div>

    <div class="noise-line">
      ${(() => {
        const bits = [];
        if (stats.dismissed) bits.push(`<strong>${stats.dismissed}</strong> previously dismissed`);
        if (stats.fyi)       bits.push(`<strong>${stats.fyi}</strong> informational (FYI)`);
        if (stats.noise)     bits.push(`<strong>${stats.noise}</strong> filtered as noise`);
        return bits.length
          ? `${bits.join(" · ")} on this PR — set aside so you can focus on the decisions above.`
          : `No findings filtered or dismissed on this PR.`;
      })()}
    </div>

    <label class="comment-label" for="reviewer-comment">Comment to the author (optional)</label>
    <textarea id="reviewer-comment" class="comment-box" placeholder="e.g. Please fix the auth-retry interaction and add the failure-path tests in one revision; the Retry-After change can ship as a follow-up.">${escapeHtml(reviewerComment)}</textarea>

    <div class="final-actions">
      <button class="primary" data-verdict="approve_with_fixes">Approve with fixes requested</button>
      <button data-verdict="approve">Approve as-is</button>
      <button class="danger" data-verdict="decline">Decline — needs rework</button>
    </div>
    <div id="verdict-status" style="margin-top: 14px; font-size: 13px; color: var(--muted); min-height: 1.4em;"></div>
  `;
  const ta = document.getElementById("reviewer-comment");
  if (ta) ta.addEventListener("input", () => { reviewerComment = ta.value; });

  document.querySelectorAll("[data-verdict]").forEach(btn => {
    btn.addEventListener("click", async () => {
      const verdict = btn.dataset.verdict;
      const status = document.getElementById("verdict-status");
      const buttons = document.querySelectorAll("[data-verdict]");
      buttons.forEach(b => b.disabled = true);
      status.textContent = `Posting ${verdict.replace(/_/g, " ")}…`;
      status.style.color = "var(--muted)";
      try {
        const resp = await fetch(`/api/dashboard/reviews/${REVIEW_ID}/submit-verdict`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ verdict, comment: reviewerComment }),
        });
        const text = await resp.text();
        if (!resp.ok) throw new Error(`HTTP ${resp.status} ${text}`);
        let result; try { result = JSON.parse(text); } catch { result = {}; }
        const actions = (result.platform_actions || []).join(", ") || "no platform calls";
        status.textContent = `✓ Verdict posted to platform (${actions}). You can close this tab.`;
        status.style.color = "var(--green)";
      } catch (err) {
        const msg = (err && err.message) ? err.message : String(err);
        status.textContent = `✗ Couldn't post verdict: ${msg}`;
        status.style.color = "var(--red)";
        buttons.forEach(b => b.disabled = false);
      }
    });
  });
}

// ── Footer nav ──
function renderNav() {
  const isFirst = stepIdx === 0;
  const isLast  = stepIdx === steps.length - 1;
  const s = steps[stepIdx];
  let status = "";
  if (s.kind === "capability") {
    const decs = decsForCap(s.capId);
    const decided = decs.filter(({ i }) => decisionState[i] !== "pending").length;
    status = `${decided} of ${decs.length} decided · pending decisions are fine, you can revisit`;
  } else if (s.kind === "briefing") {
    status = `${nonCleanCaps.length} capabilities to walk · ${cleanCaps.length} clean (skipped)`;
  } else {
    status = "Final step — pick your verdict";
  }
  document.getElementById("nav").innerHTML = `<div class="nav-inner">
    <button id="back" ${isFirst ? "disabled" : ""}>← Back</button>
    <span class="nav-status">${status}</span>
    <button id="next" class="primary" ${isLast ? "disabled" : ""}>${isFirst ? "Start review" : (stepIdx === steps.length - 2 ? "To wrap-up" : "Next →")}</button>
  </div>`;
  const back = document.getElementById("back");
  const next = document.getElementById("next");
  if (back && !isFirst) back.addEventListener("click", () => { stepIdx -= 1; render(); });
  if (next && !isLast)  next.addEventListener("click", () => { stepIdx += 1; render(); window.scrollTo({ top: 0, behavior: "smooth" }); });
}

function render() {
  renderPips();
  const s = steps[stepIdx];
  if (s.kind === "briefing") renderBriefing();
  else if (s.kind === "capability") renderCapability(s.capId);
  else renderWrap();
  renderNav();
}

loadAndBuild()
  .then(initState)
  .then(render)
  .then(() => {
    const ov = document.getElementById('loading-overlay');
    if (ov) ov.style.display = 'none';
  })
  .catch(err => {
    const ov = document.getElementById('loading-overlay');
    if (ov) ov.style.display = 'none';
    showError(err);
  });
</script>

</body>
</html>
