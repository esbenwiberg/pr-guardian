<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian - Pull Requests</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<aside id="sidebar"></aside>
<script src="/static/sidebar.js"></script>
<script src="/static/command-palette.js"></script>

<div class="ml-16 lg:ml-64 min-h-screen">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-6 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <h1 class="text-sm font-semibold text-slate-50">Pull Requests</h1>
    <div class="flex items-center gap-3 text-xs text-slate-400">
      <span id="pr-count">Loading</span>
    </div>
  </header>

  <main class="max-w-[1200px] mx-auto px-6 py-6">
    <div class="flex flex-wrap items-center gap-2 mb-4">
      <input id="search-input" type="search" placeholder="Search PRs"
             class="form-input max-w-sm" autocomplete="off">
      <select id="platform-filter" class="form-select w-44">
        <option value="">All platforms</option>
        <option value="github">GitHub</option>
        <option value="ado">Azure DevOps</option>
      </select>
      <button id="refresh-button" class="btn btn-secondary btn-sm" type="button">Refresh</button>
    </div>

    <section class="card p-0 overflow-hidden">
      <div id="pr-list" class="divide-y divide-slate-800"></div>
      <div id="empty-state" class="hidden p-8 text-center text-sm text-slate-500">
        No synced pull requests match this view.
      </div>
      <div id="loading-state" class="p-8 text-center text-sm text-slate-500">Loading pull requests...</div>
    </section>
  </main>
</div>

<script>
const listEl = document.getElementById('pr-list');
const emptyEl = document.getElementById('empty-state');
const loadingEl = document.getElementById('loading-state');
const countEl = document.getElementById('pr-count');
const searchEl = document.getElementById('search-input');
const platformEl = document.getElementById('platform-filter');
const refreshEl = document.getElementById('refresh-button');

function platformLabel(platform) {
  return platform === 'ado' ? 'ADO' : 'GH';
}

function statusLabel(pr) {
  if (pr.ci_status && pr.ci_status !== 'unknown') return `CI ${pr.ci_status}`;
  if (pr.approval_status === 'draft' || pr.is_draft) return 'draft';
  return pr.approval_status || 'pending';
}

function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, (char) => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[char]));
}

function safePrUrl(value) {
  try {
    const url = new URL(String(value || ''));
    return url.protocol === 'https:' || url.protocol === 'http:' ? url.toString() : '#';
  } catch {
    return '#';
  }
}

function render(items, total) {
  countEl.textContent = `${total} open PR${total === 1 ? '' : 's'}`;
  loadingEl.classList.add('hidden');
  emptyEl.classList.toggle('hidden', items.length > 0);
  listEl.innerHTML = items.map(pr => {
    const href = safePrUrl(pr.pr_url);
    const repo = escapeHtml(pr.repo || 'unknown repo');
    const title = escapeHtml(pr.title || 'Untitled pull request');
    const author = escapeHtml(pr.author_display || pr.author || 'unknown author');
    const sourceBranch = escapeHtml(pr.source_branch || 'unknown branch');
    const targetBranch = escapeHtml(pr.target_branch || 'target');
    const status = escapeHtml(statusLabel(pr));
    const connectionName = escapeHtml(pr.connection_snapshot?.name || 'synced connection');
    return `
    <a class="block px-5 py-4 hover:bg-slate-800/40 transition-colors" href="${href}" target="_blank" rel="noopener">
      <div class="flex items-start justify-between gap-4">
        <div class="min-w-0">
          <div class="flex items-center gap-2 text-xs text-slate-500 mb-1">
            <span class="font-semibold text-slate-300">${escapeHtml(platformLabel(pr.platform))}</span>
            <span>${repo}</span>
            <span>#${escapeHtml(pr.pr_id || '')}</span>
          </div>
          <div class="text-sm font-medium text-slate-100 truncate">${title}</div>
          <div class="text-xs text-slate-500 mt-1">
            ${author} &middot; ${sourceBranch} -> ${targetBranch}
          </div>
        </div>
        <div class="shrink-0 text-right">
          <div class="text-xs text-slate-300">${status}</div>
          <div class="text-2xs text-slate-600 mt-1">${connectionName}</div>
        </div>
      </div>
    </a>
  `;
  }).join('');
}

async function loadPullRequests() {
  loadingEl.classList.remove('hidden');
  const params = new URLSearchParams({ limit: '100' });
  if (searchEl.value.trim()) params.set('search', searchEl.value.trim());
  if (platformEl.value) params.set('platform', platformEl.value);
  const response = await fetch(`/api/prs?${params.toString()}`, { credentials: 'same-origin' });
  if (!response.ok) throw new Error(`Failed to load PRs: ${response.status}`);
  const data = await response.json();
  render(data.items || [], data.total || 0);
}

searchEl.addEventListener('input', () => loadPullRequests().catch(() => render([], 0)));
platformEl.addEventListener('change', () => loadPullRequests().catch(() => render([], 0)));
refreshEl.addEventListener('click', () => loadPullRequests().catch(() => render([], 0)));
loadPullRequests().catch(() => render([], 0));
</script>
</body>
</html>
