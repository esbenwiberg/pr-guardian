<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Reviews</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<aside id="sidebar"></aside>
<script src="/static/sidebar.js"></script>
<script src="/static/command-palette.js"></script>

<div class="ml-16 lg:ml-64">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <h1 class="text-lg font-semibold text-slate-50">Reviews</h1>
    <div class="flex items-center gap-3">
      <div class="text-2xs text-slate-500 tabular-nums" id="queue-count"></div>
      <button id="btn-identity" title="Configure your GitHub / ADO identity"
              class="text-xs text-slate-400 hover:text-slate-200 border border-slate-700 rounded-lg px-3 py-1.5 transition-colors">
        ⚙ Identity
      </button>
    </div>
  </header>

  <div class="max-w-[1280px] mx-auto p-6">

    <!-- Paste-URL bar -->
    <div class="mb-5">
      <form id="trigger-form" class="flex flex-col gap-2">
        <div class="flex items-center gap-2">
          <div class="flex-1 flex items-center gap-2 px-3 py-2 rounded-lg border border-slate-700 bg-slate-900/60 focus-within:border-accent-400">
            <svg class="w-4 h-4 text-slate-500 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
            <input id="trigger-url" type="text"
                   class="flex-1 bg-transparent text-sm text-slate-100 placeholder:text-slate-500 outline-none"
                   placeholder="Paste a PR URL or repository URL"
                   autocomplete="off"/>
            <span id="trigger-error" class="hidden text-xs text-red-400"></span>
          </div>
          <button type="submit" id="trigger-btn" class="btn btn-primary text-sm">Review</button>
        </div>
        <div id="conn-opts" class="hidden flex flex-wrap items-center gap-3 text-xs text-slate-400 pl-1">
          <span class="text-amber-400">No linked connection — pick one:</span>
          <label class="flex items-center gap-1">
            connection
            <select id="conn-select" class="form-select text-xs py-0.5 px-1.5 bg-slate-900 border-slate-700">
              <option value="">loading…</option>
            </select>
          </label>
        </div>
        <div id="scan-opts" class="hidden flex flex-wrap items-center gap-3 text-xs text-slate-400 pl-1">
          <span class="text-slate-500">repository review options:</span>
          <label class="flex items-center gap-1">
            platform
            <select id="scan-platform" class="form-select text-xs py-0.5 px-1.5 bg-slate-900 border-slate-700">
              <option value="github">GitHub</option>
              <option value="ado">Azure DevOps</option>
            </select>
          </label>
          <label class="flex items-center gap-1">
            files
            <select id="scan-max-files" class="form-select text-xs py-0.5 px-1.5 bg-slate-900 border-slate-700">
              <option value="100">100</option>
              <option value="300" selected>300</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
              <option value="2000">2000 (max)</option>
            </select>
          </label>
          <label class="flex items-center gap-1">
            selection
            <select id="scan-selection" class="form-select text-xs py-0.5 px-1.5 bg-slate-900 border-slate-700">
              <option value="all">All (fails if too big)</option>
              <option value="recent">Recently changed</option>
            </select>
          </label>
          <span id="scan-preview" class="hidden text-slate-400 italic ml-2"></span>
        </div>
      </form>
    </div>

    <!-- Filter chips -->
    <div class="flex flex-wrap items-center gap-2 mb-3">
      <div class="flex items-center gap-1" id="filter-chips">
        <button class="chip chip-active" data-filter="all">All</button>
        <button class="chip" data-filter="waiting">Waiting</button>
        <button class="chip" data-filter="blocked">Blocked</button>
        <button class="chip" data-filter="needs_review">Needs review</button>
        <button class="chip" data-filter="mine">Mine</button>
        <button class="chip" data-filter="scans">Scans</button>
      </div>
      <div class="flex items-center gap-2 ml-auto">
        <select id="facet-repo" class="form-select text-xs py-1 px-2"><option value="">repo: any</option></select>
        <select id="facet-author" class="form-select text-xs py-1 px-2"><option value="">author: any</option></select>
        <select id="facet-risk" class="form-select text-xs py-1 px-2">
          <option value="">risk: any</option>
          <option value="high">high</option>
          <option value="medium">medium</option>
          <option value="low">low</option>
          <option value="trivial">trivial</option>
        </select>
        <button id="sync-btn" class="text-xs text-slate-400 hover:text-slate-100 px-2 py-1 rounded hover:bg-slate-800/60">&#8635; Sync</button>
      </div>
    </div>

    <div class="reviews-grid" id="reviews-grid">
      <!-- Queue -->
      <div id="queue" class="rounded-lg border border-slate-800 bg-slate-900/40 divide-y divide-slate-800/80 overflow-hidden">
        <div class="py-16 text-center text-sm text-slate-500" id="queue-empty">Loading…</div>
      </div>

      <aside id="readiness-panel" class="readiness-panel" aria-live="polite">
        <div class="text-sm font-semibold text-slate-200">Readiness</div>
        <p class="mt-2 text-xs text-slate-500">Select a waiting or blocked readiness candidate.</p>
      </aside>
    </div>

  </div>
</div>

<style>
  .chip {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid rgb(30 41 59);
    color: rgb(148 163 184);
    background: transparent;
    transition: all 120ms;
  }
  .chip:hover { color: rgb(241 245 249); border-color: rgb(71 85 105); }
  .chip-active { color: rgb(110 231 183); border-color: rgb(52 211 153 / 0.5); background: rgb(52 211 153 / 0.08); }
  .reviews-grid { display: grid; grid-template-columns: minmax(0, 1fr) 360px; gap: 16px; align-items: start; }
  /* Collapse the detail rail when no readiness candidate is selected so the
     list claims the full width instead of leaving a quarter-width void. */
  .reviews-grid.solo { grid-template-columns: minmax(0, 1fr); }
  .reviews-grid.solo .readiness-panel { display: none; }
  .queue-row { display: flex; align-items: center; gap: 14px; padding: 14px 18px; transition: background 120ms; cursor: pointer; }
  .queue-row:hover { background: rgb(15 23 42 / 0.6); }
  .queue-row.selected { background: rgb(30 41 59 / 0.58); box-shadow: inset 2px 0 0 rgb(52 211 153); }
  .subject-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; color: rgb(148 163 184); border: 1px solid rgb(51 65 85); background: rgb(15 23 42); }
  .subject-icon.pr { color: rgb(110 231 183); border-color: rgb(52 211 153 / 0.45); }
  .subject-icon.candidate { color: rgb(45 212 191); border-color: rgb(45 212 191 / 0.45); }
  .subject-icon.scan { color: rgb(251 191 36); border-color: rgb(251 191 36 / 0.45); }
  .platform-chip { font-size: 9px; font-weight: 600; padding: 1px 5px; border-radius: 3px; color: rgb(148 163 184); border: 1px solid rgb(51 65 85); }
  .origin-chip { font-size: 10px; padding: 1px 6px; border-radius: 4px; color: rgb(148 163 184); border: 1px solid rgb(51 65 85); }
  .origin-chip.manual, .origin-chip.you-triggered { color: rgb(110 231 183); border-color: rgb(52 211 153 / 0.45); }
  .stale-chip { font-size: 10px; padding: 1px 6px; border-radius: 4px; color: rgb(251 191 36); border: 1px solid rgb(251 191 36 / 0.45); background: rgb(251 191 36 / 0.06); }
  .status-chip { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; letter-spacing: 0.02em; }
  .status-chip.merged { color: rgb(192 132 252); border: 1px solid rgb(192 132 252 / 0.45); background: rgb(192 132 252 / 0.06); }
  .status-chip.approved { color: rgb(110 231 183); border: 1px solid rgb(110 231 183 / 0.45); background: rgb(110 231 183 / 0.06); }
  .status-chip.changes_requested { color: rgb(248 113 113); border: 1px solid rgb(248 113 113 / 0.45); background: rgb(248 113 113 / 0.06); }
  .status-chip.draft { color: rgb(148 163 184); border: 1px solid rgb(71 85 105); background: rgb(15 23 42 / 0.6); }
  .status-chip.error { color: rgb(248 113 113); border: 1px solid rgb(248 113 113 / 0.45); background: rgb(248 113 113 / 0.06); }
  .verdict-chip { font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600; letter-spacing: 0.02em; }
  .verdict-chip.auto_approve { color: rgb(110 231 183); border: 1px solid rgb(110 231 183 / 0.45); background: rgb(110 231 183 / 0.06); }
  .verdict-chip.human_review { color: rgb(251 191 36); border: 1px solid rgb(251 191 36 / 0.45); background: rgb(251 191 36 / 0.06); }
  .verdict-chip.reject, .verdict-chip.hard_block { color: rgb(248 113 113); border: 1px solid rgb(248 113 113 / 0.45); background: rgb(248 113 113 / 0.06); }
  .verdict-chip.error { color: rgb(248 113 113); border: 1px solid rgb(71 85 105); }
  .risk-dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; }
  .risk-dot.error { background: rgb(248 113 113); }
  .risk-dot.high { background: rgb(248 113 113); }
  .risk-dot.medium { background: rgb(251 191 36); }
  .risk-dot.low { background: rgb(110 231 183); }
  .risk-dot.trivial { background: rgb(71 85 105); }
  .readiness-panel { position: sticky; top: 72px; min-height: 360px; border: 1px solid rgb(30 41 59); border-radius: 8px; background: rgb(15 23 42 / 0.55); padding: 18px; }
  .readiness-pill { display: inline-flex; align-items: center; gap: 6px; border-radius: 999px; border: 1px solid rgb(51 65 85); padding: 3px 8px; font-size: 11px; color: rgb(203 213 225); }
  .readiness-pill.waiting { border-color: rgb(45 212 191 / 0.45); color: rgb(94 234 212); }
  .readiness-pill.blocked { border-color: rgb(248 113 113 / 0.45); color: rgb(252 165 165); }
  .detail-line { display: flex; justify-content: space-between; gap: 16px; padding: 8px 0; border-bottom: 1px solid rgb(30 41 59 / 0.7); font-size: 12px; }
  .detail-line span:first-child { color: rgb(148 163 184); }
  .detail-line span:last-child { color: rgb(226 232 240); text-align: right; }
  @media (max-width: 920px) {
    .reviews-grid { grid-template-columns: minmax(0, 1fr); }
    .readiness-panel { position: static; min-height: 0; }
    .queue-row { align-items: flex-start; }
    .queue-row > .flex.flex-col { align-items: flex-start; }
  }
</style>

<script>
(function () {
  'use strict';

  const queueEl = document.getElementById('queue');
  const emptyEl = document.getElementById('queue-empty');
  const countEl = document.getElementById('queue-count');
  const facetRepo = document.getElementById('facet-repo');
  const facetAuthor = document.getElementById('facet-author');
  const facetRisk = document.getElementById('facet-risk');
  const errEl = document.getElementById('trigger-error');
  const panelEl = document.getElementById('readiness-panel');

  let ITEMS = [];
  let FILTER = 'all';
  let ME = null;
  let SELECTED_CANDIDATE_ID = null;

  fetch('/api/me').then(r => r.ok ? r.json() : null).then(u => { ME = u; renderPanel(); });

  // Sync URL state with filter chips.
  const params = new URLSearchParams(window.location.search);
  const urlFilter = params.get('filter');
  if (urlFilter && ['all','waiting','blocked','needs_review','mine','scans'].includes(urlFilter)) FILTER = urlFilter;
  if (params.get('subject') === 'repo') FILTER = 'scans';
  // Facet filters can be deep-linked (e.g. from the command palette).
  const urlRepo = params.get('repo') || '';
  const urlAuthor = params.get('author') || '';

  function applyFilter() {
    document.querySelectorAll('#filter-chips .chip').forEach(c => c.classList.toggle('chip-active', c.dataset.filter === FILTER));
    render();
    const u = new URL(window.location.href);
    if (FILTER === 'all') u.searchParams.delete('filter'); else u.searchParams.set('filter', FILTER);
    u.searchParams.delete('subject');
    window.history.replaceState({}, '', u.toString());
  }

  document.querySelectorAll('#filter-chips .chip').forEach(c => {
    c.addEventListener('click', () => { FILTER = c.dataset.filter; applyFilter(); });
  });

  facetRepo.addEventListener('change', render);
  facetAuthor.addEventListener('change', render);
  facetRisk.addEventListener('change', render);
  document.getElementById('sync-btn').addEventListener('click', loadQueue);

  function escape(s) { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; }
  function rowKey(item) { return item.row_key || `${item.subject_type}:${item.id}`; }
  function isCandidate(item) { return item.subject_type === 'candidate'; }
  function isFailed(item) { return item.decision === 'error' || item.stage === 'error'; }

  function timeAgo(iso) {
    if (!iso) return '';
    const t = new Date(iso).getTime();
    const dt = (Date.now() - t) / 1000;
    if (dt < 60) return `${Math.max(1, Math.floor(dt))}s ago`;
    if (dt < 3600) return `${Math.floor(dt/60)}m ago`;
    if (dt < 86400) return `${Math.floor(dt/3600)}h ago`;
    return `${Math.floor(dt/86400)}d ago`;
  }

  function riskDots(item) {
    if (isFailed(item)) return '<span class="risk-dot error"></span>';
    const map = { critical: item.findings?.critical || 0, high: item.findings?.high || 0, medium: item.findings?.medium || 0, low: item.findings?.low || 0 };
    const sum = map.critical + map.high;
    if (item.risk_tier === 'trivial' && !sum) return '<span class="text-2xs text-slate-500">clean</span>';
    const parts = [];
    for (let i = 0; i < Math.min(3, Math.max(1, sum || 1)); i++) {
      parts.push(`<span class="risk-dot ${item.risk_tier}"></span>`);
    }
    return parts.join('');
  }

  function findingSummary(item) {
    if (isFailed(item)) return '<span class="text-red-400">failed</span>';
    const f = item.findings || {};
    const high = (f.critical || 0) + (f.high || 0);
    const med = f.medium || 0;
    const low = f.low || 0;
    const pieces = [];
    if (high) pieces.push(`<span class="text-red-400">${high} high</span>`);
    if (med) pieces.push(`<span class="text-amber-400">${med} med</span>`);
    if (low) pieces.push(`<span class="text-slate-400">${low} low</span>`);
    if (!pieces.length) pieces.push('<span class="text-emerald-400">clean</span>');
    if (item.estimated_review_minutes) pieces.push(`<span class="text-slate-500">~${item.estimated_review_minutes}m</span>`);
    return pieces.join(' · ');
  }

  function originLabel(item) {
    if (item.trigger_origin === 'readiness') return { text: 'readiness', cls: 'origin-chip', title: 'Auto-triggered when this PR met its readiness rules' };
    if (item.trigger_origin === 'manual' && item.triggered_by) {
      if (ME && ME.email && ME.email === item.triggered_by) return { text: 'you triggered', cls: 'origin-chip you-triggered', title: 'You triggered this review manually' };
      return { text: 'manual', cls: 'origin-chip manual', title: `Triggered manually by ${item.triggered_by}` };
    }
    if (item.trigger_origin === 'scan') return { text: 'scan · full', cls: 'origin-chip', title: 'Full-depth review started from a repository scan' };
    if (item.trigger_origin === 'manual') return { text: 'manual', cls: 'origin-chip manual', title: 'Triggered manually' };
    return { text: 'auto', cls: 'origin-chip', title: 'Auto-triggered by a pull-request webhook event' };
  }

  // Mirror Insights wording so a verdict reads the same on every surface.
  function formatDecision(d) {
    const m = { auto_approve: 'Approved', human_review: 'Human Review', reject: 'Rejected', hard_block: 'Blocked', pending: 'Pending', error: 'Error' };
    return m[d] || d || '-';
  }

  function verdictChip(item) {
    // Only completed reviews carry a verdict — candidates / open PRs don't.
    if (isCandidate(item) || isFailed(item) || !item.decision || item.decision === 'pending') return '';
    return `<span class="verdict-chip ${escape(item.decision)}" title="PR Guardian verdict">${escape(formatDecision(item.decision))}</span>`;
  }

  function statusChip(item) {
    const s = item.pr_status;
    if (!s || s === 'pending') return '';
    const labels = {
      merged: '\u{1f7e3} merged',
      approved: '✅ approved',
      changes_requested: '\u{1f534} changes requested',
      draft: '✏ draft',
    };
    const label = labels[s];
    if (!label) return '';
    return `<span class="status-chip ${s}">${label}</span>`;
  }

  function rowHtml(item) {
    const candidate = isCandidate(item);
    const isPR = item.subject_type === 'pr';
    const platform = item.platform ? item.platform.toUpperCase().replace('GITHUB','GH') : '';
    const origin = originLabel(item);
    const staleBadge = item.stale ? '<span class="stale-chip">&#9888; updated</span>' : '';
    const statusBadge = isPR ? statusChip(item) : '';
    const failureBadge = isFailed(item) ? '<span class="status-chip error">failed</span>' : '';
    const subject = candidate
      ? `<span class="subject-icon candidate">PR</span>`
      : isPR
      ? `<span class="subject-icon pr">PR</span>`
      : `<span class="subject-icon scan">&#128193;</span>`;
    const subtitleParts = [escape(item.repo)];
    if (item.author) subtitleParts.push(escape(item.author));
    else if (!isPR) subtitleParts.push('scheduled');
    subtitleParts.push(timeAgo(item.started_at));
    const subtitle = subtitleParts.join(' &middot; ');
    const filesText = candidate ? readinessShort(item) : item.files_changed ? `${item.files_changed} files` : 'full';
    const filesTitle = candidate ? 'Readiness state' : item.files_changed ? `${item.files_changed} files changed` : 'Full-depth review (all changed files)';
    const selected = candidate && item.id === SELECTED_CANDIDATE_ID ? ' selected' : '';
    const statusLine = candidate
      ? `<div class="mt-1 text-2xs text-slate-400">${escape(readinessDetail(item))}</div>`
      : isFailed(item)
      ? `<div class="mt-1 text-2xs text-red-400/80 truncate">${escape(item.stage_detail || 'Review failed before results were produced.')}</div>`
      : '';
    return `
      <div class="queue-row${selected}" data-id="${escape(item.id)}" data-row-key="${escape(rowKey(item))}" data-subject-type="${escape(item.subject_type)}">
        ${subject}
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1">
            ${platform ? `<span class="platform-chip">${platform}</span>` : ''}
            ${(isPR || candidate) ? `<span class="text-2xs font-mono text-slate-500 shrink-0">#${escape(item.pr_id || item.id.replace(/^demo-pr-/,'').slice(0, 7))}</span>` : ''}
            <span class="text-sm font-medium text-slate-100 truncate min-w-0">${escape(item.title)}</span>
            ${statusBadge}
            ${failureBadge}
            ${staleBadge}
          </div>
          <div class="text-2xs text-slate-500">${subtitle}</div>
          ${statusLine}
        </div>
        <div class="flex flex-col items-end gap-1 shrink-0 text-xs tabular-nums">
          ${verdictChip(item)}
          <div class="flex items-center gap-1.5">${riskDots(item)}<span class="ml-1">${findingSummary(item)}</span></div>
          <div class="flex items-center gap-2 text-2xs text-slate-500">
            <span class="${origin.cls}" title="${escape(origin.title || '')}">${origin.text}</span>
            <span title="${escape(filesTitle)}">${filesText}</span>
          </div>
        </div>
        <svg class="w-4 h-4 text-slate-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m8.25 4.5 7.5 7.5-7.5 7.5"/></svg>
      </div>`;
  }

  function readinessShort(item) {
    const state = (item.readiness?.state || item.state || '').toUpperCase();
    const reason = reasonLabel(item.readiness?.reason || item.reason || '');
    return `${state}${reason ? ' · ' + reason : ''}`;
  }

  function reasonLabel(reason) {
    return String(reason || '').replace(/_/g, ' ');
  }

  function readinessDetail(item) {
    const snap = item.readiness?.snapshot || {};
    const checks = snap.checks || {};
    const parts = [];
    if (checks.total != null) {
      const passed = checks.passed || 0;
      const pending = checks.pending || 0;
      const failed = checks.failed || 0;
      parts.push(`${passed}/${checks.total} checks`);
      if (pending) parts.push(`${pending} pending`);
      if (failed) parts.push(`${failed} failed`);
    }
    const archmap = snap.archmap || {};
    if (archmap.state) parts.push(`archmap ${archmap.state}`);
    return parts.length ? parts.join(' · ') : reasonLabel(item.readiness?.reason || item.reason || 'waiting');
  }

  function passesFilters(item) {
    if (FILTER === 'waiting' && (!isCandidate(item) || item.state !== 'waiting')) return false;
    if (FILTER === 'blocked' && (!isCandidate(item) || item.state !== 'blocked')) return false;
    if (FILTER === 'needs_review' && item.decision !== 'human_review') return false;
    if (FILTER === 'mine') {
      const myEmail = ME && ME.email;
      const mine = (myEmail && (item.author === myEmail || item.triggered_by === myEmail));
      if (!mine) return false;
    }
    if (FILTER === 'scans' && item.subject_type !== 'scan') return false;
    if (facetRepo.value && item.repo !== facetRepo.value) return false;
    if (facetAuthor.value && item.author !== facetAuthor.value) return false;
    if (facetRisk.value && item.risk_tier !== facetRisk.value) return false;
    return true;
  }

  function rebuildFacets() {
    // Keep whatever is selected: an explicit deep-link on first build, or the
    // user's own pick across a Sync. Inject the value as an option if the
    // current queue doesn't contain it, so the selection actually sticks.
    const wantRepo = facetRepo.value || urlRepo;
    const wantAuthor = facetAuthor.value || urlAuthor;
    const repos = [...new Set([...ITEMS.map(i => i.repo), wantRepo].filter(Boolean))].sort();
    const authors = [...new Set([...ITEMS.map(i => i.author), wantAuthor].filter(Boolean))].sort();
    facetRepo.innerHTML = '<option value="">repo: any</option>' + repos.map(r => `<option value="${escape(r)}">${escape(r)}</option>`).join('');
    facetAuthor.innerHTML = '<option value="">author: any</option>' + authors.map(a => `<option value="${escape(a)}">${escape(a)}</option>`).join('');
    facetRepo.value = wantRepo;
    facetAuthor.value = wantAuthor;
  }

  function render() {
    const filtered = ITEMS.filter(passesFilters);
    countEl.textContent = filtered.length ? `${filtered.length} review${filtered.length === 1 ? '' : 's'}` : '';
    if (!ITEMS.length) {
      queueEl.innerHTML = `<div class="empty-state py-16 text-center">
        <svg class="w-10 h-10 mx-auto mb-3 text-slate-600" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z" opacity=".5"/></svg>
        <p class="text-sm text-slate-300 mb-1">Nothing waiting for review.</p>
        <p class="text-xs text-slate-500">Paste a PR URL above to trigger one.</p>
      </div>`;
      return;
    }
    if (!filtered.length) {
      queueEl.innerHTML = `<div class="empty-state py-16 text-center">
        <p class="text-sm text-slate-300 mb-1">No reviews match these filters.</p>
        <button class="text-xs text-accent-400 hover:text-accent-300" onclick="(function(){ document.querySelectorAll('.chip').forEach(c=>c.classList.remove('chip-active')); document.querySelector('.chip[data-filter=all]').classList.add('chip-active'); window.__resetFilters && window.__resetFilters(); })()">Clear filters</button>
      </div>`;
      return;
    }
    queueEl.innerHTML = filtered.map(rowHtml).join('');
    queueEl.querySelectorAll('.queue-row').forEach(row => {
      row.addEventListener('click', () => {
        if (row.dataset.subjectType === 'candidate') {
          SELECTED_CANDIDATE_ID = row.dataset.id;
          render();
          renderPanel();
          return;
        }
        window.location.href = `/reviews/${encodeURIComponent(row.dataset.id)}`;
      });
    });
    if (SELECTED_CANDIDATE_ID && !filtered.some(i => i.id === SELECTED_CANDIDATE_ID && isCandidate(i))) {
      SELECTED_CANDIDATE_ID = null;
      renderPanel();
    }
  }

  function selectedCandidate() {
    return ITEMS.find(item => isCandidate(item) && item.id === SELECTED_CANDIDATE_ID)
      || ITEMS.find(item => isCandidate(item));
  }

  function detailLine(label, value) {
    if (value === undefined || value === null || value === '') return '';
    return `<div class="detail-line"><span>${escape(label)}</span><span>${escape(value)}</span></div>`;
  }

  function renderChecks(snapshot) {
    const checks = snapshot.checks || {};
    if (checks.total == null) return '';
    const pieces = [];
    pieces.push(`${checks.passed || 0} passed`);
    if (checks.pending) pieces.push(`${checks.pending} pending`);
    if (checks.failed) pieces.push(`${checks.failed} failed`);
    return detailLine('Checks', `${pieces.join(', ')} of ${checks.total}`);
  }

  function renderPanel() {
    const grid = document.getElementById('reviews-grid');
    const item = selectedCandidate();
    if (!item) {
      if (grid) grid.classList.add('solo');
      panelEl.innerHTML = `<div class="text-sm font-semibold text-slate-200">Readiness</div>
        <p class="mt-2 text-xs text-slate-500">Select a waiting or blocked readiness candidate.</p>`;
      return;
    }
    if (grid) grid.classList.remove('solo');
    SELECTED_CANDIDATE_ID = item.id;
    const snapshot = item.readiness?.snapshot || {};
    const canOverride = Boolean(ME && (ME.is_admin || ME.can_manage_profiles));
    const archmap = snapshot.archmap || {};
    const quiet = snapshot.quiet_period || snapshot.quiet || {};
    const head = item.head_sha ? item.head_sha.slice(0, 12) : '';
    panelEl.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div class="min-w-0">
          <div class="text-base font-semibold text-slate-100 truncate">${escape(item.title)}</div>
          <div class="mt-1 text-xs text-slate-500">${escape((item.platform || '').toUpperCase().replace('GITHUB','GH'))} · ${escape(item.repo)} · #${escape(item.pr_id || '')}</div>
        </div>
        <span class="readiness-pill ${escape(item.state || '')}">${escape((item.state || '').toUpperCase())}</span>
      </div>
      <div class="mt-5">
        ${detailLine('Reason', reasonLabel(item.reason))}
        ${snapshot.error ? detailLine('Error', snapshot.error) : ''}
        ${renderChecks(snapshot)}
        ${detailLine('Archmap', archmap.state ? `${archmap.state}${archmap.minutes_remaining ? ', ' + archmap.minutes_remaining + 'm left' : ''}` : '')}
        ${detailLine('Quiet period', quiet.satisfied === true ? 'satisfied' : quiet.satisfied === false ? 'waiting' : '')}
        ${detailLine('Head SHA', head)}
        ${detailLine('Connection', item.connection_snapshot?.name || '')}
      </div>
      <div class="mt-6 flex flex-col gap-2">
        <button type="button" class="btn btn-primary text-sm justify-center" id="candidate-start-btn">Start Review Now</button>
        ${canOverride ? '<button type="button" class="btn btn-secondary text-sm justify-center" id="candidate-override-btn">Override Readiness & Start Review</button>' : ''}
      </div>
      <div id="candidate-action-status" class="mt-3 text-xs text-slate-500"></div>
    `;
    document.getElementById('candidate-start-btn')?.addEventListener('click', () => startCandidate(item.id));
    document.getElementById('candidate-override-btn')?.addEventListener('click', () => overrideCandidate(item.id));
  }

  async function candidateAction(path, body) {
    const status = document.getElementById('candidate-action-status');
    if (status) status.textContent = 'Queueing review...';
    const r = await fetch(path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {}),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.detail || data.error || 'Failed to start review.');
    if (data.review_id) {
      window.location.href = `/reviews/${encodeURIComponent(data.review_id)}/live`;
    } else if (status) {
      status.textContent = 'Review queued.';
    }
  }

  async function startCandidate(id) {
    try {
      await candidateAction(`/api/reviews/candidates/${encodeURIComponent(id)}/start`, { comment_mode: 'summary' });
    } catch (e) {
      const status = document.getElementById('candidate-action-status');
      if (status) status.textContent = String(e.message || e);
    }
  }

  async function overrideCandidate(id) {
    const reason = window.prompt('Reason for readiness override');
    if (!reason || !reason.trim()) return;
    try {
      await candidateAction(`/api/reviews/candidates/${encodeURIComponent(id)}/override`, {
        reason: reason.trim(),
        confirm: true,
        comment_mode: 'summary',
      });
    } catch (e) {
      const status = document.getElementById('candidate-action-status');
      if (status) status.textContent = String(e.message || e);
    }
  }

  window.__resetFilters = function () {
    FILTER = 'all'; facetRepo.value = ''; facetAuthor.value = ''; facetRisk.value = '';
    applyFilter();
  };

  async function loadQueue() {
    emptyEl && (emptyEl.textContent = 'Loading…');
    try {
      const r = await fetch('/api/reviews/queue');
      const data = await r.json();
      ITEMS = (data.items || []);
      rebuildFacets();
      if (!SELECTED_CANDIDATE_ID) {
        const firstCandidate = ITEMS.find(isCandidate);
        SELECTED_CANDIDATE_ID = firstCandidate ? firstCandidate.id : null;
      }
      render();
      renderPanel();
    } catch (e) {
      queueEl.innerHTML = `<div class="empty-state py-16 text-center text-xs text-red-400">Failed to load queue: ${escape(String(e))}</div>`;
    }
  }

  // Detect repository input and reveal the repository review options panel.
  function looksLikeScan(url) {
    if (!url) return false;
    if (/\/pull\//.test(url)) return false;
    if (/\/pullrequest\//.test(url)) return false;
    if (/^https?:\/\/github\.com\/[^/]+\/[^/]+\/?$/i.test(url)) return true;
    if (/^https?:\/\/dev\.azure\.com\/[^/]+\/[^/]+\/_git\/[^/]+\/?$/i.test(url)) return true;
    if (/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(url)) return true; // ADO triple
    if (/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(url)) return true; // owner/repo
    return false;
  }
  function detectPlatformDefault(url) {
    if (/dev\.azure\.com/.test(url)) return 'ado';
    if (/github\.com/.test(url)) return 'github';
    if (/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(url)) return 'ado';
    return 'github';
  }
  const triggerUrlEl = document.getElementById('trigger-url');
  const scanOptsEl = document.getElementById('scan-opts');
  const platformSelect = document.getElementById('scan-platform');
  const scanPreviewEl = document.getElementById('scan-preview');
  const connOptsEl = document.getElementById('conn-opts');
  const connSelect = document.getElementById('conn-select');

  async function showConnectionSelector(platform) {
    connOptsEl.classList.remove('hidden');
    connSelect.innerHTML = '<option value="">loading…</option>';
    try {
      const r = await fetch('/api/profiles/connections');
      if (!r.ok) throw new Error('failed');
      const conns = await r.json();
      const filtered = platform ? conns.filter(c => c.platform === platform) : conns;
      if (filtered.length === 0) {
        connSelect.innerHTML = '<option value="">no connections configured</option>';
      } else {
        connSelect.innerHTML = filtered.map(c =>
          `<option value="${c.name}">${c.name} (${c.platform})</option>`
        ).join('');
      }
    } catch {
      connSelect.innerHTML = '<option value="">could not load connections</option>';
    }
  }

  function resolveRepoScanPreview(url, platform) {
    let m = /^https?:\/\/github\.com\/([^/]+)\/([^/]+?)(?:\.git)?\/?$/i.exec(url);
    if (m) return { repo: m[1] + '/' + m[2], platform: 'github' };

    m = /^https?:\/\/dev\.azure\.com\/[^/]+\/([^/]+)\/_git\/([^/]+?)(?:\.git)?\/?$/i.exec(url);
    if (m) return { repo: m[1] + '/' + m[2], platform: 'ado' };

    m = /^[A-Za-z0-9_.-]+\/([A-Za-z0-9_.-]+)\/([A-Za-z0-9_.-]+)$/.exec(url);
    if (m) return { repo: m[1] + '/' + m[2], platform: 'ado' };

    if (/^[A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+$/.test(url)) {
      return { repo: url, platform: platform || 'github' };
    }
    return null;
  }

  function updateScanPreview() {
    const url = triggerUrlEl.value.trim();
    if (!looksLikeScan(url)) {
      scanPreviewEl.textContent = '';
      scanPreviewEl.classList.add('hidden');
      return;
    }
    const result = resolveRepoScanPreview(url, platformSelect.value);
    if (result) {
      const label = result.platform === 'ado' ? 'Azure DevOps' : 'GitHub';
      scanPreviewEl.textContent = 'Will review ' + label + ' repository: ' + result.repo;
      scanPreviewEl.classList.remove('hidden');
    } else {
      scanPreviewEl.textContent = '';
      scanPreviewEl.classList.add('hidden');
    }
  }

  triggerUrlEl.addEventListener('input', () => {
    const url = triggerUrlEl.value.trim();
    const isScan = looksLikeScan(url);
    scanOptsEl.classList.toggle('hidden', !isScan);
    if (isScan) {
      platformSelect.value = detectPlatformDefault(url);
    }
    connOptsEl.classList.add('hidden');
    errEl.classList.add('hidden');
    updateScanPreview();
  });

  platformSelect.addEventListener('change', updateScanPreview);

  // Trigger form
  document.getElementById('trigger-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.classList.add('hidden'); errEl.textContent = '';
    const url = triggerUrlEl.value.trim();
    if (!url) { errEl.textContent = 'Enter a PR URL or owner/repo.'; errEl.classList.remove('hidden'); return; }
    const isScan = looksLikeScan(url);
    const mode = isScan ? 'scan' : 'pr';
    const body = { url, mode };
    if (isScan) {
      body.platform = platformSelect.value;
      body.max_files = parseInt(document.getElementById('scan-max-files').value, 10);
      body.selection = document.getElementById('scan-selection').value;
    }
    if (!connOptsEl.classList.contains('hidden') && connSelect.value) {
      body.connection_name = connSelect.value;
    }
    const btn = document.getElementById('trigger-btn');
    btn.disabled = true; btn.textContent = 'Starting...';
    try {
      const r = await fetch('/api/reviews/trigger', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await r.json();
      if (!r.ok) {
        if (r.status === 409 && data.detail && data.detail.includes('Connection selection')) {
          const platform = /dev\.azure\.com/.test(url) ? 'ado' : /github\.com/.test(url) ? 'github' : null;
          await showConnectionSelector(platform);
          return;
        }
        errEl.textContent = data.detail || 'Failed to trigger review.';
        errEl.classList.remove('hidden');
        return;
      }
      // Live tracking only works with a real review UUID; without one, fall
      // back to the queue so the user still sees something useful.
      const target = data.review_id
        ? `/reviews/${encodeURIComponent(data.review_id)}/live`
        : '/reviews';
      window.location.href = target;
    } catch (e) {
      errEl.textContent = String(e); errEl.classList.remove('hidden');
    } finally {
      btn.disabled = false; btn.textContent = 'Review';
    }
  });

  applyFilter();
  loadQueue();
  updateScanPreview();
})();
</script>

<!-- Identity modal -->
<div id="identity-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60" style="display:none">
  <div class="bg-slate-900 border border-slate-700 rounded-xl shadow-2xl w-full max-w-md mx-4 p-6">
    <h3 class="text-base font-semibold mb-1">Your Identity</h3>
    <p class="text-xs text-slate-400 mb-5">Tell Guardian who you are on each platform so it can surface <em>your</em> PRs.</p>
    <label class="block mb-4">
      <span class="text-xs font-medium text-slate-300 block mb-1">GitHub username</span>
      <input id="inp-gh" type="text" placeholder="e.g. octocat"
             class="w-full px-3 py-2 text-sm bg-slate-800 border border-slate-700 rounded-lg text-slate-50 focus:outline-none focus:border-accent-500">
    </label>
    <label class="block mb-6">
      <span class="text-xs font-medium text-slate-300 block mb-1">Azure DevOps UPN</span>
      <input id="inp-ado" type="text" placeholder="e.g. alice@company.com"
             class="w-full px-3 py-2 text-sm bg-slate-800 border border-slate-700 rounded-lg text-slate-50 focus:outline-none focus:border-accent-500">
    </label>
    <div class="flex gap-3 justify-end">
      <button id="btn-identity-cancel" class="chip">Cancel</button>
      <button id="btn-identity-save" class="px-4 py-2 text-xs font-semibold bg-accent-600 hover:bg-accent-500 text-white rounded-lg transition-colors">Save</button>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const modal = document.getElementById('identity-modal');
  const inpGh = document.getElementById('inp-gh');
  const inpAdo = document.getElementById('inp-ado');

  async function prefill() {
    try {
      const r = await fetch('/api/user/identity');
      if (!r.ok) return;
      const d = await r.json();
      inpGh.value  = d.github_handle || '';
      inpAdo.value = d.ado_upn || '';
    } catch (_) {}
  }

  function open()  { modal.style.display = 'flex'; }
  function close() { modal.style.display = 'none'; }

  async function save() {
    const gh  = inpGh.value.trim();
    const ado = inpAdo.value.trim();
    try {
      const r = await fetch('/api/user/identity', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ github_handle: gh || null, ado_upn: ado || null }),
      });
      if (!r.ok) throw new Error('save failed');
      close();
      window.location.reload();
    } catch (_) {
      alert('Failed to save identity. Make sure the database is connected.');
    }
  }

  document.getElementById('btn-identity').addEventListener('click', open);
  document.getElementById('btn-identity-cancel').addEventListener('click', close);
  document.getElementById('btn-identity-save').addEventListener('click', save);
  modal.addEventListener('click', e => { if (e.target === modal) close(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.style.display === 'flex') close(); });

  prefill();
})();
</script>
