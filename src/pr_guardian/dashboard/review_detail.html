<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Review Findings</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<aside id="sidebar"></aside>
<script src="/static/sidebar.js"></script>

<!-- Main content (offset for sidebar) -->
<div class="ml-16 lg:ml-64">

<!-- Header -->
<header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
  <div class="flex items-center gap-2 text-sm">
    <a href="/reviews" class="text-slate-400 hover:text-slate-50 transition-colors">Reviews</a>
    <span class="text-slate-600">/</span>
    <span class="font-semibold text-slate-50">Findings</span>
  </div>
</header>

<div class="max-w-5xl mx-auto px-6 py-6">
  <div id="loading" class="text-center py-16 text-slate-400 text-sm">Loading review...</div>
  <div id="error" class="text-center py-16 text-orange-400" style="display:none"></div>
  <div id="content" style="display:none">

    <!-- Decision banner -->
    <div id="banner" class="flex items-center gap-4 p-5 rounded-xl mb-6">
      <span class="text-3xl" id="banner-emoji"></span>
      <div class="flex-1">
        <div class="text-lg font-bold" id="banner-label"></div>
        <div class="text-sm text-slate-400 mt-1" id="banner-meta"></div>
      </div>
      <a id="pr-link" class="btn btn-sm btn-secondary" target="_blank">View PR</a>
      <div class="flex items-center gap-2">
        <span class="text-xs text-slate-400" id="dismissal-count" style="display:none">0 findings dismissed</span>
        <button id="re-review-btn" class="btn btn-sm btn-primary" onclick="triggerReReview()" style="display:none" title="Re-run review with dismissal feedback">Re-review with feedback</button>
      </div>
    </div>

    <!-- Review history (prior runs of same PR) -->
    <div id="history-section" style="display:none" class="mb-4">
      <div class="flex items-center gap-2 mb-2">
        <span class="text-xs font-semibold uppercase tracking-wider text-slate-500">Prior runs</span>
        <span class="text-2xs text-slate-600" id="history-count"></span>
      </div>
      <div id="history-list" class="flex gap-2 flex-wrap"></div>
    </div>

    <!-- Info cards -->
    <div class="grid grid-cols-5 gap-3 mb-6">
      <div class="stat-card"><div class="stat-card-label">Risk Tier</div><div class="stat-card-value" id="v-risk"></div></div>
      <div class="stat-card"><div class="stat-card-label">Risk Score</div><div class="stat-card-value" id="v-score"></div></div>
      <div class="stat-card"><div class="stat-card-label">Findings</div><div class="stat-card-value" id="v-findings"></div></div>
      <div class="stat-card"><div class="stat-card-label">Duration</div><div class="stat-card-value" id="v-duration"></div></div>
      <div class="stat-card"><div class="stat-card-label">Cost</div><div class="stat-card-value" id="v-cost"></div></div>
    </div>

    <!-- Summary -->
    <div id="summary-section" style="display:none" class="mb-6">
      <div class="card card-compact">
        <div class="card-body text-sm leading-relaxed text-slate-400" id="summary-text"></div>
      </div>
    </div>

    <!-- Mechanical checks -->
    <div id="mech-section" style="display:none" class="mb-6">
      <h3 class="text-base font-semibold mb-3">Mechanical Checks</h3>
      <div id="mech-list" class="flex gap-2.5 flex-wrap"></div>
    </div>

    <!-- Toolbar (sticky below header on scroll) -->
    <div class="sticky top-14 z-10 -mx-6 px-6 flex items-center gap-2.5 py-3 mb-1 flex-wrap bg-slate-900/90 backdrop-blur-md border-b border-slate-700/30" id="toolbar" style="display:none">
      <span class="text-sm text-slate-400 mr-auto" id="selection-count">0 selected</span>
      <button class="btn btn-sm btn-secondary" onclick="selectBySeverity('critical','high')">Select Critical + High</button>
      <button class="btn btn-sm btn-secondary" onclick="selectBySeverity('critical','high','medium')">+ Medium</button>
      <button class="btn btn-sm btn-secondary" onclick="selectAll()">Select All</button>
      <button class="btn btn-sm btn-secondary" onclick="deselectAll()">Deselect All</button>
      <button class="btn btn-sm btn-primary" id="export-btn" onclick="openExport()" disabled>Export for Agent Fix</button>
      <button class="btn btn-sm btn-secondary" id="batch-dismiss-btn" onclick="openBatchDismiss()" disabled style="border-color:rgba(251,146,60,0.4);color:#fb923c">Dismiss Selected</button>
    </div>

    <!-- Agent findings groups -->
    <div id="agents-container"></div>

    <!-- Prior dismissed findings (resolved in re-reviews) -->
    <div id="prior-dismissals-section" style="display:none" class="mt-6">
      <div class="card overflow-hidden">
        <div class="flex items-center gap-2.5 px-5 py-3.5 cursor-pointer select-none hover:bg-slate-700/40 transition-colors" onclick="togglePriorDismissals()">
          <span class="text-xs text-slate-400 transition-transform duration-150" id="prior-toggle">&#9654;</span>
          <span class="font-semibold text-sm text-slate-400">Previously Dismissed</span>
          <span class="text-xs text-slate-500 ml-auto" id="prior-count"></span>
        </div>
        <div class="border-t border-slate-700/50" id="prior-list" style="display:none"></div>
      </div>
    </div>

  </div>
</div>

</div><!-- /.ml-16 (sidebar offset wrapper) -->

<!-- Export modal (dialog pattern) -->
<div id="export-modal" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeExport()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-3xl">
      <div class="dialog-header">
        <h2 class="text-base font-semibold">Export Findings for Agent Fix</h2>
        <button class="btn btn-ghost btn-sm" onclick="closeExport()">&times;</button>
      </div>
      <div class="dialog-body">
        <textarea id="export-text" class="form-textarea font-mono text-xs min-h-[300px]" readonly></textarea>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" onclick="closeExport()">Close</button>
        <button class="btn btn-primary" id="copy-btn" onclick="copyExport()">Copy to Clipboard</button>
      </div>
    </div>
  </div>
</div>

<!-- Dismiss dialog -->
<div id="dismiss-modal" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeDismissDialog()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-md">
      <div class="dialog-header">
        <h2 class="text-base font-semibold">Dismiss Finding</h2>
        <button class="btn btn-ghost btn-sm" onclick="closeDismissDialog()">&times;</button>
      </div>
      <div class="dialog-body space-y-4">
        <div>
          <label class="block text-xs text-slate-400 mb-1">Status</label>
          <select id="dismiss-status" class="form-select w-full text-sm bg-slate-800 border border-slate-600 rounded px-3 py-2 text-slate-200">
            <option value="false_positive">False positive</option>
            <option value="by_design">By design</option>
            <option value="acknowledged">Acknowledged</option>
            <option value="will_fix">Will fix</option>
          </select>
        </div>
        <div>
          <label class="block text-xs text-slate-400 mb-1">Comment (optional)</label>
          <textarea id="dismiss-comment" class="form-textarea w-full text-sm bg-slate-800 border border-slate-600 rounded px-3 py-2 text-slate-200 min-h-[80px]" placeholder="e.g. 'Uses parameterized queries, safe from injection'"></textarea>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" onclick="closeDismissDialog()">Cancel</button>
        <button class="btn btn-primary" id="dismiss-submit-btn" onclick="submitDismiss()">Dismiss Finding</button>
      </div>
    </div>
  </div>
</div>

<script>
const REVIEW_ID = location.pathname.split('/reviews/')[1]?.split('/')[0] || '';
const DECISION_EMOJI = { auto_approve: '\u2705', human_review: '\ud83d\udc40', reject: '\u274c', hard_block: '\ud83d\udeab' };
const DECISION_LABEL = { auto_approve: 'Auto-Approved', human_review: 'Human Review Required', reject: 'Changes Requested', hard_block: 'Blocked' };
const AGENT_LABELS = {
  security_privacy: 'Security & Privacy',
  performance: 'Performance',
  architecture_intent: 'Architecture & Intent',
  code_quality_observability: 'Code Quality',
  test_quality: 'Test Quality',
  hotspot: 'Hotspots',
};

let reviewData = null;
let selectedFindings = new Set(); // "agentIdx-findingIdx"

async function loadReview() {
  if (!REVIEW_ID) { showError('No review ID in URL.'); return; }
  try {
    const resp = await fetch(`/api/dashboard/reviews/${REVIEW_ID}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    reviewData = data;
    render(data);
    loadReviewHistory();
  } catch (e) {
    showError(`Failed to load review: ${e.message}`);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.title = `PR Guardian — ${d.repo} #${d.pr_id}`;

  // Banner
  const banner = document.getElementById('banner');
  banner.className = 'flex items-center gap-4 p-5 rounded-xl mb-6 banner-' + (d.decision || '');
  document.getElementById('banner-emoji').textContent = DECISION_EMOJI[d.decision] || '\u2753';
  document.getElementById('banner-label').textContent = DECISION_LABEL[d.decision] || d.decision || 'Pending';
  document.getElementById('banner-meta').textContent = `${d.repo} #${d.pr_id} — ${d.title || ''} by ${d.author || 'unknown'}`;
  if (d.pr_url) {
    document.getElementById('pr-link').href = d.pr_url;
    document.getElementById('pr-link').style.display = '';
  } else {
    document.getElementById('pr-link').style.display = 'none';
  }

  // Info cards
  const tierColors = { high: '#f87171', medium: '#fb923c', low: '#60a5fa', trivial: '#34d399' };
  const tierTextClass = { high: 'text-red-400', medium: 'text-orange-400', low: 'text-blue-400', trivial: 'text-emerald-400' };

  const riskEl = document.getElementById('v-risk');
  riskEl.textContent = (d.risk_tier || '-').toUpperCase();
  if (d.risk_tier && tierTextClass[d.risk_tier]) {
    riskEl.className = 'stat-card-value ' + tierTextClass[d.risk_tier];
    riskEl.closest('.stat-card').style.borderTop = `2px solid ${tierColors[d.risk_tier]}`;
  }

  const scoreEl = document.getElementById('v-score');
  scoreEl.textContent = d.combined_score != null ? `${d.combined_score.toFixed(1)} / 10` : '-';
  if (d.combined_score != null) {
    const scoreColor = d.combined_score >= 5 ? '#f87171' : d.combined_score >= 3 ? '#fb923c' : d.combined_score >= 1 ? '#eab308' : '#34d399';
    scoreEl.style.color = scoreColor;
  }

  const totalFindings = (d.agent_results || []).reduce((sum, a) => sum + (a.findings || []).length, 0);
  document.getElementById('v-findings').textContent = totalFindings;
  if (totalFindings > 0) {
    document.getElementById('v-findings').closest('.stat-card').style.borderTop = '2px solid #fb923c';
  }
  document.getElementById('v-duration').textContent = d.duration_ms ? `${(d.duration_ms / 1000).toFixed(1)}s` : '-';
  document.getElementById('v-cost').textContent = d.cost_usd ? `$${d.cost_usd.toFixed(4)}` : '-';

  // Summary
  if (d.summary) {
    document.getElementById('summary-section').style.display = '';
    document.getElementById('summary-text').textContent = d.summary;
  }

  // Mechanical checks
  if (d.mechanical_results && d.mechanical_results.length) {
    document.getElementById('mech-section').style.display = '';
    const list = document.getElementById('mech-list');
    const passed = d.mechanical_results.filter(m => m.passed);
    const failed = d.mechanical_results.filter(m => !m.passed);
    const allPassed = failed.length === 0;

    if (allPassed) {
      // Compact: single bar showing all passed
      list.innerHTML = `
        <div class="flex items-center gap-2 px-4 py-2.5 rounded-lg bg-emerald-400/[0.06] border border-emerald-400/15">
          <span class="text-emerald-400 text-sm font-semibold">${passed.length}/${d.mechanical_results.length} passed</span>
          <span class="text-slate-500 text-xs">\u2014</span>
          <span class="text-xs text-slate-400">${d.mechanical_results.map(m => m.tool).join(', ')}</span>
        </div>`;
    } else {
      // Show failures prominently, passes compactly
      list.innerHTML = `
        ${failed.map(m => `
          <div class="flex items-center gap-2.5 px-4 py-2.5 rounded-lg bg-red-400/[0.06] border border-red-400/15 mb-2">
            <span class="text-red-400 font-bold text-sm">\u2717</span>
            <strong class="text-sm text-red-400">${esc(m.tool)}</strong>
            ${m.error ? `<span class="text-xs text-red-400/70">${esc(m.error)}</span>` : ''}
            ${m.findings?.length ? `<span class="text-2xs text-red-400/50">${m.findings.length} issue${m.findings.length !== 1 ? 's' : ''}</span>` : ''}
          </div>
        `).join('')}
        ${passed.length ? `
          <div class="flex items-center gap-2 px-4 py-2 rounded-lg bg-slate-800/50 text-xs text-slate-500">
            <span class="text-emerald-400">\u2713</span>
            ${passed.length} passed: ${passed.map(m => m.tool).join(', ')}
          </div>
        ` : ''}
      `;
    }
  }

  // Agent findings
  const agents = d.agent_results || [];
  if (agents.length) {
    document.getElementById('toolbar').style.display = '';
    const container = document.getElementById('agents-container');
    container.innerHTML = agents.map((agent, ai) => {
      const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
      const findings = agent.findings || [];
      const hasFindings = findings.length > 0;
      const verdictBorder = agent.verdict === 'pass' ? 'border-l-emerald-400/50' : agent.verdict === 'warn' ? 'border-l-orange-400/50' : agent.verdict === 'flag_human' ? 'border-l-red-400/50' : '';
      const verdictBg = agent.verdict === 'pass' ? '' : agent.verdict === 'warn' ? 'bg-orange-400/[0.02]' : agent.verdict === 'flag_human' ? 'bg-red-400/[0.03]' : '';
      return `
        <div class="card mb-4 overflow-hidden border-l-[3px] ${verdictBorder} ${verdictBg}" data-agent-idx="${ai}">
          <div class="flex items-center gap-2.5 px-5 py-3.5 cursor-pointer select-none hover:bg-slate-700/40 transition-colors" onclick="toggleAgent(${ai})">
            <span class="text-xs text-slate-400 transition-transform duration-150" id="toggle-${ai}">\u25b6</span>
            <span class="font-semibold text-sm">${esc(label)}</span>
            <span class="sev-badge verdict-${agent.verdict}">${agent.verdict}</span>
            <span class="text-xs text-slate-400 ml-auto">${findings.length} finding${findings.length !== 1 ? 's' : ''}</span>
            ${hasFindings ? `<input type="checkbox" class="form-checkbox group-check" onclick="toggleGroupCheck(event, ${ai})" title="Select/deselect all in this group">` : ''}
          </div>
          <div class="findings-collapse border-t border-slate-700/50" id="findings-${ai}">
            <div class="overflow-hidden">
              <div class="py-1">
                ${findings.map((f, fi) => renderFinding(ai, fi, f, agent.agent_name)).join('')}
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('agents-container').innerHTML = '<div class="empty-state"><div class="empty-state-text">No agent results available.</div></div>';
  }

  // Show dismissal count and re-review button
  const dCount = d.dismissal_count || 0;
  if (dCount > 0 || totalFindings > 0) {
    document.getElementById('re-review-btn').style.display = '';
  }
  if (dCount > 0) {
    const el = document.getElementById('dismissal-count');
    el.textContent = `${dCount} finding${dCount !== 1 ? 's' : ''} dismissed`;
    el.style.display = '';
  }

  // Prior dismissed findings (resolved / no longer flagged)
  const priorDismissals = d.prior_dismissals || [];
  if (priorDismissals.length) {
    document.getElementById('prior-dismissals-section').style.display = '';
    document.getElementById('prior-count').textContent = `${priorDismissals.length} resolved`;
    document.getElementById('prior-list').innerHTML = priorDismissals.map(renderPriorDismissal).join('');
  }

  updateSelectionCount();
}

function renderFinding(ai, fi, f, agentName) {
  const key = `${ai}-${fi}`;
  const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : '';
  const d = f.dismissal;
  const isDismissed = !!d;
  const dismissedClass = isDismissed ? ' opacity-60' : '';
  const sevBorder = f.severity === 'critical' ? 'border-l-red-400' : f.severity === 'high' ? 'border-l-orange-400' : f.severity === 'medium' ? 'border-l-yellow-400' : 'border-l-slate-600';
  return `
    <div class="finding-card mx-4 my-3 rounded-lg border border-slate-700/40 bg-slate-800/30 border-l-[3px] ${sevBorder}${dismissedClass}" data-key="${key}" data-finding-id="${f.id || ''}">
      <div class="flex items-start gap-3 p-4 pb-0">
        <input type="checkbox" class="form-checkbox f-check mt-0.5 shrink-0" data-key="${key}" onchange="toggleFinding('${key}')">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="sev-badge sev-${f.severity}">${f.severity}</span>
            <span class="cert-badge">${f.certainty}</span>
            ${f.category ? `<span class="text-xs text-slate-400 font-medium">${esc(f.category)}</span>` : ''}
            ${f.cwe ? `<span class="text-xs text-slate-500">${esc(f.cwe)}</span>` : ''}
          </div>
          ${loc ? `<div class="font-mono text-xs text-emerald-400 mt-1.5">${esc(loc)}</div>` : ''}
          <div class="text-sm mt-2 leading-relaxed text-slate-200">${esc(f.description || '')}</div>
          ${f.suggestion ? `
          <div class="mt-2">
            <button class="text-2xs text-emerald-400/60 hover:text-emerald-400 transition-colors font-medium tracking-wide uppercase" onclick="event.stopPropagation(); toggleSuggestion(this)">Show suggestion &#9656;</button>
            <div class="hidden mt-2 rounded-md bg-emerald-400/[0.05] border border-emerald-400/10 px-3 py-2.5">
              <div class="text-xs text-emerald-400 leading-relaxed">${esc(f.suggestion)}</div>
            </div>
          </div>` : ''}
        </div>
      </div>
      <div class="flex items-center gap-2 px-4 py-3 ml-7" data-dismiss-area="${key}">
        ${isDismissed ? renderDismissedBadge(d) : renderDismissButton(f.id)}
      </div>
    </div>`;
}

function renderDismissButton(findingId) {
  if (!findingId) return '';
  return `<button class="text-xs px-2 py-1 rounded border border-amber-400/40 bg-amber-400/10 text-amber-400 hover:bg-amber-400/20 transition-colors"
    onclick="openDismissDialog('${findingId}')">Dismiss</button>`;
}

function renderDismissedBadge(d) {
  const statusLabels = { by_design: 'By design', false_positive: 'False positive', acknowledged: 'Acknowledged', will_fix: 'Will fix' };
  const label = statusLabels[d.status] || d.status;
  const comment = d.comment ? ` \u2014 "${esc(d.comment)}"` : '';
  return `<span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded bg-amber-900/50 text-amber-400">
    ${esc(label)}${comment}
    <button class="ml-1 text-amber-600 hover:text-amber-300 transition-colors" onclick="undoDismiss('${d.id}')" title="Undo dismiss">\u2715</button>
  </span>`;
}

function renderPriorDismissal(d) {
  const f = d.source_finding || {};
  const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : '';
  const statusLabels = { by_design: 'By design', false_positive: 'False positive', acknowledged: 'Acknowledged', will_fix: 'Will fix' };
  const label = statusLabels[d.status] || d.status;
  const comment = d.comment ? ` \u2014 "${esc(d.comment)}"` : '';
  return `
    <div class="flex items-start gap-3 px-5 py-3 border-b border-slate-700/30 last:border-b-0 opacity-50">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          ${f.severity ? `<span class="sev-badge sev-${f.severity}">${f.severity}</span>` : ''}
          ${f.certainty ? `<span class="cert-badge">${f.certainty}</span>` : ''}
          ${loc ? `<span class="font-mono text-xs text-emerald-400">${esc(loc)}</span>` : ''}
          ${f.category ? `<span class="text-xs text-slate-400">${esc(f.category)}</span>` : ''}
          ${f.agent_name ? `<span class="text-xs text-slate-500">${esc(f.agent_name)}</span>` : ''}
        </div>
        <div class="text-sm mt-1.5 leading-relaxed text-slate-400">${esc(f.description || '')}</div>
        <div class="flex items-center gap-2 mt-2">
          <span class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded bg-slate-700/50 text-slate-400">${esc(label)}${comment}</span>
          <span class="text-xs text-slate-600">Resolved</span>
        </div>
      </div>
    </div>`;
}

function togglePriorDismissals() {
  const list = document.getElementById('prior-list');
  const toggle = document.getElementById('prior-toggle');
  const visible = list.style.display !== 'none';
  list.style.display = visible ? 'none' : '';
  toggle.style.transform = visible ? '' : 'rotate(90deg)';
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Selection logic ---

function toggleFinding(key) {
  if (selectedFindings.has(key)) selectedFindings.delete(key);
  else selectedFindings.add(key);
  syncCheckboxes();
  updateSelectionCount();
}

function toggleGroupCheck(e, ai) {
  e.stopPropagation();
  const checked = e.target.checked;
  const findings = reviewData.agent_results[ai].findings || [];
  findings.forEach((f, fi) => {
    if (f.dismissal) return; // skip dismissed
    const key = `${ai}-${fi}`;
    if (checked) selectedFindings.add(key); else selectedFindings.delete(key);
  });
  syncCheckboxes();
  updateSelectionCount();
}

function selectBySeverity(...sevs) {
  const agents = reviewData.agent_results || [];
  agents.forEach((agent, ai) => {
    (agent.findings || []).forEach((f, fi) => {
      if (sevs.includes(f.severity) && !f.dismissal) selectedFindings.add(`${ai}-${fi}`);
    });
  });
  syncCheckboxes();
  updateSelectionCount();
}

function selectAll() {
  const agents = reviewData.agent_results || [];
  agents.forEach((agent, ai) => {
    (agent.findings || []).forEach((f, fi) => {
      if (!f.dismissal) selectedFindings.add(`${ai}-${fi}`);
    });
  });
  syncCheckboxes();
  updateSelectionCount();
}

function deselectAll() {
  selectedFindings.clear();
  syncCheckboxes();
  updateSelectionCount();
}

function syncCheckboxes() {
  document.querySelectorAll('.f-check').forEach(cb => {
    cb.checked = selectedFindings.has(cb.dataset.key);
  });
  // Sync group checkboxes (ignore dismissed findings)
  (reviewData.agent_results || []).forEach((agent, ai) => {
    const groupCb = document.querySelector(`[data-agent-idx="${ai}"] .group-check`);
    if (!groupCb) return;
    const findings = agent.findings || [];
    const active = findings.filter(f => !f.dismissal);
    const allSelected = active.length > 0 && active.every((f, _) => {
      const fi = findings.indexOf(f);
      return selectedFindings.has(`${ai}-${fi}`);
    });
    const someSelected = findings.some((f, fi) => !f.dismissal && selectedFindings.has(`${ai}-${fi}`));
    groupCb.checked = allSelected;
    groupCb.indeterminate = someSelected && !allSelected;
  });
}

function updateSelectionCount() {
  const n = selectedFindings.size;
  document.getElementById('selection-count').textContent = `${n} selected`;
  document.getElementById('export-btn').disabled = n === 0;
  document.getElementById('batch-dismiss-btn').disabled = n === 0;
}

// --- Agent group toggle ---

function toggleAgent(ai) {
  const list = document.getElementById(`findings-${ai}`);
  const toggle = document.getElementById(`toggle-${ai}`);
  const expanding = !list.classList.contains('expanded');
  list.classList.toggle('expanded');
  toggle.style.transform = expanding ? 'rotate(90deg)' : '';
  // Staggered fade-in for finding cards on expand
  if (expanding) {
    const cards = list.querySelectorAll('.finding-card');
    cards.forEach((card, i) => {
      card.style.opacity = '0';
      card.style.transform = 'translateY(4px)';
      setTimeout(() => {
        card.style.transition = 'opacity 0.2s ease-out, transform 0.2s ease-out';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, i * 30);
    });
  }
}

function toggleSuggestion(btn) {
  const box = btn.nextElementSibling;
  const isHidden = box.classList.toggle('hidden');
  btn.innerHTML = isHidden ? 'Show suggestion &#9656;' : 'Hide suggestion &#9662;';
}

// --- Export ---

function openExport() {
  if (!selectedFindings.size) return;
  const text = buildExportText();
  document.getElementById('export-text').value = text;
  document.getElementById('export-modal').classList.remove('hidden');
}

function closeExport() {
  document.getElementById('export-modal').classList.add('hidden');
}

function copyExport() {
  const textarea = document.getElementById('export-text');
  navigator.clipboard.writeText(textarea.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    showToast('Copied to clipboard');
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 2000);
  });
}

// ---- Batch dismiss ----

function openBatchDismiss() {
  if (!selectedFindings.size) return;
  // Reuse the dismiss dialog but for batch
  dismissFindingId = '__batch__';
  document.getElementById('dismiss-modal').classList.remove('hidden');
  document.getElementById('dismiss-comment').value = '';
  document.getElementById('dismiss-status').value = 'acknowledged';
  // Update dialog title
  document.querySelector('#dismiss-modal .dialog-header h2').textContent = `Dismiss ${selectedFindings.size} Finding${selectedFindings.size !== 1 ? 's' : ''}`;
}

async function submitBatchDismiss() {
  const status = document.getElementById('dismiss-status').value;
  const comment = document.getElementById('dismiss-comment').value.trim();

  // Collect finding IDs from selection
  const findingIds = [];
  const agents = reviewData.agent_results || [];
  selectedFindings.forEach(key => {
    const [ai, fi] = key.split('-').map(Number);
    const finding = agents[ai]?.findings?.[fi];
    if (finding?.id && !finding.dismissal) findingIds.push(finding.id);
  });

  if (!findingIds.length) {
    showToast('No dismissable findings selected', 'warning');
    closeDismissDialog();
    return;
  }

  const btn = document.getElementById('dismiss-submit-btn');
  btn.disabled = true;
  btn.textContent = `Dismissing ${findingIds.length}...`;

  try {
    const resp = await fetch('/api/dashboard/findings/batch-dismiss', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ finding_ids: findingIds, status, comment }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const result = await resp.json();
    closeDismissDialog();
    showToast(`${result.dismissed} finding${result.dismissed !== 1 ? 's' : ''} dismissed`);
    selectedFindings.clear();
    loadReview();
  } catch (e) {
    showToast(`Batch dismiss failed: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Dismiss Finding';
  }
}

// ---- Toast notifications ----
function showToast(msg, type = 'success') {
  let container = document.getElementById('toast-container');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toast-container';
    container.className = 'toast-container';
    document.body.appendChild(container);
  }
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="text-sm">${esc(msg)}</span>`;
  container.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    setTimeout(() => el.remove(), 300);
  }, 3500);
}

function buildExportText() {
  const d = reviewData;
  const lines = [];
  lines.push(`# PR Guardian Findings — ${d.repo} #${d.pr_id}`);
  lines.push('');
  lines.push(`PR: ${d.title || ''}`);
  lines.push(`Author: ${d.author || 'unknown'}`);
  lines.push(`Branch: ${d.source_branch || '?'} → ${d.target_branch || '?'}`);
  if (d.pr_url) lines.push(`URL: ${d.pr_url}`);
  lines.push('');
  lines.push('## Findings to Fix');
  lines.push('');

  const agents = d.agent_results || [];
  let idx = 0;
  agents.forEach((agent, ai) => {
    const agentFindings = [];
    (agent.findings || []).forEach((f, fi) => {
      if (selectedFindings.has(`${ai}-${fi}`)) agentFindings.push(f);
    });
    if (!agentFindings.length) return;

    const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
    lines.push(`### ${label}`);
    lines.push('');
    agentFindings.forEach(f => {
      idx++;
      const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : 'unknown location';
      lines.push(`**${idx}. [${f.severity.toUpperCase()}] ${f.category || 'Issue'}** — \`${loc}\``);
      if (f.description) lines.push(`   ${f.description}`);
      if (f.suggestion) lines.push(`   Suggestion: ${f.suggestion}`);
      if (f.cwe) lines.push(`   CWE: ${f.cwe}`);
      lines.push('');
    });
  });

  lines.push('---');
  lines.push('Please fix the above findings. For each one, show the current code and your proposed fix.');

  return lines.join('\n');
}

// --- Dismiss dialog ---

let dismissFindingId = null;

function openDismissDialog(findingId) {
  dismissFindingId = findingId;
  document.getElementById('dismiss-modal').classList.remove('hidden');
  document.getElementById('dismiss-comment').value = '';
  document.getElementById('dismiss-status').value = 'false_positive';
  document.querySelector('#dismiss-modal .dialog-header h2').textContent = 'Dismiss Finding';
}

function closeDismissDialog() {
  document.getElementById('dismiss-modal').classList.add('hidden');
  dismissFindingId = null;
}

async function submitDismiss() {
  if (!dismissFindingId) return;
  if (dismissFindingId === '__batch__') return submitBatchDismiss();
  const status = document.getElementById('dismiss-status').value;
  const comment = document.getElementById('dismiss-comment').value.trim();
  const btn = document.getElementById('dismiss-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    const resp = await fetch(`/api/dashboard/findings/${dismissFindingId}/dismiss`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status, comment }),
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    // Optimistic: gray out the finding card immediately
    const card = document.querySelector(`[data-finding-id="${dismissFindingId}"]`);
    if (card) card.classList.add('dismissing');
    closeDismissDialog();
    showToast('Finding dismissed');
    loadReview();
  } catch (e) {
    showToast(`Failed to dismiss: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Dismiss Finding';
  }
}

async function undoDismiss(dismissalId) {
  try {
    const resp = await fetch(`/api/dashboard/dismissals/${dismissalId}`, { method: 'DELETE' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    showToast('Dismissal undone');
    loadReview();
  } catch (e) {
    showToast(`Failed to undo: ${e.message}`, 'error');
  }
}

// --- Re-review ---

async function triggerReReview() {
  const btn = document.getElementById('re-review-btn');
  btn.disabled = true;
  btn.textContent = 'Queuing...';

  try {
    const resp = await fetch(`/api/dashboard/reviews/${REVIEW_ID}/re-review`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    btn.textContent = 'Queued! Redirecting...';
    showToast('Re-review queued');
    setTimeout(() => { window.location.href = '/dashboard'; }, 1500);
  } catch (e) {
    showToast(`Re-review failed: ${e.message}`, 'error');
    btn.disabled = false;
    btn.textContent = 'Re-review with feedback';
  }
}

// ---- Review history (prior runs of same PR) ----
async function loadReviewHistory() {
  if (!reviewData) return;
  try {
    const resp = await fetch(`/api/dashboard/reviews?repo=${encodeURIComponent(reviewData.repo)}&limit=50`);
    if (!resp.ok) return;
    const reviews = await resp.json();
    const prRuns = reviews
      .filter(r => String(r.pr_id) === String(reviewData.pr_id) && r.id !== REVIEW_ID)
      .sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
    if (!prRuns.length) return;

    document.getElementById('history-section').style.display = '';
    document.getElementById('history-count').textContent = `${prRuns.length + 1} total runs`;

    const dl = { auto_approve: 'Approved', human_review: 'Review', reject: 'Rejected', hard_block: 'Blocked' };
    const dc = {
      auto_approve: 'bg-emerald-400/[0.08] text-emerald-400 border-emerald-400/20',
      human_review: 'bg-orange-400/[0.08] text-orange-400 border-orange-400/20',
      reject: 'bg-red-400/[0.08] text-red-400 border-red-400/20',
      hard_block: 'bg-red-400/[0.08] text-red-400 border-red-400/20',
    };

    document.getElementById('history-list').innerHTML = prRuns.map(r => {
      const cls = dc[r.decision] || 'bg-slate-400/[0.08] text-slate-400 border-slate-400/20';
      const label = dl[r.decision] || r.decision || '?';
      const score = r.combined_score != null ? ` \u00b7 ${r.combined_score.toFixed(1)}` : '';
      const time = formatTimeShort(r.started_at);
      return `<a href="/reviews/${r.id}" class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg border text-xs ${cls} hover:brightness-125 transition-all" title="${new Date(r.started_at).toLocaleString()}">
        <span class="font-semibold">${esc(label)}</span>
        <span class="opacity-50 text-2xs">${score}</span>
        <span class="opacity-40 text-2xs">${esc(time)}</span>
      </a>`;
    }).join('');
  } catch {}
}

function formatTimeShort(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
  return d.toLocaleDateString();
}

// Init
loadReview();
</script>
