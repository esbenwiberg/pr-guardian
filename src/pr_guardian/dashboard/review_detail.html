<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Review Findings</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232733;
  --border: #2e3345;
  --text: #e1e4ed;
  --text-dim: #8b90a0;
  --accent: #6c5ce7;
  --accent-light: #a29bfe;
  --green: #00b894;
  --yellow: #fdcb6e;
  --orange: #e17055;
  --red: #d63031;
  --blue: #0984e3;
  --radius: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header h1 { font-size: 20px; font-weight: 600; }
.header .logo { font-size: 24px; color: var(--accent-light); }
.header .back-link {
  margin-left: auto;
  font-size: 13px;
  color: var(--text-dim);
}
.header .back-link:hover { color: var(--accent-light); }

.container { max-width: 1100px; margin: 0 auto; padding: 24px; }

/* Decision banner */
.decision-banner {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 24px;
  border-radius: var(--radius);
  margin-bottom: 24px;
  border: 1px solid var(--border);
}
.decision-banner.auto_approve { background: rgba(0,184,148,.12); border-color: var(--green); }
.decision-banner.human_review { background: rgba(9,132,227,.12); border-color: var(--blue); }
.decision-banner.reject { background: rgba(225,112,85,.12); border-color: var(--orange); }
.decision-banner.hard_block { background: rgba(214,48,49,.12); border-color: var(--red); }
.decision-banner .emoji { font-size: 32px; }
.decision-banner .info { flex: 1; }
.decision-banner .label { font-size: 18px; font-weight: 700; }
.decision-banner .meta { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.decision-banner .pr-link {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  color: var(--accent-light);
}

/* Info row */
.info-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 24px;
}
.info-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 18px;
}
.info-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: .5px; }
.info-card .value { font-size: 18px; font-weight: 700; margin-top: 4px; }

/* Toolbar */
.toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.toolbar .count { font-size: 13px; color: var(--text-dim); margin-right: auto; }
.toolbar button {
  padding: 6px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
}
.toolbar button:hover { border-color: var(--accent); color: var(--accent-light); }
.toolbar button.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-weight: 600;
}
.toolbar button.primary:hover { background: var(--accent-light); color: var(--bg); }
.toolbar button.primary:disabled {
  opacity: .4;
  cursor: not-allowed;
  background: var(--surface2);
  border-color: var(--border);
  color: var(--text-dim);
}

/* Agent groups */
.agent-group {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  overflow: hidden;
}
.agent-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  cursor: pointer;
  user-select: none;
}
.agent-header:hover { background: var(--surface2); }
.agent-header .toggle { font-size: 12px; color: var(--text-dim); transition: transform .15s; }
.agent-header .toggle.open { transform: rotate(90deg); }
.agent-header .agent-name { font-weight: 600; font-size: 15px; }
.agent-header .verdict-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  text-transform: uppercase;
}
.verdict-pass { background: rgba(0,184,148,.15); color: var(--green); }
.verdict-warn { background: rgba(253,203,110,.15); color: var(--yellow); }
.verdict-flag_human { background: rgba(225,112,85,.15); color: var(--orange); }
.agent-header .finding-count { font-size: 12px; color: var(--text-dim); margin-left: auto; }
.agent-header .group-check {
  width: 16px; height: 16px;
  accent-color: var(--accent);
  cursor: pointer;
}

.findings-list { border-top: 1px solid var(--border); }
.findings-list.collapsed { display: none; }

/* Finding row */
.finding-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
}
.finding-row:last-child { border-bottom: none; }
.finding-row .f-check {
  width: 16px; height: 16px;
  margin-top: 2px;
  accent-color: var(--accent);
  cursor: pointer;
  flex-shrink: 0;
}
.finding-row .f-body { flex: 1; min-width: 0; }
.finding-row .f-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.sev-badge {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  font-weight: 700;
  text-transform: uppercase;
}
.sev-critical { background: rgba(214,48,49,.2); color: var(--red); }
.sev-high { background: rgba(225,112,85,.2); color: var(--orange); }
.sev-medium { background: rgba(253,203,110,.2); color: var(--yellow); }
.sev-low { background: rgba(139,144,160,.2); color: var(--text-dim); }
.cert-badge {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--text-dim);
}
.f-location {
  font-size: 12px;
  color: var(--accent-light);
  font-family: 'SF Mono', Menlo, monospace;
}
.f-category { font-size: 12px; color: var(--text-dim); }
.f-desc { font-size: 13px; margin-top: 6px; line-height: 1.5; }
.f-suggestion {
  font-size: 12px;
  color: var(--green);
  margin-top: 4px;
  padding-left: 12px;
  border-left: 2px solid var(--green);
}
.f-cwe { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

/* Mechanical section */
.mech-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  padding: 14px 18px;
}
.mech-section h3 { font-size: 15px; margin-bottom: 10px; }
.mech-item { display: flex; gap: 8px; font-size: 13px; padding: 4px 0; }
.mech-item .status { font-size: 14px; }

/* Export modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 1000;
  justify-content: center;
  align-items: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%;
  max-width: 800px;
  max-height: 80vh;
  display: flex;
  flex-direction: column;
}
.modal-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.modal-header h2 { font-size: 16px; flex: 1; }
.modal-header .close-btn {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
}
.modal-header .close-btn:hover { color: var(--text); }
.modal-body {
  padding: 20px;
  overflow-y: auto;
  flex: 1;
}
.modal-body textarea {
  width: 100%;
  min-height: 300px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: 'SF Mono', Menlo, monospace;
  font-size: 12px;
  padding: 12px;
  resize: vertical;
}
.modal-footer {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  padding: 12px 20px;
  border-top: 1px solid var(--border);
}
.modal-footer button {
  padding: 8px 18px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  border: 1px solid var(--border);
}
.modal-footer .btn-copy {
  background: var(--accent);
  border-color: var(--accent);
  color: white;
  font-weight: 600;
}
.modal-footer .btn-copy:hover { background: var(--accent-light); color: var(--bg); }
.modal-footer .btn-secondary {
  background: var(--surface2);
  color: var(--text);
}

/* Loading */
.loading {
  text-align: center;
  padding: 60px;
  color: var(--text-dim);
  font-size: 14px;
}
.error-msg {
  text-align: center;
  padding: 60px;
  color: var(--orange);
}

/* Empty state */
.empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 14px; }
</style>
</head>
<body>

<div class="header">
  <span class="logo">&#x1f6e1;</span>
  <h1>PR Guardian</h1>
  <a class="back-link" href="/dashboard">&larr; Dashboard</a>
</div>

<div class="container">
  <div id="loading" class="loading">Loading review...</div>
  <div id="error" class="error-msg" style="display:none"></div>
  <div id="content" style="display:none">

    <!-- Decision banner -->
    <div id="banner" class="decision-banner">
      <span class="emoji" id="banner-emoji"></span>
      <div class="info">
        <div class="label" id="banner-label"></div>
        <div class="meta" id="banner-meta"></div>
      </div>
      <a id="pr-link" class="pr-link" target="_blank">View PR</a>
    </div>

    <!-- Info cards -->
    <div class="info-row">
      <div class="info-card"><div class="label">Risk Tier</div><div class="value" id="v-risk"></div></div>
      <div class="info-card"><div class="label">Score</div><div class="value" id="v-score"></div></div>
      <div class="info-card"><div class="label">Findings</div><div class="value" id="v-findings"></div></div>
      <div class="info-card"><div class="label">Duration</div><div class="value" id="v-duration"></div></div>
      <div class="info-card"><div class="label">Cost</div><div class="value" id="v-cost"></div></div>
    </div>

    <!-- Summary -->
    <div id="summary-section" style="display:none; margin-bottom:24px">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;font-size:13px;line-height:1.6;color:var(--text-dim)" id="summary-text"></div>
    </div>

    <!-- Mechanical checks -->
    <div id="mech-section" class="mech-section" style="display:none">
      <h3>Mechanical Checks</h3>
      <div id="mech-list"></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar" id="toolbar" style="display:none">
      <span class="count" id="selection-count">0 selected</span>
      <button onclick="selectBySeverity('critical','high')">Select Critical + High</button>
      <button onclick="selectBySeverity('critical','high','medium')">+ Medium</button>
      <button onclick="selectAll()">Select All</button>
      <button onclick="deselectAll()">Deselect All</button>
      <button class="primary" id="export-btn" onclick="openExport()" disabled>Export for Agent Fix</button>
    </div>

    <!-- Agent findings groups -->
    <div id="agents-container"></div>

  </div>
</div>

<!-- Export modal -->
<div class="modal-overlay" id="export-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>Export Findings for Agent Fix</h2>
      <button class="close-btn" onclick="closeExport()">&times;</button>
    </div>
    <div class="modal-body">
      <textarea id="export-text" readonly></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeExport()">Close</button>
      <button class="btn-copy" onclick="copyExport()">Copy to Clipboard</button>
    </div>
  </div>
</div>

<script>
const REVIEW_ID = location.pathname.split('/reviews/')[1]?.split('/')[0] || '';
const DECISION_EMOJI = { auto_approve: '\u2705', human_review: '\ud83d\udc40', reject: '\u274c', hard_block: '\ud83d\udeab' };
const DECISION_LABEL = { auto_approve: 'Auto-Approved', human_review: 'Human Review Required', reject: 'Changes Requested', hard_block: 'Blocked' };
const AGENT_LABELS = {
  security_privacy: 'Security & Privacy',
  performance: 'Performance',
  architecture_intent: 'Architecture & Intent',
  code_quality_observability: 'Code Quality',
  test_quality: 'Test Quality',
  hotspot: 'Hotspots',
};

let reviewData = null;
let selectedFindings = new Set(); // "agentIdx-findingIdx"

async function loadReview() {
  if (!REVIEW_ID) { showError('No review ID in URL.'); return; }
  try {
    const resp = await fetch(`/api/dashboard/reviews/${REVIEW_ID}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    reviewData = data;
    render(data);
  } catch (e) {
    showError(`Failed to load review: ${e.message}`);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.title = `PR Guardian — ${d.repo} #${d.pr_id}`;

  // Banner
  const banner = document.getElementById('banner');
  banner.className = `decision-banner ${d.decision || ''}`;
  document.getElementById('banner-emoji').textContent = DECISION_EMOJI[d.decision] || '\u2753';
  document.getElementById('banner-label').textContent = DECISION_LABEL[d.decision] || d.decision || 'Pending';
  document.getElementById('banner-meta').textContent = `${d.repo} #${d.pr_id} — ${d.title || ''} by ${d.author || 'unknown'}`;
  if (d.pr_url) {
    document.getElementById('pr-link').href = d.pr_url;
    document.getElementById('pr-link').style.display = '';
  } else {
    document.getElementById('pr-link').style.display = 'none';
  }

  // Info cards
  document.getElementById('v-risk').textContent = (d.risk_tier || '-').toUpperCase();
  document.getElementById('v-score').textContent = d.combined_score != null ? `${d.combined_score.toFixed(1)} / 10` : '-';
  const totalFindings = (d.agent_results || []).reduce((sum, a) => sum + (a.findings || []).length, 0);
  document.getElementById('v-findings').textContent = totalFindings;
  document.getElementById('v-duration').textContent = d.duration_ms ? `${(d.duration_ms / 1000).toFixed(1)}s` : '-';
  document.getElementById('v-cost').textContent = d.cost_usd ? `$${d.cost_usd.toFixed(4)}` : '-';

  // Summary
  if (d.summary) {
    document.getElementById('summary-section').style.display = '';
    document.getElementById('summary-text').textContent = d.summary;
  }

  // Mechanical checks
  if (d.mechanical_results && d.mechanical_results.length) {
    document.getElementById('mech-section').style.display = '';
    const list = document.getElementById('mech-list');
    list.innerHTML = d.mechanical_results.map(m =>
      `<div class="mech-item"><span class="status">${m.passed ? '\u2705' : '\u274c'}</span><strong>${esc(m.tool)}</strong>${m.error ? ` — <span style="color:var(--orange)">${esc(m.error)}</span>` : ''}</div>`
    ).join('');
  }

  // Agent findings
  const agents = d.agent_results || [];
  if (agents.length) {
    document.getElementById('toolbar').style.display = '';
    const container = document.getElementById('agents-container');
    container.innerHTML = agents.map((agent, ai) => {
      const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
      const findings = agent.findings || [];
      const hasFindings = findings.length > 0;
      return `
        <div class="agent-group" data-agent-idx="${ai}">
          <div class="agent-header" onclick="toggleAgent(${ai})">
            <span class="toggle ${hasFindings ? 'open' : ''}" id="toggle-${ai}">\u25b6</span>
            <span class="agent-name">${esc(label)}</span>
            <span class="verdict-badge verdict-${agent.verdict}">${agent.verdict}</span>
            <span class="finding-count">${findings.length} finding${findings.length !== 1 ? 's' : ''}</span>
            ${hasFindings ? `<input type="checkbox" class="group-check" onclick="toggleGroupCheck(event, ${ai})" title="Select/deselect all in this group">` : ''}
          </div>
          <div class="findings-list ${hasFindings ? '' : 'collapsed'}" id="findings-${ai}">
            ${findings.map((f, fi) => renderFinding(ai, fi, f)).join('')}
          </div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('agents-container').innerHTML = '<div class="empty">No agent results available.</div>';
  }

  updateSelectionCount();
}

function renderFinding(ai, fi, f) {
  const key = `${ai}-${fi}`;
  const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : '';
  return `
    <div class="finding-row" data-key="${key}">
      <input type="checkbox" class="f-check" data-key="${key}" onchange="toggleFinding('${key}')">
      <div class="f-body">
        <div class="f-top">
          <span class="sev-badge sev-${f.severity}">${f.severity}</span>
          <span class="cert-badge">${f.certainty}</span>
          ${loc ? `<span class="f-location">${esc(loc)}</span>` : ''}
          ${f.category ? `<span class="f-category">${esc(f.category)}</span>` : ''}
          ${f.cwe ? `<span class="f-cwe">${esc(f.cwe)}</span>` : ''}
        </div>
        <div class="f-desc">${esc(f.description || '')}</div>
        ${f.suggestion ? `<div class="f-suggestion">${esc(f.suggestion)}</div>` : ''}
      </div>
    </div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Selection logic ---

function toggleFinding(key) {
  if (selectedFindings.has(key)) selectedFindings.delete(key);
  else selectedFindings.add(key);
  syncCheckboxes();
  updateSelectionCount();
}

function toggleGroupCheck(e, ai) {
  e.stopPropagation();
  const checked = e.target.checked;
  const findings = reviewData.agent_results[ai].findings || [];
  findings.forEach((_, fi) => {
    const key = `${ai}-${fi}`;
    if (checked) selectedFindings.add(key); else selectedFindings.delete(key);
  });
  syncCheckboxes();
  updateSelectionCount();
}

function selectBySeverity(...sevs) {
  const agents = reviewData.agent_results || [];
  agents.forEach((agent, ai) => {
    (agent.findings || []).forEach((f, fi) => {
      if (sevs.includes(f.severity)) selectedFindings.add(`${ai}-${fi}`);
    });
  });
  syncCheckboxes();
  updateSelectionCount();
}

function selectAll() {
  const agents = reviewData.agent_results || [];
  agents.forEach((agent, ai) => {
    (agent.findings || []).forEach((_, fi) => selectedFindings.add(`${ai}-${fi}`));
  });
  syncCheckboxes();
  updateSelectionCount();
}

function deselectAll() {
  selectedFindings.clear();
  syncCheckboxes();
  updateSelectionCount();
}

function syncCheckboxes() {
  document.querySelectorAll('.f-check').forEach(cb => {
    cb.checked = selectedFindings.has(cb.dataset.key);
  });
  // Sync group checkboxes
  (reviewData.agent_results || []).forEach((agent, ai) => {
    const groupCb = document.querySelector(`.agent-group[data-agent-idx="${ai}"] .group-check`);
    if (!groupCb) return;
    const findings = agent.findings || [];
    const allSelected = findings.length > 0 && findings.every((_, fi) => selectedFindings.has(`${ai}-${fi}`));
    const someSelected = findings.some((_, fi) => selectedFindings.has(`${ai}-${fi}`));
    groupCb.checked = allSelected;
    groupCb.indeterminate = someSelected && !allSelected;
  });
}

function updateSelectionCount() {
  const n = selectedFindings.size;
  document.getElementById('selection-count').textContent = `${n} selected`;
  document.getElementById('export-btn').disabled = n === 0;
}

// --- Agent group toggle ---

function toggleAgent(ai) {
  const list = document.getElementById(`findings-${ai}`);
  const toggle = document.getElementById(`toggle-${ai}`);
  const collapsed = list.classList.toggle('collapsed');
  toggle.classList.toggle('open', !collapsed);
}

// --- Export ---

function openExport() {
  if (!selectedFindings.size) return;
  const text = buildExportText();
  document.getElementById('export-text').value = text;
  document.getElementById('export-modal').classList.add('visible');
}

function closeExport() {
  document.getElementById('export-modal').classList.remove('visible');
}

function copyExport() {
  const textarea = document.getElementById('export-text');
  navigator.clipboard.writeText(textarea.value).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 2000);
  });
}

function buildExportText() {
  const d = reviewData;
  const lines = [];
  lines.push(`# PR Guardian Findings — ${d.repo} #${d.pr_id}`);
  lines.push('');
  lines.push(`PR: ${d.title || ''}`);
  lines.push(`Author: ${d.author || 'unknown'}`);
  lines.push(`Branch: ${d.source_branch || '?'} → ${d.target_branch || '?'}`);
  if (d.pr_url) lines.push(`URL: ${d.pr_url}`);
  lines.push('');
  lines.push('## Findings to Fix');
  lines.push('');

  const agents = d.agent_results || [];
  let idx = 0;
  agents.forEach((agent, ai) => {
    const agentFindings = [];
    (agent.findings || []).forEach((f, fi) => {
      if (selectedFindings.has(`${ai}-${fi}`)) agentFindings.push(f);
    });
    if (!agentFindings.length) return;

    const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
    lines.push(`### ${label}`);
    lines.push('');
    agentFindings.forEach(f => {
      idx++;
      const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : 'unknown location';
      lines.push(`**${idx}. [${f.severity.toUpperCase()}] ${f.category || 'Issue'}** — \`${loc}\``);
      if (f.description) lines.push(`   ${f.description}`);
      if (f.suggestion) lines.push(`   Suggestion: ${f.suggestion}`);
      if (f.cwe) lines.push(`   CWE: ${f.cwe}`);
      lines.push('');
    });
  });

  lines.push('---');
  lines.push('Please fix the above findings. For each one, show the current code and your proposed fix.');

  return lines.join('\n');
}

// Init
loadReview();
</script>
