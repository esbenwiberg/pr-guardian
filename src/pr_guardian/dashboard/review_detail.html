<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Review Findings</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

      <span class="hidden lg:block">Dashboard</span>

    <a href="/reviews" class="sidebar-item">

      <span class="hidden lg:block">Reviews</span>

    <a href="/scans" class="sidebar-item">

      <span class="hidden lg:block">Prompts</span>
    </a>

  </nav>
  <div class="sidebar-footer hidden lg:block">
    <div class="text-2xs text-slate-500 px-3 py-2">PR Guardian v0.1</div>

</aside>

<!-- Main content (offset for sidebar) -->
<div class="ml-16 lg:ml-64">

<!-- Header -->
<header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
  <h1 class="text-sm font-semibold text-slate-50">Review Findings</h1>
  <a href="/dashboard" class="text-sm text-slate-400 hover:text-slate-50 transition-colors">&larr; Back to Dashboard</a>
</header>

<div class="max-w-5xl mx-auto px-6 py-6">
  <div id="loading" class="text-center py-16 text-slate-400 text-sm">Loading review...</div>
  <div id="error" class="text-center py-16 text-orange-400" style="display:none"></div>
  <div id="content" style="display:none">

    <!-- Decision banner -->
    <div id="banner" class="flex items-center gap-4 p-5 rounded-xl mb-6">
      <span class="text-3xl" id="banner-emoji"></span>
      <div class="flex-1">
        <div class="text-lg font-bold" id="banner-label"></div>
        <div class="text-sm text-slate-400 mt-1" id="banner-meta"></div>
      </div>
      <a id="pr-link" class="btn btn-sm btn-secondary" target="_blank">View PR</a>
    </div>

    <!-- Info cards -->
    <div class="grid grid-cols-5 gap-3 mb-6">
      <div class="stat-card"><div class="stat-card-label">Risk Tier</div><div class="stat-card-value" id="v-risk"></div></div>
      <div class="stat-card"><div class="stat-card-label">Score</div><div class="stat-card-value" id="v-score"></div></div>
      <div class="stat-card"><div class="stat-card-label">Findings</div><div class="stat-card-value" id="v-findings"></div></div>
      <div class="stat-card"><div class="stat-card-label">Duration</div><div class="stat-card-value" id="v-duration"></div></div>
      <div class="stat-card"><div class="stat-card-label">Cost</div><div class="stat-card-value" id="v-cost"></div></div>
    </div>

    <!-- Summary -->
    <div id="summary-section" style="display:none" class="mb-6">
      <div class="card card-compact">
        <div class="card-body text-sm leading-relaxed text-slate-400" id="summary-text"></div>
      </div>
    </div>

    <!-- Mechanical checks -->
    <div id="mech-section" style="display:none" class="mb-6">
      <h3 class="text-base font-semibold mb-3">Mechanical Checks</h3>
      <div id="mech-list" class="flex gap-2.5 flex-wrap"></div>
    </div>

    <!-- Toolbar -->
    <div class="flex items-center gap-2.5 mb-4 flex-wrap" id="toolbar" style="display:none">
      <span class="text-sm text-slate-400 mr-auto" id="selection-count">0 selected</span>
      <button class="btn btn-sm btn-secondary" onclick="selectBySeverity('critical','high')">Select Critical + High</button>
      <button class="btn btn-sm btn-secondary" onclick="selectBySeverity('critical','high','medium')">+ Medium</button>
      <button class="btn btn-sm btn-secondary" onclick="selectAll()">Select All</button>
      <button class="btn btn-sm btn-secondary" onclick="deselectAll()">Deselect All</button>
      <button class="btn btn-sm btn-primary" id="export-btn" onclick="openExport()" disabled>Export for Agent Fix</button>
    </div>

    <!-- Agent findings groups -->
    <div id="agents-container"></div>

  </div>
</div>

</div><!-- /.ml-16 (sidebar offset wrapper) -->

<!-- Export modal (dialog pattern) -->
<div id="export-modal" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeExport()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-3xl">
      <div class="dialog-header">
        <h2 class="text-base font-semibold">Export Findings for Agent Fix</h2>
        <button class="btn btn-ghost btn-sm" onclick="closeExport()">&times;</button>
      </div>
      <div class="dialog-body">
        <textarea id="export-text" class="form-textarea font-mono text-xs min-h-[300px]" readonly></textarea>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary" onclick="closeExport()">Close</button>
        <button class="btn btn-primary" id="copy-btn" onclick="copyExport()">Copy to Clipboard</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/auth.js"></script>
<script>
const REVIEW_ID = location.pathname.split('/reviews/')[1]?.split('/')[0] || '';
const DECISION_EMOJI = { auto_approve: '\u2705', human_review: '\ud83d\udc40', reject: '\u274c', hard_block: '\ud83d\udeab' };
const DECISION_LABEL = { auto_approve: 'Auto-Approved', human_review: 'Human Review Required', reject: 'Changes Requested', hard_block: 'Blocked' };
const AGENT_LABELS = {
  security_privacy: 'Security & Privacy',
  performance: 'Performance',
  architecture_intent: 'Architecture & Intent',
  code_quality_observability: 'Code Quality',
  test_quality: 'Test Quality',
  hotspot: 'Hotspots',
};

let reviewData = null;
let selectedFindings = new Set(); // "agentIdx-findingIdx"

async function loadReview() {
  if (!REVIEW_ID) { showError('No review ID in URL.'); return; }
  try {
    const resp = await authFetch(`/api/v1/reviews/${REVIEW_ID}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    reviewData = data;
    render(data);
  } catch (e) {
    showError(`Failed to load review: ${e.message}`);
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function render(d) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.title = `PR Guardian — ${d.repo} #${d.pr_id}`;

  // Banner
  const banner = document.getElementById('banner');
  banner.className = 'flex items-center gap-4 p-5 rounded-xl mb-6 banner-' + (d.decision || '');
  document.getElementById('banner-emoji').textContent = DECISION_EMOJI[d.decision] || '\u2753';
  document.getElementById('banner-label').textContent = DECISION_LABEL[d.decision] || d.decision || 'Pending';
  document.getElementById('banner-meta').textContent = `${d.repo} #${d.pr_id} — ${d.title || ''} by ${d.author || 'unknown'}`;
  if (d.pr_url) {
    document.getElementById('pr-link').href = d.pr_url;
    document.getElementById('pr-link').style.display = '';
  } else {
    document.getElementById('pr-link').style.display = 'none';
  }

  // Info cards
  document.getElementById('v-risk').textContent = (d.risk_tier || '-').toUpperCase();
  document.getElementById('v-score').textContent = d.combined_score != null ? `${d.combined_score.toFixed(1)} / 10` : '-';
  const totalFindings = (d.agent_results || []).reduce((sum, a) => sum + (a.findings || []).length, 0);
  document.getElementById('v-findings').textContent = totalFindings;
  document.getElementById('v-duration').textContent = d.duration_ms ? `${(d.duration_ms / 1000).toFixed(1)}s` : '-';
  document.getElementById('v-cost').textContent = d.cost_usd ? `$${d.cost_usd.toFixed(4)}` : '-';

  // Summary
  if (d.summary) {
    document.getElementById('summary-section').style.display = '';
    document.getElementById('summary-text').textContent = d.summary;
  }

  // Mechanical checks
  if (d.mechanical_results && d.mechanical_results.length) {
    document.getElementById('mech-section').style.display = '';
    const list = document.getElementById('mech-list');
    list.innerHTML = d.mechanical_results.map(m =>
      `<div class="card card-compact"><div class="card-body flex items-center gap-2 text-sm py-2.5 px-4"><span>${m.passed ? '\u2705' : '\u274c'}</span><strong>${esc(m.tool)}</strong>${m.error ? ` <span class="text-orange-400">${esc(m.error)}</span>` : ''}</div></div>`
    ).join('');
  }

  // Agent findings
  const agents = d.agent_results || [];
  if (agents.length) {
    document.getElementById('toolbar').style.display = '';
    const container = document.getElementById('agents-container');
    container.innerHTML = agents.map((agent, ai) => {
      const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
      const findings = agent.findings || [];
      const hasFindings = findings.length > 0;
      return `
        <div class="card mb-4 overflow-hidden" data-agent-idx="${ai}">
          <div class="flex items-center gap-2.5 px-5 py-3.5 cursor-pointer select-none hover:bg-slate-700/40 transition-colors" onclick="toggleAgent(${ai})">
            <span class="text-xs text-slate-400 transition-transform duration-150" id="toggle-${ai}">\u25b6</span>
            <span class="font-semibold text-sm">${esc(label)}</span>
            <span class="sev-badge verdict-${agent.verdict}">${agent.verdict}</span>
            <span class="text-xs text-slate-400 ml-auto">${findings.length} finding${findings.length !== 1 ? 's' : ''}</span>
            ${hasFindings ? `<input type="checkbox" class="form-checkbox group-check" onclick="toggleGroupCheck(event, ${ai})" title="Select/deselect all in this group">` : ''}
          </div>
          <div class="border-t border-slate-700/50 collapsed" id="findings-${ai}" style="display:none">
            ${findings.map((f, fi) => renderFinding(ai, fi, f)).join('')}
          </div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('agents-container').innerHTML = '<div class="empty-state"><div class="empty-state-text">No agent results available.</div></div>';
  }

  updateSelectionCount();
}

function renderFinding(ai, fi, f) {
  const key = `${ai}-${fi}`;
  const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : '';
  return `
    <div class="flex items-start gap-3 px-5 py-3 border-b border-slate-700/30 last:border-b-0" data-key="${key}">
      <input type="checkbox" class="form-checkbox f-check mt-0.5 shrink-0" data-key="${key}" onchange="toggleFinding('${key}')">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="sev-badge sev-${f.severity}">${f.severity}</span>
          <span class="cert-badge">${f.certainty}</span>
          ${loc ? `<span class="font-mono text-xs text-emerald-400">${esc(loc)}</span>` : ''}
          ${f.category ? `<span class="text-xs text-slate-400">${esc(f.category)}</span>` : ''}
          ${f.cwe ? `<span class="text-xs text-slate-500">${esc(f.cwe)}</span>` : ''}
        </div>
        <div class="text-sm mt-1.5 leading-relaxed">${esc(f.description || '')}</div>
        ${f.suggestion ? `<div class="text-xs text-emerald-400 mt-1 pl-3 border-l-2 border-emerald-400">${esc(f.suggestion)}</div>` : ''}
      </div>
    </div>`;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Selection logic ---

function toggleFinding(key) {
  if (selectedFindings.has(key)) selectedFindings.delete(key);
  else selectedFindings.add(key);
  syncCheckboxes();
  updateSelectionCount();
}

function toggleGroupCheck(e, ai) {
  e.stopPropagation();
  const checked = e.target.checked;
  const findings = reviewData.agent_results[ai].findings || [];
  findings.forEach((_, fi) => {
    const key = `${ai}-${fi}`;
    if (checked) selectedFindings.add(key); else selectedFindings.delete(key);
  });
  syncCheckboxes();
  updateSelectionCount();
}

function selectBySeverity(...sevs) {
  const agents = reviewData.agent_results || [];
  agents.forEach((agent, ai) => {
    (agent.findings || []).forEach((f, fi) => {
      if (sevs.includes(f.severity)) selectedFindings.add(`${ai}-${fi}`);
    });
  });
  syncCheckboxes();
  updateSelectionCount();
}

function selectAll() {
  const agents = reviewData.agent_results || [];
  agents.forEach((agent, ai) => {
    (agent.findings || []).forEach((_, fi) => selectedFindings.add(`${ai}-${fi}`));
  });
  syncCheckboxes();
  updateSelectionCount();
}

function deselectAll() {
  selectedFindings.clear();
  syncCheckboxes();
  updateSelectionCount();
}

function syncCheckboxes() {
  document.querySelectorAll('.f-check').forEach(cb => {
    cb.checked = selectedFindings.has(cb.dataset.key);
  });
  // Sync group checkboxes
  (reviewData.agent_results || []).forEach((agent, ai) => {
    const groupCb = document.querySelector(`[data-agent-idx="${ai}"] .group-check`);
    if (!groupCb) return;
    const findings = agent.findings || [];
    const allSelected = findings.length > 0 && findings.every((_, fi) => selectedFindings.has(`${ai}-${fi}`));
    const someSelected = findings.some((_, fi) => selectedFindings.has(`${ai}-${fi}`));
    groupCb.checked = allSelected;
    groupCb.indeterminate = someSelected && !allSelected;
  });
}

function updateSelectionCount() {
  const n = selectedFindings.size;
  document.getElementById('selection-count').textContent = `${n} selected`;
  document.getElementById('export-btn').disabled = n === 0;
}

// --- Agent group toggle ---

function toggleAgent(ai) {
  const list = document.getElementById(`findings-${ai}`);
  const toggle = document.getElementById(`toggle-${ai}`);
  const isHidden = list.style.display === 'none';
  list.style.display = isHidden ? '' : 'none';
  toggle.style.transform = isHidden ? 'rotate(90deg)' : '';
}

// --- Export ---

function openExport() {
  if (!selectedFindings.size) return;
  const text = buildExportText();
  document.getElementById('export-text').value = text;
  document.getElementById('export-modal').classList.remove('hidden');
}

function closeExport() {
  document.getElementById('export-modal').classList.add('hidden');
}

function copyExport() {
  const textarea = document.getElementById('export-text');
  navigator.clipboard.writeText(textarea.value).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => { btn.textContent = 'Copy to Clipboard'; }, 2000);
  });
}

function buildExportText() {
  const d = reviewData;
  const lines = [];
  lines.push(`# PR Guardian Findings — ${d.repo} #${d.pr_id}`);
  lines.push('');
  lines.push(`PR: ${d.title || ''}`);
  lines.push(`Author: ${d.author || 'unknown'}`);
  lines.push(`Branch: ${d.source_branch || '?'} → ${d.target_branch || '?'}`);
  if (d.pr_url) lines.push(`URL: ${d.pr_url}`);
  lines.push('');
  lines.push('## Findings to Fix');
  lines.push('');

  const agents = d.agent_results || [];
  let idx = 0;
  agents.forEach((agent, ai) => {
    const agentFindings = [];
    (agent.findings || []).forEach((f, fi) => {
      if (selectedFindings.has(`${ai}-${fi}`)) agentFindings.push(f);
    });
    if (!agentFindings.length) return;

    const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
    lines.push(`### ${label}`);
    lines.push('');
    agentFindings.forEach(f => {
      idx++;
      const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : 'unknown location';
      lines.push(`**${idx}. [${f.severity.toUpperCase()}] ${f.category || 'Issue'}** — \`${loc}\``);
      if (f.description) lines.push(`   ${f.description}`);
      if (f.suggestion) lines.push(`   Suggestion: ${f.suggestion}`);
      if (f.cwe) lines.push(`   CWE: ${f.cwe}`);
      lines.push('');
    });
  });

  lines.push('---');
  lines.push('Please fix the above findings. For each one, show the current code and your proposed fix.');

  return lines.join('\n');
}

// Init
initAuth().then(() => loadReview());
</script>
</body>
</html>
