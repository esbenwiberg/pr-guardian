<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Reviews</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<!-- Sidebar -->
<aside class="sidebar">

    <div class="sidebar-logo">G</div>
    <span class="text-sm font-semibold text-slate-50 hidden lg:block">PR Guardian</span>
    <span class="ml-auto text-2xs font-mono text-slate-500 hidden lg:block">v0.1</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/dashboard" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z"/></svg>
      <span class="hidden lg:block">Dashboard</span>

    <a href="/reviews" class="sidebar-item active">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z"/></svg>
      <span class="hidden lg:block">Reviews</span>
    </a>
    <a href="/scans" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
      <span class="hidden lg:block">Scans</span>
    </a>
    <a href="/prompts" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 7.5l3 2.25-3 2.25m4.5 0h3m-9 8.25h13.5A2.25 2.25 0 0 0 21 18V6a2.25 2.25 0 0 0-2.25-2.25H5.25A2.25 2.25 0 0 0 3 6v12a2.25 2.25 0 0 0 2.25 2.25Z"/></svg>
      <span class="hidden lg:block">Prompts</span>
    </a>
    <a href="/how-it-works" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12c0-1.232-.046-2.453-.138-3.662a4.006 4.006 0 0 0-3.7-3.7 48.678 48.678 0 0 0-7.324 0 4.006 4.006 0 0 0-3.7 3.7c-.017.22-.032.441-.046.662M19.5 12l3-3m-3 3-3-3m-12 3c0 1.232.046 2.453.138 3.662a4.006 4.006 0 0 0 3.7 3.7 48.656 48.656 0 0 0 7.324 0 4.006 4.006 0 0 0 3.7-3.7c.017-.22.032-.441.046-.662M4.5 12l3 3m-3-3-3 3"/></svg>
      <span class="hidden lg:block">How It Works</span>

    <a href="/settings" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.248a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
      <span class="hidden lg:block">Settings</span>
    </a>
  </nav>
  <div class="sidebar-footer hidden lg:block">
    <div class="text-2xs text-slate-500 px-3 py-2">PR Guardian v0.1</div>
  </div>
</aside>

<!-- Main Content -->
<div class="ml-16 lg:ml-64">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <div class="flex items-center gap-3">
      <h1 class="text-sm font-semibold text-slate-50">Reviews</h1>
      <button class="btn btn-primary btn-sm" onclick="openReviewModal()">+ Review PR</button>
    </div>
  </header>

  <div class="max-w-[1400px] mx-auto p-6">
    <!-- Filters -->
    <div class="flex gap-2 items-center mb-4">
      <select id="filter-decision" class="form-select text-xs py-1.5 px-2">
        <option value="">All decisions</option>
        <option value="auto_approve">Auto-Approved</option>
        <option value="human_review">Human Review</option>
        <option value="hard_block">Blocked</option>
      </select>
      <input id="filter-repo" type="text" placeholder="Filter repo..." class="form-input text-xs py-1.5 px-2 w-40">
    </div>

    <!-- Active Reviews -->
    <div id="active-reviews" class="hidden mb-4">
      <div class="card border-emerald-500/30">
        <div class="card-header">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-emerald-400 flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            Active Reviews
          </h3>
        </div>
        <div class="card-body p-0">
          <table class="data-table">
            <thead>
              <tr>
                <th>PR</th>
                <th>Repo</th>
                <th>Author</th>
                <th>Stage</th>
                <th>Elapsed</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="active-reviews-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Review History Table -->
    <div class="card">
      <div class="card-body p-0">
        <table class="data-table">
          <thead>
            <tr>
              <th>PR</th>
              <th>Repo</th>
              <th>Author</th>
              <th>Risk</th>
              <th>Risk Score</th>
              <th>Decision</th>
              <th>Cost</th>
              <th>Duration</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody id="reviews-body">
            <tr><td colspan="9" class="empty-state">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div id="review-modal-overlay" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeReviewModal()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-md">
      <div class="dialog-header">
        <h2 class="text-lg font-bold">Trigger PR Review</h2>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="closeReviewModal()">&#10005;</button>
      </div>
      <form id="review-form" onsubmit="submitReview(event)">
        <div class="dialog-body space-y-4">
          <div>
            <label class="form-label" for="review-pr-url">PR URL</label>
            <input type="url" id="review-pr-url" required placeholder="https://github.com/org/repo/pull/123" class="form-input w-full">
          </div>
          <div>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" id="review-post-comment" class="form-checkbox"> Post comment on PR
            </label>
          </div>
        </div>
        <div class="dialog-footer">
          <div id="review-status" class="text-sm hidden mr-auto"></div>
          <button type="button" onclick="closeReviewModal()" class="btn btn-secondary btn-sm">Cancel</button>
          <button type="submit" id="review-submit-btn" class="btn btn-primary btn-sm">Start Review</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Detail Modal -->
<div id="modal-overlay" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeModal()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-[860px] p-6">
      <div class="flex justify-end gap-2 mb-1">
        <button class="btn btn-secondary btn-sm" id="export-md-btn" onclick="exportMarkdown()" title="Export as Markdown report">&#8675; MD</button>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModal()">&times;</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>
</div>

<script>
const API = '/api/dashboard';
const STAGES = ['queued', 'discovery', 'mechanical', 'triage', 'agents', 'decision', 'validation', 'complete'];
const TERMINAL_STAGES = ['complete', 'error'];
const DECISION_COLORS = { auto_approve: '#00b894', human_review: '#fdcb6e', reject: '#e17055', hard_block: '#d63031' };

// State
let currentFilter = { decision: '', repo: '' };

// ---- Data Loading ----
async function loadReviews() {
  const el = document.getElementById('reviews-body');
  try {
    const params = new URLSearchParams();
    if (currentFilter.decision) params.set('decision', currentFilter.decision);
    if (currentFilter.repo) params.set('repo', currentFilter.repo);
    const resp = await fetch(`${API}/reviews?${params}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const reviews = await resp.json();
    if (!Array.isArray(reviews) || !reviews.length) {
      el.innerHTML = '<tr><td colspan="9" class="empty-state">No reviews found</td></tr>';
      return;
    }
    el.innerHTML = reviews.map(r => renderReviewRow(r)).join('');
  } catch (e) {
    console.error('Failed to load reviews', e);
    el.innerHTML = '<tr><td colspan="9" class="empty-state text-red-400">Failed to load reviews — check database connection</td></tr>';
  }
}

async function loadActiveReviews() {
  const container = document.getElementById('active-reviews');
  const tbody = document.getElementById('active-reviews-body');
  try {
    const resp = await fetch(`${API}/active`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const active = await resp.json();
    if (!Array.isArray(active) || !active.length) {
      container.classList.add('hidden');
      return;
    }
    container.classList.remove('hidden');
    tbody.innerHTML = active.map(r => `
      <tr onclick="openDetail('${r.id}')" class="cursor-pointer">
        <td><strong>#${esc(r.pr_id)}</strong><br><span class="text-xs text-slate-400">${esc(truncate(r.title, 40))}</span></td>
        <td>${esc(r.repo)}</td>
        <td>${esc(r.author)}</td>
        <td><span class="badge badge-neutral text-xs">${esc(r.stage || 'queued')}</span>
          ${r.stage_detail ? `<br><span class="text-2xs text-slate-400">${esc(truncate(r.stage_detail, 50))}</span>` : ''}
        </td>
        <td class="text-xs text-slate-400">${formatElapsed(r.started_at)}</td>
        <td><button class="btn btn-ghost btn-xs text-red-400" onclick="event.stopPropagation(); cancelReview('${r.id}')" title="Cancel review">&#10005;</button></td>
      </tr>
    `).join('');
  } catch (e) {
    console.error('Failed to load active reviews', e);
    container.classList.add('hidden');
  }
}

async function cancelReview(id) {
  if (!confirm('Cancel this review?')) return;
  try {
    await fetch(`${API}/reviews/${id}`, { method: 'DELETE' });
    loadActiveReviews();
    loadReviews();
  } catch (e) {
    console.error('Failed to cancel review', e);
  }
}

// ---- Renderers ----
function renderReviewRow(r) {
  return `
    <tr onclick="openDetail('${r.id}')" class="cursor-pointer">
      <td>
        <div class="flex items-center gap-2">
          <div><strong>#${esc(r.pr_id)}</strong><br><span class="text-xs text-slate-400">${esc(truncate(r.title, 40))}</span></div>
          <a href="/reviews/${r.id}" onclick="event.stopPropagation()" class="inline-flex items-center justify-center w-6 h-6 rounded text-slate-500 hover:text-blue-400 hover:bg-slate-700/60 transition-colors shrink-0 ml-auto" title="Open review details page">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
          </a>
        </div>
      </td>
      <td>${esc(r.repo)}</td>
      <td>${esc(r.author)}</td>
      <td><span class="badge badge-${r.risk_tier}">${r.risk_tier || '-'}</span></td>
      <td>${r.combined_score?.toFixed(1) ?? '-'}</td>
      <td><span class="badge badge-${r.decision}">${formatDecision(r.decision)}</span></td>
      <td class="text-xs text-emerald-400">${formatCost(r.cost_usd)}</td>
      <td>${formatDuration(r.duration_ms)}</td>
      <td class="text-xs text-slate-400">${formatTime(r.started_at)}</td>
    </tr>
  `;
}

// ---- Detail Modal ----
let activeDetailInterval = null;
let currentDetailReview = null;

async function openDetail(id) {
  try {
    const r = await fetch(`${API}/reviews/${id}`).then(res => res.json());
    if (r.error) { console.error('Review not found'); return; }
    renderDetailModal(r);
    document.getElementById('modal-overlay').classList.remove('hidden');

    clearInterval(activeDetailInterval);
    if (!TERMINAL_STAGES.includes(r.stage)) {
      activeDetailInterval = setInterval(async () => {
        try {
          const updated = await fetch(`${API}/reviews/${id}`).then(res => res.json());
          if (updated.error) return;
          renderDetailModal(updated);
          if (TERMINAL_STAGES.includes(updated.stage)) clearInterval(activeDetailInterval);
        } catch (_) {}
      }, 2000);
    }
  } catch (e) {
    console.error('Failed to load detail', e);
  }
}

function renderDetailModal(r) {
  currentDetailReview = r;
  const body = document.getElementById('modal-body');
  const isError = r.stage === 'error';
  const isActive = !TERMINAL_STAGES.includes(r.stage);
  const stageIdx = STAGES.indexOf(r.stage);

  const pipelineSteps = STAGES.slice(1).map((s, i) => {
    let cls = '';
    if (isError && (i + 1) <= stageIdx) cls = 'done';
    else if (isError) cls = '';
    else if ((i + 1) < stageIdx) cls = 'done';
    else if ((i + 1) === stageIdx) cls = 'active';
    return `<div class="pipe-step ${cls}">${s}</div>`;
  }).join('') + (isError ? '<div class="pipe-step error">ERROR</div>' : '');

  const timeInfo = isActive
    ? (r.started_at ? formatElapsed(r.started_at) : '...')
    : formatDuration(r.duration_ms);

  const decisionIcons = { auto_approve: '&#10003;', human_review: '&#9998;', reject: '&#10007;', hard_block: '&#9940;', pending: '&#8987;', error: '&#9888;' };
  const decisionIcon = decisionIcons[r.decision] || '&#8987;';

  const totalFindings = (r.agent_results || []).reduce((sum, a) => sum + (a.findings?.length || 0), 0);

  body.innerHTML = `
    <div class="mb-5">
      <h2 class="text-xl font-bold mb-1.5 leading-snug">${r.pr_url ? `<a href="${esc(r.pr_url)}" target="_blank" rel="noopener" class="hover:underline">PR #${esc(r.pr_id)}</a>` : `PR #${esc(r.pr_id)}`} — ${esc(r.title || 'Untitled')}</h2>
      <div class="text-xs text-slate-400 flex items-center gap-1.5 flex-wrap">
        <span>${esc(r.repo)}</span> &middot;
        <span>${esc(r.author)}</span> &middot;
        <span>${esc(r.source_branch)} &rarr; ${esc(r.target_branch)}</span>
        ${r.head_commit_sha ? `&middot; <code class="text-2xs bg-slate-800 px-1.5 py-px rounded">${esc(r.head_commit_sha.slice(0, 8))}</code>` : ''}
      </div>
    </div>

    <div class="flex items-center gap-4 p-4 rounded-xl mb-5 banner-${r.decision}">
      <span class="text-2xl">${decisionIcon}</span>
      <div class="flex-1">
        <div class="text-[15px] font-semibold">${formatDecision(r.decision)}</div>
        <div class="text-xs text-slate-400 mt-0.5">${isError ? esc(r.stage_detail || 'Review failed') : isActive ? 'Review in progress...' : (r.risk_tier ? `Risk: ${r.risk_tier} &middot; Score: ${r.combined_score?.toFixed(2) ?? '—'}` : 'Completed')}</div>
      </div>
      ${r.risk_tier ? `<span class="badge badge-${r.risk_tier} text-xs px-3 py-1">${r.risk_tier} risk</span>` : ''}
    </div>

    <div class="modal-pipeline">${pipelineSteps}</div>

    ${isError && r.stage_detail ? `
      <div class="flex items-center gap-2.5 p-3 rounded-lg mb-5 text-sm bg-red-400/[0.08] border border-red-400/20">
        <span class="text-sm text-red-400 animate-spin">&#9888;</span>
        <span class="text-red-400">${esc(r.stage_detail)}</span>
      </div>
    ` : isActive && r.stage_detail ? `
      <div class="flex items-center gap-2.5 p-3 rounded-lg mb-5 text-sm" style="background:color-mix(in srgb, var(--accent-400) 8%, transparent);border:1px solid color-mix(in srgb, var(--accent-400) 20%, transparent)">
        <span class="text-sm animate-spin" style="color:var(--accent-400)">&#9881;</span>
        <span style="color:var(--accent-400)">${esc(r.stage_detail)}</span>
      </div>
    ` : ''}

    <div class="grid grid-cols-5 gap-2.5 mb-5">
      <div class="bg-slate-800 border border-slate-700/50 rounded-lg p-3">
        <div class="text-2xs text-slate-400 uppercase tracking-wider mb-1">Platform</div>
        <div class="text-sm font-semibold">${esc(r.platform)}</div>
      </div>
      <div class="bg-slate-800 border border-slate-700/50 rounded-lg p-3">
        <div class="text-2xs text-slate-400 uppercase tracking-wider mb-1">${isActive ? 'Elapsed' : 'Duration'}</div>
        <div class="text-sm font-semibold">${timeInfo}</div>
      </div>
      <div class="bg-slate-800 border border-slate-700/50 rounded-lg p-3">
        <div class="text-2xs text-slate-400 uppercase tracking-wider mb-1">Risk Score</div>
        <div class="text-sm font-semibold">${r.combined_score ? r.combined_score.toFixed(2) : '<span class="text-slate-500">—</span>'}</div>
      </div>
      <div class="bg-slate-800 border border-slate-700/50 rounded-lg p-3">
        <div class="text-2xs text-slate-400 uppercase tracking-wider mb-1">Findings</div>
        <div class="text-sm font-semibold">${totalFindings || '<span class="text-slate-500">—</span>'}</div>
      </div>
      <div class="bg-slate-800 border border-slate-700/50 rounded-lg p-3">
        <div class="text-2xs text-slate-400 uppercase tracking-wider mb-1">Cost</div>
        <div class="text-sm font-semibold text-emerald-400">${r.cost_usd ? formatCost(r.cost_usd) : '<span class="text-slate-500">—</span>'}</div>
        ${r.total_input_tokens ? '<div class="text-2xs text-slate-500 mt-0.5">' + r.total_input_tokens.toLocaleString() + ' + ' + r.total_output_tokens.toLocaleString() + ' tokens</div>' : ''}
      </div>
    </div>

    ${r.summary ? `
      <div class="card mb-3.5">
        <div class="card-header"><h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Summary</h3></div>
        <div class="card-body"><div class="text-sm leading-relaxed whitespace-pre-wrap">${esc(r.summary)}</div></div>
      </div>
    ` : ''}

    ${r.override_reasons?.length ? `
      <div class="card mb-3.5">
        <div class="card-header">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Escalation Reasons</h3>
          <span class="badge badge-neutral badge-sm">${r.override_reasons.length}</span>
        </div>
        <div class="card-body">
          ${r.override_reasons.map(x => `
            <div class="flex items-start gap-2.5 py-2 text-sm text-orange-400 border-b border-slate-700/30 last:border-b-0">
              <span class="shrink-0 mt-px">&#9888;</span>
              <span>${esc(x)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}

    ${r.mechanical_results?.length ? `
      <div class="card mb-3.5">
        <div class="card-header">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Mechanical Checks</h3>
          <span class="badge badge-neutral badge-sm">${r.mechanical_results.filter(m => m.passed).length}/${r.mechanical_results.length} passed</span>
        </div>
        <div class="card-body">
          <div class="flex gap-2.5 flex-wrap">
          ${r.mechanical_results.map(m => `
            <div class="flex items-center gap-2 px-3.5 py-2 bg-slate-800 border border-slate-700/50 rounded-lg text-sm">
              <span class="text-base shrink-0">${m.passed ? '<span class="text-emerald-400">&#10003;</span>' : '<span class="text-red-400">&#10007;</span>'}</span>
              <span class="font-semibold">${esc(m.tool)}</span>
              <span class="badge badge-sm badge-${m.severity || 'low'}">${m.severity || 'info'}</span>
              ${m.error ? `<span class="text-xs text-orange-400">${esc(m.error)}</span>` : ''}
              ${m.findings?.length ? `<span class="text-2xs text-slate-400">${m.findings.length} issue${m.findings.length !== 1 ? 's' : ''}</span>` : ''}
            </div>
          `).join('')}
          </div>
        </div>
      </div>
    ` : ''}

    ${r.agent_results?.length ? `
      <div class="card mb-3.5">
        <div class="card-header">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Agent Results</h3>
          <span class="badge badge-neutral badge-sm">${r.agent_results.length} agent${r.agent_results.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="card-body p-2.5">
          ${r.agent_results.map((a, idx) => {
            const fc = a.findings?.length || 0;
            const hasFindings = fc > 0;
            return `
              <div class="bg-slate-700/50 rounded-lg mb-2.5 last:mb-0 overflow-hidden">
                <div class="flex items-center gap-2 px-3.5 py-2.5 cursor-pointer transition-colors hover:bg-white/[0.03]" onclick="toggleAgentFindings(this, ${idx})">
                  <span class="font-semibold text-sm">${esc(a.agent_name)}</span>
                  <span class="badge badge-sm badge-${a.verdict === 'pass' ? 'auto_approve' : a.verdict === 'warn' ? 'human_review' : 'hard_block'}">${a.verdict}</span>
                  ${a.languages_reviewed?.length ? `<span class="text-2xs text-slate-400">${a.languages_reviewed.join(', ')}</span>` : ''}
                  <span class="ml-auto text-2xs text-slate-400 flex items-center gap-2">
                    <span>${fc} finding${fc !== 1 ? 's' : ''}</span>
                    ${hasFindings ? '<span class="chevron transition-transform duration-200 text-xs text-slate-400">&#9656;</span>' : ''}
                  </span>
                </div>
                ${a.error ? `<div class="text-red-400 text-xs px-3.5 pb-2.5">${esc(a.error)}</div>` : ''}
                ${hasFindings ? `
                  <div class="px-3.5 pb-3 hidden" id="agent-findings-${idx}">
                    ${a.findings.map(f => `
                      <div class="bg-surface-overlay border border-slate-700/50 rounded-lg p-3 mb-2 last:mb-0">
                        <div class="flex gap-1.5 items-center mb-1.5 flex-wrap">
                          <span class="sev-badge sev-${f.severity}">${f.severity}</span>
                          <span class="cert-badge">${f.certainty}</span>
                          ${f.category ? `<span class="text-2xs" style="color:var(--accent-400)">${esc(f.category)}</span>` : ''}
                          <span class="text-2xs text-slate-400 ml-auto font-mono">${esc(f.file)}${f.line ? ':' + f.line : ''}</span>
                        </div>
                        <div class="text-sm leading-relaxed">${esc(f.description)}</div>
                        ${f.suggestion ? `<div class="text-xs mt-1.5 pt-1.5 border-t border-slate-700/30" style="color:var(--accent-400)">${esc(f.suggestion)}</div>` : ''}
                        ${f.cwe ? `<div class="text-2xs text-slate-500 mt-1">CWE: ${esc(f.cwe)}</div>` : ''}
                      </div>
                    `).join('')}
                  </div>
                ` : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    ` : ''}

    ${r.pipeline_log?.length ? `
      <div class="card mb-3.5">
        <div class="card-header cursor-pointer" onclick="togglePipelineLog()">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-slate-400">Pipeline Log</h3>
          <button class="btn btn-ghost btn-xs" id="log-toggle-btn">
            <span class="chevron text-2xs transition-transform duration-200" id="log-toggle-arrow">&#9656;</span>
            ${r.pipeline_log.length} entries
          </button>
        </div>
        <div class="card-body hidden p-0" id="pipeline-log-body">
          <div class="max-h-[400px] overflow-y-auto">
            ${r.pipeline_log.map(e => `
              <div class="log-entry log-level-${e.level}">
                <span class="log-ts">${formatLogTime(e.ts)}</span>
                <span class="log-badge log-badge-${e.level}">${e.level}</span>
                <span class="log-stage">${esc(e.stage)}</span>
                <span class="log-msg">${esc(e.msg)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    ` : ''}

    ${isActive && !r.mechanical_results?.length && !r.agent_results?.length ? `
      <div class="card">
        <div class="card-body text-center py-8 text-slate-400">
          <div class="text-2xl mb-2">&#9881;</div>
          Review is in progress — results will appear as stages complete...
        </div>
      </div>
    ` : ''}
  `;
}

function togglePipelineLog() {
  const body = document.getElementById('pipeline-log-body');
  const arrow = document.getElementById('log-toggle-arrow');
  if (!body) return;
  if (body.classList.contains('hidden')) {
    body.classList.remove('hidden');
    if (arrow) arrow.classList.add('open');
  } else {
    body.classList.add('hidden');
    if (arrow) arrow.classList.remove('open');
  }
}

function formatLogTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  } catch (_) { return ''; }
}

function toggleAgentFindings(header, idx) {
  const el = document.getElementById('agent-findings-' + idx);
  if (!el) return;
  const chevron = header.querySelector('.chevron');
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    if (chevron) chevron.classList.add('open');
  } else {
    el.classList.add('hidden');
    if (chevron) chevron.classList.remove('open');
  }
}

function closeModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  clearInterval(activeDetailInterval);
}

function exportMarkdown() {
  if (!currentDetailReview) return;
  const md = generateMarkdownReport(currentDetailReview);
  const blob = new Blob([md], { type: 'text/markdown' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `pr-review-${currentDetailReview.pr_id || 'report'}.md`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function generateMarkdownReport(r) {
  const lines = [];
  const decision = formatDecision(r.decision);

  lines.push(`# PR Review Report — PR #${r.pr_id}`);
  lines.push('');
  lines.push(`**${r.title || 'Untitled'}**`);
  lines.push('');
  lines.push(`| Field | Value |`);
  lines.push(`|-------|-------|`);
  lines.push(`| Repository | ${r.repo} |`);
  if (r.pr_url) lines.push(`| URL | ${r.pr_url} |`);
  lines.push(`| Author | ${r.author} |`);
  lines.push(`| Branch | ${r.source_branch} → ${r.target_branch} |`);
  if (r.head_commit_sha) lines.push(`| Commit | \`${r.head_commit_sha.slice(0, 8)}\` |`);
  lines.push(`| Platform | ${r.platform} |`);
  lines.push(`| Decision | **${decision}** |`);
  if (r.risk_tier) lines.push(`| Risk | ${r.risk_tier} |`);
  if (r.combined_score != null) lines.push(`| Score | ${r.combined_score.toFixed(2)} |`);
  if (r.duration_ms) lines.push(`| Duration | ${formatDuration(r.duration_ms)} |`);
  if (r.cost_usd) lines.push(`| Cost | ${formatCost(r.cost_usd)} |`);
  lines.push('');

  if (r.summary) {
    lines.push('## Summary');
    lines.push('');
    lines.push(r.summary);
    lines.push('');
  }

  if (r.override_reasons?.length) {
    lines.push('## Escalation Reasons');
    lines.push('');
    r.override_reasons.forEach(x => lines.push(`- ${x}`));
    lines.push('');
  }

  if (r.mechanical_results?.length) {
    const passed = r.mechanical_results.filter(m => m.passed).length;
    lines.push(`## Mechanical Checks (${passed}/${r.mechanical_results.length} passed)`);
    lines.push('');
    r.mechanical_results.forEach(m => {
      const icon = m.passed ? 'PASS' : 'FAIL';
      lines.push(`- ${icon} **${m.tool}** [${m.severity || 'info'}]${m.error ? ' — ' + m.error : ''}`);
      if (m.findings?.length) {
        m.findings.forEach(f => lines.push(`  - ${f.file || ''}${f.line ? ':' + f.line : ''} — ${f.description || f.message || ''}`));
      }
    });
    lines.push('');
  }

  if (r.agent_results?.length) {
    lines.push('## Agent Results');
    lines.push('');
    r.agent_results.forEach(a => {
      lines.push(`### ${a.agent_name} — ${a.verdict}${a.languages_reviewed?.length ? ' (' + a.languages_reviewed.join(', ') + ')' : ''}`);
      lines.push('');
      if (a.error) {
        lines.push(`> **Error:** ${a.error}`);
        lines.push('');
      }
      if (a.findings?.length) {
        lines.push(`| Severity | Certainty | File | Description |`);
        lines.push(`|----------|-----------|------|-------------|`);
        a.findings.forEach(f => {
          const loc = `${f.file || ''}${f.line ? ':' + f.line : ''}`;
          lines.push(`| ${f.severity} | ${f.certainty} | \`${loc}\` | ${f.description} |`);
          if (f.suggestion) lines.push(`| | | | Suggestion: ${f.suggestion} |`);
          if (f.cwe) lines.push(`| | | | CWE: ${f.cwe} |`);
        });
        lines.push('');
      } else {
        lines.push('No findings.');
        lines.push('');
      }
    });
  }

  lines.push('---');
  lines.push(`*Generated by PR Guardian on ${new Date().toISOString().slice(0, 16).replace('T', ' ')} UTC*`);
  return lines.join('\n');
}

document.getElementById('modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeModal(); closeReviewModal(); }
});

// ---- Review Modal ----
function openReviewModal() {
  document.getElementById('review-modal-overlay').classList.remove('hidden');
  document.getElementById('review-pr-url').focus();
}
function closeReviewModal() {
  document.getElementById('review-modal-overlay').classList.add('hidden');
  document.getElementById('review-status').style.display = 'none';
  document.getElementById('review-submit-btn').disabled = false;
  document.getElementById('review-submit-btn').textContent = 'Start Review';
}
document.getElementById('review-modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('review-modal-overlay')) closeReviewModal();
});

async function submitReview(e) {
  e.preventDefault();
  const url = document.getElementById('review-pr-url').value.trim();
  const postComment = document.getElementById('review-post-comment').checked;
  const btn = document.getElementById('review-submit-btn');
  const status = document.getElementById('review-status');

  btn.disabled = true;
  btn.textContent = 'Reviewing...';
  status.style.display = 'block';
  status.className = 'text-sm mr-auto text-slate-400';
  status.textContent = 'Submitting review request...';

  try {
    const resp = await fetch('/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pr_url: url, post_comment: postComment }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      status.className = 'text-sm mr-auto text-red-400';
      status.textContent = data.detail || 'Request failed';
      btn.disabled = false;
      btn.textContent = 'Start Review';
      return;
    }
    closeReviewModal();
    document.getElementById('review-form').reset();
    loadActiveReviews();
  } catch (err) {
    status.className = 'text-sm mr-auto text-red-400';
    status.textContent = `Error: ${err.message}`;
    btn.disabled = false;
    btn.textContent = 'Start Review';
  }
}

// ---- Filters ----
document.getElementById('filter-decision').addEventListener('change', (e) => {
  currentFilter.decision = e.target.value;
  loadReviews();
});
let repoTimeout;
document.getElementById('filter-repo').addEventListener('input', (e) => {
  clearTimeout(repoTimeout);
  repoTimeout = setTimeout(() => {
    currentFilter.repo = e.target.value;
    loadReviews();
  }, 300);
});

// ---- Helpers ----
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

function formatDecision(d) {
  const m = { auto_approve: 'Approved', human_review: 'Human Review', reject: 'Rejected', hard_block: 'Blocked', pending: 'Pending', error: 'Error' };
  return m[d] || d || '-';
}

function formatCost(usd) {
  if (!usd) return '-';
  if (usd < 0.01) return `$${usd.toFixed(4)}`;
  if (usd < 1) return `$${usd.toFixed(3)}`;
  return `$${usd.toFixed(2)}`;
}

function formatDuration(ms) {
  if (!ms) return '-';
  if (ms < 1000) return `${ms}ms`;
  const s = ms / 1000;
  if (s < 60) return `${s.toFixed(1)}s`;
  return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return d.toLocaleDateString();
}

function formatElapsed(iso) {
  const d = new Date(iso);
  const ms = Date.now() - d.getTime();
  return formatDuration(Math.max(0, ms));
}

// ---- SSE: refresh table on new reviews ----
function connectSSE() {
  const es = new EventSource(`${API}/events`);
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'connected') return;
      loadActiveReviews();
      if (TERMINAL_STAGES.includes(data.stage)) loadReviews();
    } catch {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

// ---- Init ----
loadReviews();
loadActiveReviews();
connectSSE();
setInterval(loadReviews, 30000);
setInterval(loadActiveReviews, 5000);
</script>
