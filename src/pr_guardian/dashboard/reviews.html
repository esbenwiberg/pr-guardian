<!-- Main Content -->
<div class="ml-16 lg:ml-64">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <div class="flex items-center gap-3">
      <h1 class="text-sm font-semibold text-slate-50">Reviews</h1>
      <button class="btn btn-primary btn-sm" onclick="openReviewModal()">+ Review PR</button>
    </div>
  </header>

  <div class="max-w-[1400px] mx-auto p-6">
    <!-- Filters -->
    <div class="flex gap-2 items-center mb-4">
      <select id="filter-decision" class="form-select text-xs py-1.5 px-2">
        <option value="">All decisions</option>
        <option value="auto_approve">Auto-Approved</option>
        <option value="human_review">Human Review</option>
        <option value="reject">Rejected</option>
        <option value="hard_block">Blocked</option>
      </select>
      <input id="filter-repo" type="text" placeholder="Filter repo..." class="form-input text-xs py-1.5 px-2 w-40">
      <div class="ml-auto flex items-center gap-3">
        <span class="text-xs text-slate-500 tabular-nums" id="review-count"></span>
        <button id="toggle-runs" class="tab-pill text-xs active" onclick="toggleShowAllRuns()">Latest per PR</button>
      </div>
    </div>

    <!-- Active Reviews -->
    <div id="active-reviews" class="hidden mb-4">
      <div class="card border-emerald-500/30">
        <div class="card-header">
          <h3 class="text-xs font-semibold uppercase tracking-wider text-emerald-400 flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
            Active Reviews
          </h3>
        </div>
        <div class="card-body p-0">
          <table class="data-table">
            <thead>
              <tr>
                <th>PR</th>
                <th>Repo</th>
                <th>Author</th>
                <th>Stage</th>
                <th>Elapsed</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="active-reviews-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Review History Table -->
    <div class="card">
      <div class="card-body p-0">
        <table class="data-table">
          <thead>
            <tr>
              <th>PR</th>
              <th>Repo</th>
              <th>Author</th>
              <th>Risk</th>
              <th class="text-right">Score</th>
              <th>Decision</th>
              <th class="text-right">Cost</th>
              <th class="text-right">Duration</th>
              <th class="text-right">Time</th>
            </tr>
          </thead>
          <tbody id="reviews-body">
            <!-- Skeleton loading -->
            <tr><td colspan="9" class="px-4 py-5"><div class="space-y-3">
              <div class="skeleton h-8 rounded-lg"></div>
              <div class="skeleton h-8 rounded-lg"></div>
              <div class="skeleton h-8 rounded-lg"></div>
              <div class="skeleton h-8 rounded-lg"></div>
              <div class="skeleton h-8 rounded-lg"></div>
            </div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Review Modal -->
<div id="review-modal-overlay" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeReviewModal()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-md">
      <div class="dialog-header">
        <h2 class="text-lg font-bold">Trigger PR Review</h2>
        <button class="btn btn-ghost btn-icon btn-sm" onclick="closeReviewModal()">&#10005;</button>
      </div>
      <form id="review-form" onsubmit="submitReview(event)">
        <div class="dialog-body space-y-4">
          <div>
            <label class="form-label" for="review-pr-url">PR URL</label>
            <input type="url" id="review-pr-url" required placeholder="https://github.com/org/repo/pull/123" class="form-input w-full">
          </div>
          <div>
            <label class="flex items-center gap-2 text-sm cursor-pointer">
              <input type="checkbox" id="review-post-comment" class="form-checkbox"> Post comment on PR
            </label>
          </div>
        </div>
        <div class="dialog-footer">
          <div id="review-status" class="text-sm hidden mr-auto"></div>
          <button type="button" onclick="closeReviewModal()" class="btn btn-secondary btn-sm">Cancel</button>
          <button type="submit" id="review-submit-btn" class="btn btn-primary btn-sm">Start Review</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
const API = '/api/dashboard';
const DECISION_BORDERS = { auto_approve: '#34d399', human_review: '#fb923c', reject: '#f87171', hard_block: '#ef4444' };

// State
let currentFilter = { decision: '', repo: '' };
let allReviews = [];
let showLatestOnly = true;

// ---- Data Loading ----
async function loadReviews() {
  const el = document.getElementById('reviews-body');
  try {
    const params = new URLSearchParams();
    if (currentFilter.decision) params.set('decision', currentFilter.decision);
    if (currentFilter.repo) params.set('repo', currentFilter.repo);
    const resp = await fetch(`${API}/reviews?${params}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const reviews = await resp.json();
    if (!Array.isArray(reviews) || !reviews.length) {
      el.innerHTML = '<tr><td colspan="9" class="empty-state">No reviews found</td></tr>';
      updateReviewCount(0, 0);
      return;
    }
    allReviews = reviews;
    renderReviews();
  } catch (e) {
    console.error('Failed to load reviews', e);
    el.innerHTML = '<tr><td colspan="9" class="empty-state text-red-400">Failed to load reviews</td></tr>';
  }
}

function renderReviews() {
  const el = document.getElementById('reviews-body');
  const filtered = showLatestOnly ? latestPerPR(allReviews) : allReviews;
  updateReviewCount(filtered.length, allReviews.length);
  if (!filtered.length) {
    el.innerHTML = '<tr><td colspan="9" class="empty-state">No reviews found</td></tr>';
    return;
  }
  el.innerHTML = filtered.map((r, i) => renderReviewRow(r, i)).join('');
  focusedRow = -1; // reset keyboard navigation
}

function latestPerPR(reviews) {
  const groups = {};
  for (const r of reviews) {
    const key = `${r.repo}::${r.pr_id}`;
    if (!groups[key] || new Date(r.started_at) > new Date(groups[key].started_at)) {
      groups[key] = r;
    }
  }
  return Object.values(groups).sort((a, b) => new Date(b.started_at) - new Date(a.started_at));
}

function updateReviewCount(shown, total) {
  const el = document.getElementById('review-count');
  if (showLatestOnly && total !== shown) {
    el.textContent = `${shown} PRs \u00b7 ${total} total runs`;
  } else {
    el.textContent = `${shown} review${shown !== 1 ? 's' : ''}`;
  }
}

function toggleShowAllRuns() {
  showLatestOnly = !showLatestOnly;
  const btn = document.getElementById('toggle-runs');
  btn.textContent = showLatestOnly ? 'Latest per PR' : 'All runs';
  btn.classList.toggle('active', showLatestOnly);
  renderReviews();
}

async function loadActiveReviews() {
  const container = document.getElementById('active-reviews');
  const tbody = document.getElementById('active-reviews-body');
  try {
    const resp = await fetch(`${API}/active`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const active = await resp.json();
    if (!Array.isArray(active) || !active.length) {
      container.classList.add('hidden');
      return;
    }
    container.classList.remove('hidden');
    tbody.innerHTML = active.map(r => `
      <tr onclick="window.location='/reviews/${r.id}'" class="cursor-pointer">
        <td><strong>#${esc(r.pr_id)}</strong><br><span class="text-xs text-slate-400">${esc(truncate(r.title, 40))}</span></td>
        <td>${esc(r.repo)}</td>
        <td>${esc(r.author)}</td>
        <td><span class="badge badge-neutral text-xs">${esc(r.stage || 'queued')}</span>
          ${r.stage_detail ? `<br><span class="text-2xs text-slate-400">${esc(truncate(r.stage_detail, 50))}</span>` : ''}
        </td>
        <td class="text-xs text-slate-400">${formatElapsed(r.started_at)}</td>
        <td><button class="btn btn-ghost btn-xs text-red-400" onclick="event.stopPropagation(); cancelReview('${r.id}')" title="Cancel review">&#10005;</button></td>
      </tr>
    `).join('');
  } catch (e) {
    console.error('Failed to load active reviews', e);
    container.classList.add('hidden');
  }
}

async function cancelReview(id) {
  if (!confirm('Cancel this review?')) return;
  try {
    await fetch(`${API}/reviews/${id}`, { method: 'DELETE' });
    loadActiveReviews();
    loadReviews();
  } catch (e) {
    console.error('Failed to cancel review', e);
  }
}

// ---- Renderers ----
function renderReviewRow(r, idx) {
  const border = DECISION_BORDERS[r.decision] || 'transparent';
  const animDelay = Math.min(idx * 30, 300);
  return `
    <tr onclick="window.location='/reviews/${r.id}'" class="cursor-pointer review-row" style="box-shadow:inset 3px 0 0 ${border};animation-delay:${animDelay}ms">
      <td>
        <strong class="text-slate-50">#${esc(r.pr_id)}</strong>
        <div class="text-xs text-slate-400 mt-0.5 max-w-[260px] truncate">${esc(r.title || '')}</div>
      </td>
      <td class="text-slate-400">${esc(r.repo)}</td>
      <td class="text-slate-400">${esc(formatAuthor(r.author))}</td>
      <td><span class="badge badge-${r.risk_tier}">${r.risk_tier || '-'}</span></td>
      <td class="tabular-nums text-right">${r.combined_score?.toFixed(1) ?? '-'}</td>
      <td><span class="badge badge-${r.decision}">${formatDecision(r.decision)}</span></td>
      <td class="text-xs text-emerald-400 tabular-nums text-right">${formatCost(r.cost_usd)}</td>
      <td class="text-xs tabular-nums text-right">${formatDuration(r.duration_ms)}</td>
      <td class="text-xs text-slate-400 text-right" title="${r.started_at ? new Date(r.started_at).toLocaleString() : ''}">${formatTime(r.started_at)}</td>
    </tr>
  `;
}

// ---- Review Modal ----
function openReviewModal() {
  document.getElementById('review-modal-overlay').classList.remove('hidden');
  document.getElementById('review-pr-url').focus();
}
function closeReviewModal() {
  document.getElementById('review-modal-overlay').classList.add('hidden');
  document.getElementById('review-status').style.display = 'none';
  document.getElementById('review-submit-btn').disabled = false;
  document.getElementById('review-submit-btn').textContent = 'Start Review';
}
document.getElementById('review-modal-overlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('review-modal-overlay')) closeReviewModal();
});

async function submitReview(e) {
  e.preventDefault();
  const url = document.getElementById('review-pr-url').value.trim();
  const postComment = document.getElementById('review-post-comment').checked;
  const btn = document.getElementById('review-submit-btn');
  const status = document.getElementById('review-status');

  btn.disabled = true;
  btn.textContent = 'Reviewing...';
  status.style.display = 'block';
  status.className = 'text-sm mr-auto text-slate-400';
  status.textContent = 'Submitting review request...';

  try {
    const resp = await fetch('/api/review', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pr_url: url, post_comment: postComment }),
    });
    const data = await resp.json();
    if (!resp.ok) {
      status.className = 'text-sm mr-auto text-red-400';
      status.textContent = data.detail || 'Request failed';
      btn.disabled = false;
      btn.textContent = 'Start Review';
      return;
    }
    closeReviewModal();
    document.getElementById('review-form').reset();
    showToast('Review queued');
    loadActiveReviews();
  } catch (err) {
    status.className = 'text-sm mr-auto text-red-400';
    status.textContent = `Error: ${err.message}`;
    btn.disabled = false;
    btn.textContent = 'Start Review';
  }
}

// ---- Filters ----
document.getElementById('filter-decision').addEventListener('change', (e) => {
  currentFilter.decision = e.target.value;
  loadReviews();
});
let repoTimeout;
document.getElementById('filter-repo').addEventListener('input', (e) => {
  clearTimeout(repoTimeout);
  repoTimeout = setTimeout(() => {
    currentFilter.repo = e.target.value;
    loadReviews();
  }, 300);
});

// ---- Helpers ----
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '\u2026' : s;
}

function formatDecision(d) {
  const m = { auto_approve: 'Approved', human_review: 'Human Review', reject: 'Rejected', hard_block: 'Blocked', pending: 'Pending', error: 'Error' };
  return m[d] || d || '-';
}

function showToast(msg, type = 'success') {
  let c = document.getElementById('toast-container');
  if (!c) { c = document.createElement('div'); c.id = 'toast-container'; c.className = 'toast-container'; document.body.appendChild(c); }
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.innerHTML = `<span class="text-sm">${esc(msg)}</span>`;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transform = 'translateY(8px)'; el.style.transition = 'opacity 0.3s, transform 0.3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

function formatAuthor(a) {
  if (!a) return '-';
  const at = a.indexOf('@');
  return at > 0 ? a.substring(0, at) : a;
}

function formatCost(usd) {
  if (!usd) return '-';
  if (usd < 0.01) return `$${usd.toFixed(4)}`;
  if (usd < 1) return `$${usd.toFixed(3)}`;
  return `$${usd.toFixed(2)}`;
}

function formatDuration(ms) {
  if (!ms) return '-';
  if (ms < 1000) return `${ms}ms`;
  const s = ms / 1000;
  if (s < 60) return `${s.toFixed(1)}s`;
  return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return d.toLocaleDateString();
}

function formatElapsed(iso) {
  const d = new Date(iso);
  const ms = Date.now() - d.getTime();
  return formatDuration(Math.max(0, ms));
}

// ---- SSE ----
function connectSSE() {
  const es = new EventSource(`${API}/events`);
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'connected') return;
      loadActiveReviews();
      if (['complete', 'error'].includes(data.stage)) loadReviews();
    } catch {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 5000); };
}

// ---- Keyboard Navigation ----
let focusedRow = -1;

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeReviewModal(); return; }
  // Skip if typing in an input/textarea/select
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  const rows = document.querySelectorAll('#reviews-body tr[onclick]');
  if (!rows.length) return;

  if (e.key === 'j' || e.key === 'ArrowDown') {
    e.preventDefault();
    focusedRow = Math.min(focusedRow + 1, rows.length - 1);
    highlightRow(rows);
  } else if (e.key === 'k' || e.key === 'ArrowUp') {
    e.preventDefault();
    focusedRow = Math.max(focusedRow - 1, 0);
    highlightRow(rows);
  } else if (e.key === 'Enter' && focusedRow >= 0 && focusedRow < rows.length) {
    rows[focusedRow].click();
  }
});

function highlightRow(rows) {
  rows.forEach((r, i) => {
    r.style.outline = i === focusedRow ? '2px solid var(--accent-400)' : '';
    r.style.outlineOffset = i === focusedRow ? '-2px' : '';
  });
  if (rows[focusedRow]) rows[focusedRow].scrollIntoView({ block: 'nearest' });
}

// ---- Init ----
loadReviews();
loadActiveReviews();
connectSSE();
setInterval(loadReviews, 30000);
setInterval(loadActiveReviews, 5000);
</script>
<script src="/static/command-palette.js"></script>
