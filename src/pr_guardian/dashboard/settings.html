<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Settings</title>
<link rel="stylesheet" href="/static/styles.css">
<style>
  /* Hub layout: nav rail + section column. Each section frames a legacy
     single-purpose page via /_embed/settings/* so their existing scripts
     keep working in isolation. */
  .settings-hub {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 24px;
    align-items: start;
  }
  .settings-rail {
    position: sticky;
    top: 70px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 8px 0;
  }
  .settings-rail a {
    display: block;
    padding: 7px 12px;
    border-radius: 6px;
    color: rgb(148, 163, 184);
    font-size: 13px;
    font-weight: 500;
    text-decoration: none;
    border-left: 2px solid transparent;
  }
  .settings-rail a:hover { color: rgb(226, 232, 240); background: rgba(30,41,59,0.5); }
  .settings-rail a.active {
    color: rgb(110, 231, 183);
    border-left-color: rgb(52, 211, 153);
    background: rgba(52,211,153,0.08);
  }
  .rail-sub { display: flex; flex-direction: column; gap: 1px; margin: 2px 0 6px 0; }
  .rail-sub a {
    padding: 5px 12px 5px 24px;
    font-size: 12px;
    color: rgb(100, 116, 139);
  }
  .rail-sub a:hover { color: rgb(203, 213, 225); }
  .settings-section { scroll-margin-top: 60px; }
  .settings-section h2 {
    font-size: 18px; font-weight: 700; color: rgb(241, 245, 249);
    margin: 0 0 6px 0;
  }
  .settings-section p.sub {
    font-size: 12.5px; color: rgb(148, 163, 184); margin: 0 0 16px 0;
  }
  .settings-frame {
    width: 100%;
    height: 900px;
    border: 1px solid rgb(51, 65, 85);
    border-radius: 10px;
    background: rgb(2, 6, 23);
  }
  /* Smaller frames where it makes sense */
  iframe[data-pane="llm"]     { height: 760px; }
  iframe[data-pane="prompts"] { height: 920px; }
  iframe[data-pane="admin"]   { height: 2200px; }
</style>
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<aside id="sidebar"></aside>
<script src="/static/sidebar.js"></script>

<div class="ml-16 lg:ml-64">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <h1 class="text-lg font-semibold text-slate-50">Settings</h1>
    <span class="text-2xs text-slate-500">Admin-only</span>
  </header>

  <div class="max-w-[1100px] mx-auto px-6 py-6">
    <div class="settings-hub">
      <!-- Left rail -->
      <nav class="settings-rail" id="rail">
        <a href="#llm"     data-target="llm" class="active">LLM Provider</a>
        <a href="#prompts" data-target="prompts">Agent Prompts</a>
        <a href="#admin"   data-target="admin">Admin</a>
        <div class="rail-sub" data-parent="admin">
          <a href="#admin" data-iframe-hash="keys"       data-target="admin">API Keys</a>
          <a href="#admin" data-iframe-hash="admins"     data-target="admin">Admins</a>
          <a href="#admin" data-iframe-hash="pats"       data-target="admin">GitHub PATs</a>
          <a href="#admin" data-iframe-hash="exclusions" data-target="admin">Exclusions</a>
        </div>
      </nav>

      <!-- Sections -->
      <div class="space-y-10">

        <section id="llm" class="settings-section">
          <h2>LLM Provider</h2>
          <p class="sub">Choose how PR Guardian connects to Claude.</p>
          <iframe class="settings-frame" data-pane="llm" src="/_embed/settings/llm?embed=1" title="LLM Provider"></iframe>
        </section>

        <section id="prompts" class="settings-section">
          <h2>Agent Prompts</h2>
          <p class="sub">Edit the prompts each review agent runs.</p>
          <iframe class="settings-frame" data-pane="prompts" src="/_embed/settings/prompts?embed=1" title="Agent Prompts"></iframe>
        </section>

        <section id="admin" class="settings-section">
          <h2>Admin</h2>
          <p class="sub">API keys, admins, GitHub PATs, and exclusions.</p>
          <iframe id="admin-frame" class="settings-frame" data-pane="admin" src="/_embed/settings/admin?embed=1" title="Admin"></iframe>
        </section>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  const rail = document.getElementById('rail');
  const links = Array.from(rail.querySelectorAll('a'));
  // Top-level links only (skip sub-anchors which deep-link inside an iframe).
  const topLinks = links.filter(a => !a.hasAttribute('data-iframe-hash'));
  const sections = topLinks
    .map(a => document.getElementById(a.dataset.target))
    .filter(Boolean);

  function activate(id) {
    topLinks.forEach(a => a.classList.toggle('active', a.dataset.target === id));
  }

  function absOffsetTop(el) {
    let y = 0;
    for (let n = el; n; n = n.offsetParent) y += n.offsetTop;
    return y;
  }

  function scrollIframeTo(hash) {
    const frame = document.getElementById('admin-frame');
    if (!frame) return;
    const jump = () => {
      try {
        const doc = frame.contentDocument;
        if (!doc) return false;
        const el = doc.getElementById(hash);
        if (!el) return false;
        // The iframe is laid out at its full height, so internal scrolling is a
        // no-op. Scroll the PARENT page to (iframe offset + element offset).
        const headerOffset = 60; // sticky header height
        const target = absOffsetTop(frame) + absOffsetTop(el) - headerOffset;
        window.scrollTo({ top: target, behavior: 'smooth' });
        return true;
      } catch (_) { return false; }
    };
    if (jump()) return;
    // iframe may still be loading — retry once after load
    frame.addEventListener('load', jump, { once: true });
  }

  // Intersection observer — whichever section's top is nearest the top of
  // the viewport wins the rail highlight.
  const io = new IntersectionObserver((entries) => {
    const visible = entries.filter(e => e.isIntersecting).sort((a, b) => b.intersectionRatio - a.intersectionRatio);
    if (visible.length) activate(visible[0].target.id);
  }, { rootMargin: '-50% 0px -45% 0px', threshold: [0, 0.25, 0.5, 0.75, 1] });
  sections.forEach(s => { if (s) io.observe(s); });

  // Anchor link clicks → smooth-scroll + immediate activation.
  links.forEach(a => a.addEventListener('click', (ev) => {
    ev.preventDefault();
    const id = a.dataset.target;
    const sub = a.getAttribute('data-iframe-hash');
    activate(id);
    if (sub) {
      // Sub-rail: scroll directly to the deep target inside the admin iframe.
      // Don't also scroll to the parent section — the two animations race.
      scrollIframeTo(sub);
      history.replaceState(null, '', `#${id}--${sub}`);
    } else {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
      history.replaceState(null, '', `#${id}`);
    }
  }));

  // If the URL has a hash on load (e.g. /settings#prompts from a legacy
  // redirect), jump there once the iframes have laid out.
  // Supports compound hashes like #admin--admins for iframe deep-links.
  const rawHash = (window.location.hash || '').replace('#', '');
  if (rawHash) {
    const [top, sub] = rawHash.split('--');
    // Legacy hashes (api-keys, admins, pats, exclusions) → admin pane
    const adminAliases = { 'api-keys': 'keys', 'admins': 'admins', 'pats': 'pats', 'exclusions': 'exclusions' };
    let topId = top, subId = sub;
    if (adminAliases[top]) { topId = 'admin'; subId = adminAliases[top]; }
    if (document.getElementById(topId)) {
      setTimeout(() => {
        activate(topId);
        document.getElementById(topId).scrollIntoView({ behavior: 'auto', block: 'start' });
        if (subId) scrollIframeTo(subId);
      }, 50);
    }
  }
})();
</script>

</body>
</html>
