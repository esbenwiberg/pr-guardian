<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian Dashboard</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<aside id="sidebar"></aside>
<script src="/static/sidebar.js"></script>

<!-- Main Content -->
<div class="ml-16 lg:ml-64">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <h1 class="text-sm font-semibold text-slate-50">Dashboard</h1>
  </header>

  <div class="max-w-[1400px] mx-auto p-6">
  <!-- Stats -->
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 gap-4 mb-6" id="stats-grid">
    <a href="/reviews" class="stat-card hover:border-slate-600 transition-colors cursor-pointer">
      <div class="stat-card-label">Total Reviews</div>
      <div class="stat-card-value" id="stat-total">-</div>
    </a>
    <a href="/reviews?decision=auto_approve" class="stat-card hover:border-emerald-400/30 transition-colors cursor-pointer">
      <div class="stat-card-label">Auto-Approved</div>
      <div class="stat-card-value text-emerald-400" id="stat-approved">-</div>
    </a>
    <a href="/reviews?decision=human_review" class="stat-card hover:border-orange-400/30 transition-colors cursor-pointer">
      <div class="stat-card-label">Human Review</div>
      <div class="stat-card-value text-orange-400" id="stat-human">-</div>
    </a>
    <a href="/reviews?decision=hard_block" class="stat-card hover:border-red-400/30 transition-colors cursor-pointer">
      <div class="stat-card-label">Blocked</div>
      <div class="stat-card-value text-red-400" id="stat-blocked">-</div>
    </a>
    <div class="stat-card">
      <div class="stat-card-label">Avg Score</div>
      <div class="stat-card-value" id="stat-avg-score">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Avg Duration</div>
      <div class="stat-card-value" id="stat-avg-duration">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">Avg Cost</div>
      <div class="stat-card-value text-emerald-400" id="stat-avg-cost">-</div>
      <div class="text-xs text-slate-400 mt-1" id="stat-total-cost"></div>
    </div>
  </div>

  <!-- Trend strip: last 20 review decisions -->
  <div class="mb-6" id="trend-section" style="display:none">
    <div class="flex items-center gap-3">
      <span class="text-2xs font-semibold uppercase tracking-wider text-slate-500 shrink-0">Last 20</span>
      <div class="flex gap-0.5 flex-1 h-2 rounded-full overflow-hidden" id="trend-strip"></div>
      <span class="text-2xs text-slate-500 shrink-0 tabular-nums" id="trend-rate"></span>
    </div>
  </div>

  <!-- Active Reviews -->
  <div class="card mb-6" id="active-section">
    <div class="card-header">
      <h2 class="text-base font-semibold">Active Reviews</h2>
      <span class="badge badge-neutral" id="active-count">0 active</span>
    </div>
    <div class="card-body p-0" id="active-list">
      <div class="empty-state"><p class="empty-state-text">No active reviews</p></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <div class="card">
      <div class="card-body">
        <h3 class="text-sm font-semibold mb-4">Decision Distribution</h3>
        <div class="flex items-center gap-6">
          <div class="donut" id="decision-donut"></div>
          <div class="flex flex-col gap-2" id="decision-legend"></div>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <h3 class="text-sm font-semibold mb-4">Risk Tiers</h3>
        <div class="flex flex-col gap-2.5" id="risk-bars"></div>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <div class="card">
      <div class="card-body">
        <h3 class="text-sm font-semibold mb-4">Finding Severity</h3>
        <div class="flex flex-col gap-2.5" id="severity-bars"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <h3 class="text-sm font-semibold mb-4">Top Repositories</h3>
        <div class="flex flex-col gap-2.5" id="repo-bars"></div>
      </div>
    </div>
  </div>

  <!-- Recent Reviews feed -->
  <div class="card mb-6" id="recent-section" style="display:none">
    <div class="card-header flex items-center justify-between">
      <h2 class="text-sm font-semibold">Recent Reviews</h2>
      <a href="/reviews" class="text-2xs text-slate-400 hover:text-slate-200 transition-colors">View all &rarr;</a>
    </div>
    <div class="card-body p-0" id="recent-list"></div>
  </div>

</div>
</div>

<script>
const API = '/api/dashboard';
const STAGES = ['queued', 'discovery', 'mechanical', 'triage', 'agents', 'decision', 'validation', 'complete'];
const TERMINAL_STAGES = ['complete', 'error'];
const DECISION_COLORS = { auto_approve: '#00b894', human_review: '#fdcb6e', reject: '#e17055', hard_block: '#d63031' };
const RISK_COLORS = { trivial: '#00b894', low: '#0984e3', medium: '#fdcb6e', high: '#d63031' };
const SEV_COLORS = { low: '#0984e3', medium: '#fdcb6e', high: '#e17055', critical: '#d63031' };

// State
let sse = null;

// ---- SSE Connection ----
function connectSSE() {
  // Inject SSE status into sidebar footer
  const extra = document.getElementById('sidebar-footer-extra');
  if (extra) {
    extra.innerHTML = '<div class="flex items-center gap-2 px-3 py-1.5"><div class="w-2 h-2 rounded-full bg-slate-500" id="status-dot"></div><span class="text-xs text-slate-400" id="status-label">Connecting...</span></div>';
  }

  sse = new EventSource(`${API}/events`);
  sse.onopen = () => {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    if (dot) dot.style.background = '#34d399';
    if (label) label.textContent = 'Connected';
  };
  sse.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === 'connected') return;
    handleEvent(data);
  };
  sse.onerror = () => {
    const dot = document.getElementById('status-dot');
    const label = document.getElementById('status-label');
    if (dot) dot.style.background = '#f87171';
    if (label) label.textContent = 'Disconnected';
    setTimeout(connectSSE, 5000);
  };
}

function handleEvent(evt) {
  loadActive();
  if (evt.stage === 'complete') {
    loadStats();
  }
}

// ---- Data Loading ----
async function loadStats() {
  try {
    const stats = await fetch(`${API}/stats`).then(r => r.json());
    document.getElementById('stat-total').textContent = stats.total_reviews;
    document.getElementById('stat-approved').textContent = stats.decision_counts.auto_approve || 0;
    document.getElementById('stat-human').textContent = stats.decision_counts.human_review || 0;
    document.getElementById('stat-blocked').textContent = (stats.decision_counts.reject || 0) + (stats.decision_counts.hard_block || 0);
    document.getElementById('stat-avg-score').textContent = stats.avg_score.toFixed(1);
    document.getElementById('stat-avg-duration').textContent = formatDuration(stats.avg_duration_ms);
    document.getElementById('stat-avg-cost').textContent = formatCost(stats.avg_cost_usd);
    document.getElementById('stat-total-cost').textContent = stats.total_cost_usd ? `Total: ${formatCost(stats.total_cost_usd)}` : '';
    renderDecisionDonut(stats.decision_counts, stats.total_reviews);
    renderRiskBars(stats.risk_tier_counts);
    renderSeverityBars(stats.severity_counts);
    renderRepoBars(stats.top_repos);
  } catch (e) {
    console.error('Failed to load stats', e);
  }
}

async function loadActive() {
  try {
    const reviews = await fetch(`${API}/active`).then(r => r.json());
    const el = document.getElementById('active-list');
    const countEl = document.getElementById('active-count');
    countEl.textContent = `${reviews.length} active`;
    if (!reviews.length) {
      el.innerHTML = '<div class="empty-state"><p class="empty-state-text">No active reviews</p></div>';
      return;
    }
    el.innerHTML = reviews.map(r => renderActiveReview(r)).join('');
  } catch (e) {
    console.error('Failed to load active', e);
  }
}

async function cancelReview(id) {
  if (!confirm('Cancel this review?')) return;
  try {
    await fetch(`${API}/reviews/${id}`, { method: 'DELETE' });
    loadActive();
    loadStats();
  } catch (e) {
    console.error('Failed to cancel review', e);
  }
}

// ---- Renderers ----
function renderActiveReview(r) {
  const isError = r.stage === 'error';
  const stageIdx = STAGES.indexOf(r.stage);
  const steps = STAGES.slice(1, -1).map((s, i) => {
    if (isError) return `<div class="step ${(i + 1) <= stageIdx ? 'done' : ''}"></div>`;
    const cls = (i + 1) < stageIdx ? 'done' : (i + 1) === stageIdx ? 'active' : '';
    return `<div class="step ${cls}"></div>`;
  }).join('') + (isError ? '<div class="step error"></div>' : '');
  const elapsed = r.started_at ? formatElapsed(r.started_at) : '';
  return `
    <div class="flex items-center gap-4 px-5 py-4 border-b border-slate-700/50 last:border-b-0 cursor-pointer transition-colors hover:bg-slate-700/40" onclick="window.location='/reviews/${r.id}'">
      <span class="stage-badge stage-${r.stage}">${r.stage}</span>
      <div class="flex-1 min-w-0">
        <div class="font-medium text-sm truncate">${esc(r.title || `PR #${r.pr_id}`)}</div>
        <div class="text-xs text-slate-400 mt-0.5">${esc(r.repo)} &middot; ${esc(r.author)} &middot; ${esc(r.source_branch)} &rarr; ${esc(r.target_branch)}</div>
        <div class="pipeline">${steps}</div>
      </div>
      <div class="text-xs text-slate-400 tabular-nums shrink-0">${elapsed}</div>
      <button class="btn btn-ghost btn-icon btn-xs text-slate-500 hover:text-red-400" title="Cancel review" onclick="event.stopPropagation();cancelReview('${r.id}')">&times;</button>
    </div>
  `;
}

function renderDecisionDonut(counts, total) {
  const el = document.getElementById('decision-donut');
  const legend = document.getElementById('decision-legend');
  if (!total) {
    el.style.background = 'rgb(51 65 85 / 0.5)';
    el.innerHTML = '<div class="donut-hole">0</div>';
    legend.innerHTML = '';
    return;
  }
  const segments = [];
  let cumulative = 0;
  for (const [key, color] of Object.entries(DECISION_COLORS)) {
    const pct = ((counts[key] || 0) / total) * 100;
    segments.push(`${color} ${cumulative}% ${cumulative + pct}%`);
    cumulative += pct;
  }
  el.style.background = `conic-gradient(${segments.join(', ')})`;
  el.innerHTML = `<div class="donut-hole">${total}</div>`;
  legend.innerHTML = Object.entries(DECISION_COLORS).map(([key, color]) =>
    `<div class="flex items-center gap-2 text-sm"><div class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${color}"></div>${formatDecision(key)} (${counts[key] || 0})</div>`
  ).join('');
}

function renderRiskBars(counts) {
  const el = document.getElementById('risk-bars');
  const max = Math.max(1, ...Object.values(counts));
  el.innerHTML = Object.entries(RISK_COLORS).map(([tier, color]) => {
    const c = counts[tier] || 0;
    const pct = (c / max) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${tier}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${c > 0 ? c : ''}</div></div>
        <div class="bar-count">${c}</div>
      </div>
    `;
  }).join('');
}

function renderSeverityBars(counts) {
  const el = document.getElementById('severity-bars');
  const max = Math.max(1, ...Object.values(counts));
  el.innerHTML = Object.entries(SEV_COLORS).map(([sev, color]) => {
    const c = counts[sev] || 0;
    const pct = (c / max) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label">${sev}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${color}">${c > 0 ? c : ''}</div></div>
        <div class="bar-count">${c}</div>
      </div>
    `;
  }).join('');
}

function renderRepoBars(repos) {
  const el = document.getElementById('repo-bars');
  if (!repos || !repos.length) {
    el.innerHTML = '<div class="empty-state py-3"><p class="empty-state-text">No data</p></div>';
    return;
  }
  const max = repos[0].count;
  el.innerHTML = repos.map(r => {
    const pct = (r.count / max) * 100;
    return `
      <div class="bar-row">
        <div class="bar-label" style="width:120px">${esc(truncate(r.repo, 18))}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--accent-400)">${r.count}</div></div>
        <div class="bar-count">${r.count}</div>
      </div>
    `;
  }).join('');
}

// ---- Helpers ----
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n) + '...' : s;
}

function formatDecision(d) {
  const m = { auto_approve: 'Approved', human_review: 'Human Review', reject: 'Rejected', hard_block: 'Blocked', pending: 'Pending', error: 'Error' };
  return m[d] || d || '-';
}

function formatCost(usd) {
  if (!usd) return '-';
  if (usd < 0.01) return `$${usd.toFixed(4)}`;
  if (usd < 1) return `$${usd.toFixed(3)}`;
  return `$${usd.toFixed(2)}`;
}

function formatDuration(ms) {
  if (!ms) return '-';
  if (ms < 1000) return `${ms}ms`;
  const s = ms / 1000;
  if (s < 60) return `${s.toFixed(1)}s`;
  return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return d.toLocaleDateString();
}

function formatElapsed(iso) {
  const d = new Date(iso);
  const ms = Date.now() - d.getTime();
  return formatDuration(Math.max(0, ms));
}

// ---- Trend strip ----
async function loadTrend() {
  try {
    const resp = await fetch(`${API}/reviews?limit=20`);
    if (!resp.ok) return;
    const reviews = await resp.json();
    if (!reviews.length) return;

    document.getElementById('trend-section').style.display = '';
    const strip = document.getElementById('trend-strip');
    const colors = { auto_approve: '#34d399', human_review: '#fb923c', reject: '#f87171', hard_block: '#ef4444' };

    // Show oldest first (left to right = chronological)
    const sorted = [...reviews].reverse();
    strip.innerHTML = sorted.map(r => {
      const c = colors[r.decision] || '#475569';
      const title = `#${r.pr_id} — ${formatDecision(r.decision)}`;
      return `<div class="flex-1 cursor-pointer transition-all hover:scale-y-150" style="background:${c}" title="${esc(title)}" onclick="window.location='/reviews/${r.id}'"></div>`;
    }).join('');

    // Calculate approval rate
    const approved = reviews.filter(r => r.decision === 'auto_approve').length;
    const rate = Math.round((approved / reviews.length) * 100);
    document.getElementById('trend-rate').textContent = `${rate}% auto-approved`;

    // Recent reviews feed (latest 6)
    const recent = reviews.slice(0, 6);
    if (recent.length) {
      document.getElementById('recent-section').style.display = '';
      const borderColors = { auto_approve: '#34d399', human_review: '#fb923c', reject: '#f87171', hard_block: '#ef4444' };
      document.getElementById('recent-list').innerHTML = recent.map(r => {
        const bc = borderColors[r.decision] || 'transparent';
        const author = r.author ? (r.author.indexOf('@') > 0 ? r.author.substring(0, r.author.indexOf('@')) : r.author) : '';
        return `<div class="flex items-center gap-3 px-5 py-3 border-b border-slate-700/30 last:border-b-0 cursor-pointer hover:bg-slate-700/40 transition-colors" style="box-shadow:inset 3px 0 0 ${bc}" onclick="window.location='/reviews/${r.id}'">
          <div class="flex-1 min-w-0">
            <div class="text-sm font-medium truncate">#${esc(r.pr_id)} ${esc(truncate(r.title || '', 50))}</div>
            <div class="text-2xs text-slate-500 mt-0.5">${esc(r.repo)} &middot; ${esc(author)}</div>
          </div>
          <span class="badge badge-${r.decision} shrink-0">${formatDecision(r.decision)}</span>
          <span class="text-2xs text-slate-500 tabular-nums shrink-0 w-16 text-right">${formatTime(r.started_at)}</span>
        </div>`;
      }).join('');
    }
  } catch {}
}

// ---- Init ----
connectSSE();
loadStats();
loadActive();
loadTrend();

// Periodic refresh
setInterval(loadActive, 5000);
setInterval(loadStats, 30000);
</script>
<script src="/static/command-palette.js"></script>
</body>
</html>
