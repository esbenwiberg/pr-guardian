      <span class="hidden lg:block">Reviews</span>

    <a href="/scans" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>

<!-- Main Content -->
<div class="ml-16 lg:ml-64">
  <header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
    <h1 class="text-sm font-semibold text-slate-50">Agent Prompts</h1>
  </header>

  <div class="max-w-[1200px] mx-auto px-6 py-6">
    <div class="card overflow-hidden">
      <div class="flex min-h-[calc(100vh-180px)]">
        <!-- Agent sidebar -->
        <div class="w-[220px] shrink-0 border-r border-slate-700/50 py-3 overflow-y-auto" id="prompt-sidebar">
          <div class="text-center py-10 text-slate-400 text-sm">Loading agents...</div>
        </div>
        <!-- Editor pane -->
        <div class="flex-1 flex flex-col p-5 min-w-0" id="prompt-editor">
          <div class="p-10 text-center text-slate-400">Select an agent to edit its prompt</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="pg-toast" id="toast"></div>

<script>
const API = '/api/dashboard';
let promptData = null;
let activePromptAgent = null;

async function loadPrompts() {
  try {
    promptData = await fetch(`${API}/prompts`).then(r => r.json());
    renderPromptSidebar();
    if (activePromptAgent) {
      const agent = promptData.agents.find(a => a.agent_name === activePromptAgent);
      if (agent) { renderPromptEditorFor(agent); return; }
    }
    if (promptData.agents.length) {
      selectPromptAgent(promptData.agents[0].agent_name);
    }
  } catch (e) {
    console.error('Failed to load prompts', e);
  }
}

function renderPromptSidebar() {
  const el = document.getElementById('prompt-sidebar');
  el.innerHTML = promptData.agents.map(a => `
    <div class="prompt-sidebar-item ${a.agent_name === activePromptAgent ? 'active' : ''}"
         onclick="selectPromptAgent('${a.agent_name}')">
      ${a.is_override ? '<span class="w-1.5 h-1.5 rounded-full bg-yellow-400 shrink-0"></span>' : ''}
      <span>${esc(a.agent_name)}</span>
    </div>
  `).join('');
}

function selectPromptAgent(name) {
  activePromptAgent = name;
  const agent = promptData.agents.find(a => a.agent_name === name);
  if (!agent) return;
  renderPromptSidebar();
  renderPromptEditorFor(agent);
}

function renderPromptEditorFor(agent) {
  const editor = document.getElementById('prompt-editor');
  editor.innerHTML = `
    <div class="flex items-center gap-2.5 mb-3">
      <h3 class="text-[15px] font-semibold">${esc(agent.agent_name)}</h3>
      ${agent.is_override ? '<span class="badge badge-warning badge-sm">CUSTOMIZED</span>' : ''}
      ${agent.updated_at ? `<span class="text-2xs text-slate-400">Updated ${formatTime(agent.updated_at)}</span>` : ''}
    </div>
    <textarea class="form-textarea flex-1 w-full min-h-[320px] font-mono text-xs leading-relaxed resize-y" id="prompt-content">${esc(agent.content)}</textarea>
    <div class="flex items-center gap-2.5 mt-3">
      <button class="btn btn-primary btn-sm" onclick="savePrompt('${agent.agent_name}')">Save</button>
      ${agent.is_override ? `<button class="btn btn-secondary btn-sm" onclick="resetPrompt('${agent.agent_name}')">Reset to Default</button>` : ''}
      <span class="ml-auto text-xs text-slate-400" id="prompt-status"></span>
    </div>
    <div class="mt-3.5 border-t border-slate-700/50 pt-2.5">
      <button class="text-xs text-slate-400 cursor-pointer flex items-center gap-1.5 bg-transparent border-0 p-0 hover:text-slate-200 transition-colors" onclick="togglePromptRef('output-schema-ref')">
        <span class="text-2xs transition-transform duration-200" id="output-schema-ref-arrow">&#9656;</span>
        Output Schema (appended to all agents)
      </button>
      <div class="hidden mt-2 bg-slate-800 border border-slate-700/50 rounded-lg p-3 font-mono text-2xs leading-relaxed text-slate-400 whitespace-pre-wrap max-h-[200px] overflow-y-auto" id="output-schema-ref">${promptData ? esc(promptData.output_schema) : ''}</div>
    </div>
    <div class="mt-2">
      <button class="text-xs text-slate-400 cursor-pointer flex items-center gap-1.5 bg-transparent border-0 p-0 hover:text-slate-200 transition-colors" onclick="togglePromptRef('cross-lang-ref')">
        <span class="text-2xs transition-transform duration-200" id="cross-lang-ref-arrow">&#9656;</span>
        Cross-Language Section (added when 2+ languages)
      </button>
      <div class="hidden mt-2 bg-slate-800 border border-slate-700/50 rounded-lg p-3 font-mono text-2xs leading-relaxed text-slate-400 whitespace-pre-wrap max-h-[200px] overflow-y-auto" id="cross-lang-ref">${promptData ? esc(promptData.cross_language_section) : ''}</div>
    </div>
  `;
}

function togglePromptRef(id) {
  const el = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!el) return;
  if (el.classList.contains('hidden')) {
    el.classList.remove('hidden');
    if (arrow) arrow.innerHTML = '&#9662;';
  } else {
    el.classList.add('hidden');
    if (arrow) arrow.innerHTML = '&#9656;';
  }
}

async function savePrompt(agentName) {
  const content = document.getElementById('prompt-content').value;
  const status = document.getElementById('prompt-status');
  status.textContent = 'Saving...';
  status.className = 'ml-auto text-xs text-slate-400';
  try {
    const resp = await fetch(`${API}/prompts/${agentName}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content }),
    });
    if (!resp.ok) throw new Error('Save failed');
    status.textContent = 'Saved';
    status.className = 'ml-auto text-xs text-emerald-400';
    showToast('Prompt saved', 'success');
    await loadPrompts();
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    status.className = 'ml-auto text-xs text-red-400';
    showToast('Save failed: ' + e.message, 'error');
  }
}

async function resetPrompt(agentName) {
  const status = document.getElementById('prompt-status');
  status.textContent = 'Resetting...';
  status.className = 'ml-auto text-xs text-slate-400';
  try {
    const resp = await fetch(`${API}/prompts/${agentName}`, { method: 'DELETE' });
    if (!resp.ok) throw new Error('Reset failed');
    status.textContent = 'Reset to default';
    status.className = 'ml-auto text-xs text-emerald-400';
    showToast('Prompt reset to default', 'success');
    await loadPrompts();
  } catch (e) {
    status.textContent = `Error: ${e.message}`;
    status.className = 'ml-auto text-xs text-red-400';
    showToast('Reset failed: ' + e.message, 'error');
  }
}

// ---- Helpers ----
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = String(s);
  return d.innerHTML;
}

function formatTime(iso) {
  if (!iso) return '-';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
  return d.toLocaleDateString();
}

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `pg-toast pg-toast-${type} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

// ---- Init ----
loadPrompts();
</script>
</body>
</html>
