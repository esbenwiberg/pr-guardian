<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Guardian — Scans</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-surface-overlay text-slate-50 min-h-screen font-sans antialiased">

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">G</div>
    <span class="text-sm font-semibold text-slate-50 hidden lg:block">PR Guardian</span>
    <span class="ml-auto text-2xs font-mono text-slate-500 hidden lg:block">v0.1</span>
  </div>
  <nav class="sidebar-nav">
    <a href="/dashboard" class="sidebar-item">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25a2.25 2.25 0 0 1-2.25-2.25v-2.25Z"/></svg>
      <span class="hidden lg:block">Dashboard</span>
    </a>
    <a href="/scans" class="sidebar-item active">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
      <span class="hidden lg:block">Scans</span>
    </a>
  </nav>
  <div class="sidebar-footer hidden lg:block">
    <div class="text-2xs text-slate-500 px-3 py-2">PR Guardian v0.1</div>
  </div>
</aside>

<div class="ml-16 lg:ml-64">
<header class="sticky top-0 z-20 flex items-center justify-between h-14 px-8 border-b border-slate-800 bg-slate-900/80 backdrop-blur-md">
  <h1 class="text-sm font-semibold text-slate-50">Scans</h1>
</header>

<div class="max-w-[1200px] mx-auto px-6 py-6">
  <!-- List view -->
  <div id="list-view" class="list-view">
    <div id="stats-row" class="grid grid-cols-4 gap-3 mb-6"></div>

    <div class="flex items-center gap-2.5 mb-4 flex-wrap">
      <select id="filter-type" onchange="loadScans()" class="form-select w-auto">
        <option value="">All Types</option>
        <option value="recent_changes">Recent Changes</option>
        <option value="maintenance">Maintenance</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="openModal()">+ New Scan</button>
    </div>

    <div id="scan-list-loading" class="text-center py-16 text-slate-400 text-sm">Loading scans...</div>
    <div class="card overflow-hidden" id="scan-table-wrapper" style="display:none">
      <table class="data-table" id="scan-table">
        <thead>
          <tr>
            <th>Type</th>
            <th>Repository</th>
            <th>Findings</th>
            <th>Stage</th>
            <th>Cost</th>
            <th>Date</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody id="scan-tbody"></tbody>
      </table>
    </div>
    <div id="scan-empty" class="empty-state py-10" style="display:none">
      <p class="empty-state-text">No scans yet. Start one with the button above.</p>
    </div>
  </div>

  <!-- Detail view -->
  <div id="detail-view" class="hidden">
    <div class="flex items-center gap-4 mb-6">
      <button class="btn btn-secondary btn-sm" onclick="showList()">&larr; Back to Scans</button>
      <h2 class="text-lg font-semibold" id="detail-title">Scan Detail</h2>
    </div>

    <div class="grid grid-cols-4 gap-3 mb-6" id="detail-stats"></div>
    <div id="detail-summary" class="card card-body text-sm leading-relaxed text-slate-400 mb-6" style="display:none"></div>
    <div id="detail-agents"></div>
  </div>
</div>
</div>

<!-- New Scan modal -->
<div id="scan-modal" class="hidden fixed inset-0 z-50">
  <div class="dialog-backdrop" onclick="closeModal()"></div>
  <div class="dialog">
    <div class="dialog-panel max-w-md">
      <div class="dialog-header">
        <h3 class="text-base font-semibold">Start New Scan</h3>
      </div>
      <div class="dialog-body space-y-4">
        <div class="tabs-pills">
          <button class="tab-pill active flex-1 text-center" id="tab-recent" onclick="switchTab('recent')">Recent Changes</button>
          <button class="tab-pill flex-1 text-center" id="tab-maintenance" onclick="switchTab('maintenance')">Maintenance</button>
        </div>

        <div>
          <label class="form-label" for="scan-repo">Repository</label>
          <input id="scan-repo" type="text" class="form-input" placeholder="owner/repo" spellcheck="false">
        </div>

        <div>
          <label class="form-label" for="scan-platform">Platform</label>
          <select id="scan-platform" class="form-select">
            <option value="github">GitHub</option>
            <option value="ado">Azure DevOps</option>
          </select>
        </div>

        <!-- Recent Changes options -->
        <div id="section-recent">
          <label class="form-label" for="scan-days">Time Window (days)</label>
          <input id="scan-days" type="number" class="form-input" value="7" min="1" max="90">
        </div>

        <!-- Maintenance options -->
        <div id="section-maintenance" class="hidden">
          <div class="space-y-4">
            <div>
              <label class="form-label" for="scan-staleness">Staleness Threshold (months)</label>
              <input id="scan-staleness" type="number" class="form-input" value="6" min="1" max="36">
            </div>
            <div>
              <label class="form-label" for="scan-max-files">Max Files</label>
              <input id="scan-max-files" type="number" class="form-input" value="50" min="1" max="200">
            </div>
          </div>
        </div>
      </div>
      <div class="dialog-footer">
        <button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary btn-sm" id="btn-start" onclick="startScan()">Start Scan</button>
      </div>
    </div>
  </div>
</div>

<div class="pg-toast" id="toast"></div>

<script>
const SCAN_ID = location.pathname.match(/\/scans\/([0-9a-f-]+)/)?.[1] || '';
const AGENT_LABELS = {
  trend: 'Trend Analysis',
  consistency: 'Consistency',
  integration_risk: 'Integration Risk',
  architecture_drift: 'Architecture Drift',
  tech_debt: 'Technical Debt',
  security_hygiene: 'Security Hygiene',
  refactor_candidate: 'Refactor Candidates',
  dead_code: 'Dead Code',
};
const TYPE_LABELS = { recent_changes: 'Recent Changes', maintenance: 'Maintenance' };

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Stats ---
async function loadStats() {
  try {
    const resp = await fetch('/api/dashboard/scan-stats');
    const data = await resp.json();
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-card"><div class="stat-card-label">Total Scans</div><div class="stat-card-value">${data.total_scans || 0}</div></div>
      <div class="stat-card"><div class="stat-card-label">Recent Changes</div><div class="stat-card-value">${data.type_counts?.recent_changes || 0}</div></div>
      <div class="stat-card"><div class="stat-card-label">Maintenance</div><div class="stat-card-value">${data.type_counts?.maintenance || 0}</div></div>
      <div class="stat-card"><div class="stat-card-label">Total Cost</div><div class="stat-card-value">$${(data.total_cost_usd || 0).toFixed(4)}</div></div>
    `;
  } catch (e) { console.error('Stats load failed:', e); }
}

// --- Scan List ---
async function loadScans() {
  const typeFilter = document.getElementById('filter-type').value;
  const params = new URLSearchParams({ limit: '50' });
  if (typeFilter) params.set('scan_type', typeFilter);

  try {
    const resp = await fetch(`/api/dashboard/scans?${params}`);
    const scans = await resp.json();
    document.getElementById('scan-list-loading').style.display = 'none';

    if (!Array.isArray(scans) || !scans.length) {
      document.getElementById('scan-empty').style.display = '';
      document.getElementById('scan-table-wrapper').style.display = 'none';
      return;
    }

    document.getElementById('scan-empty').style.display = 'none';
    document.getElementById('scan-table-wrapper').style.display = '';
    document.getElementById('scan-tbody').innerHTML = scans.map(s => `
      <tr>
        <td><span class="type-badge type-${s.scan_type}">${TYPE_LABELS[s.scan_type] || s.scan_type}</span></td>
        <td><a class="text-emerald-400 hover:text-emerald-300 cursor-pointer transition-colors" onclick="loadDetail('${s.id}')">${esc(s.repo)}</a></td>
        <td>${s.total_findings}</td>
        <td><span class="scan-stage-badge scan-stage-${s.stage}">${s.stage}</span></td>
        <td>${s.cost_usd ? '$' + s.cost_usd.toFixed(4) : '-'}</td>
        <td>${s.started_at ? new Date(s.started_at).toLocaleDateString() : '-'}</td>
        <td>${s.duration_ms ? (s.duration_ms / 1000).toFixed(1) + 's' : '-'}</td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('scan-list-loading').style.display = 'none';
    document.getElementById('scan-empty').style.display = '';
    document.getElementById('scan-empty').querySelector('.empty-state-text').textContent = 'No scans yet. Start one with the button above.';
    console.error(e);
  }
}

// --- Detail ---
async function loadDetail(id) {
  try {
    const resp = await fetch(`/api/dashboard/scans/${id}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    if (data.error) throw new Error(data.error);
    renderDetail(data);
    history.pushState(null, '', `/scans/${id}`);
  } catch (e) {
    alert('Failed to load scan: ' + e.message);
  }
}

function renderDetail(d) {
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('hidden');

  const typeLabel = TYPE_LABELS[d.scan_type] || d.scan_type;
  document.getElementById('detail-title').textContent = `${typeLabel} — ${d.repo}`;
  document.title = `PR Guardian — ${typeLabel} Scan`;

  const totalFindings = d.total_findings || 0;
  document.getElementById('detail-stats').innerHTML = `
    <div class="stat-card"><div class="stat-card-label">Type</div><div class="stat-card-value"><span class="type-badge type-${d.scan_type}">${typeLabel}</span></div></div>
    <div class="stat-card"><div class="stat-card-label">Findings</div><div class="stat-card-value">${totalFindings}</div></div>
    <div class="stat-card"><div class="stat-card-label">Duration</div><div class="stat-card-value">${d.duration_ms ? (d.duration_ms / 1000).toFixed(1) + 's' : '-'}</div></div>
    <div class="stat-card"><div class="stat-card-label">Cost</div><div class="stat-card-value">${d.cost_usd ? '$' + d.cost_usd.toFixed(4) : '-'}</div></div>
    <div class="stat-card"><div class="stat-card-label">${d.scan_type === 'recent_changes' ? 'Window' : 'Staleness'}</div><div class="stat-card-value">${d.scan_type === 'recent_changes' ? d.time_window_days + 'd' : d.staleness_months + 'mo'}</div></div>
  `;

  if (d.summary) {
    document.getElementById('detail-summary').style.display = '';
    document.getElementById('detail-summary').textContent = d.summary;
  } else {
    document.getElementById('detail-summary').style.display = 'none';
  }

  const agents = d.agent_results || [];
  if (agents.length) {
    document.getElementById('detail-agents').innerHTML = agents.map((agent, ai) => {
      const label = AGENT_LABELS[agent.agent_name] || agent.agent_name;
      const findings = agent.findings || [];
      return `
        <div class="card mb-4 overflow-hidden">
          <div class="flex items-center gap-2.5 px-5 py-3.5 cursor-pointer select-none hover:bg-slate-700/30 transition-colors" onclick="toggleAgent(${ai})">
            <span class="text-xs text-slate-400 transition-transform duration-150" id="toggle-${ai}">&#x25b6;</span>
            <span class="font-semibold text-sm">${esc(label)}</span>
            <span class="verdict-${agent.verdict} text-2xs font-semibold uppercase px-2 py-0.5 rounded">${agent.verdict}</span>
            <span class="text-xs text-slate-400 ml-auto">${findings.length} finding${findings.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="border-t border-slate-700/50 hidden" id="findings-${ai}">
            ${agent.summary ? `<div class="px-5 py-2.5 text-xs text-slate-400 border-b border-slate-700/50">${esc(agent.summary)}</div>` : ''}
            ${findings.map(f => renderFinding(f)).join('')}
          </div>
        </div>`;
    }).join('');
  } else {
    document.getElementById('detail-agents').innerHTML = '<div class="empty-state py-10"><p class="empty-state-text">No agent results available.</p></div>';
  }
}

function renderFinding(f) {
  const loc = f.file ? `${f.file}${f.line ? ':' + f.line : ''}` : '';
  const effortClass = f.effort_estimate ? `effort-${f.effort_estimate}` : '';
  return `
    <div class="flex items-start gap-3 px-5 py-3 border-b border-slate-700/30 last:border-b-0">
      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="sev-badge sev-${f.severity}">${f.severity}</span>
          <span class="cert-badge">${f.certainty}</span>
          ${loc ? `<span class="text-xs text-emerald-400 font-mono">${esc(loc)}</span>` : ''}
          ${f.category ? `<span class="text-xs text-slate-400">${esc(f.category)}</span>` : ''}
        </div>
        <div class="text-sm mt-1.5 leading-relaxed">${esc(f.description || '')}</div>
        ${f.suggestion ? `<div class="text-xs text-emerald-400 mt-1 pl-3 border-l-2 border-emerald-400">${esc(f.suggestion)}</div>` : ''}
        <div class="text-2xs text-slate-400 mt-1 flex gap-3">
          ${f.priority != null ? `<span>Priority: ${(f.priority * 100).toFixed(0)}%</span>` : ''}
          ${f.effort_estimate ? `<span class="${effortClass}">Effort: ${f.effort_estimate}</span>` : ''}
          ${f.last_modified ? `<span>Last modified: ${f.last_modified.split('T')[0]}</span>` : ''}
        </div>
      </div>
    </div>`;
}

function toggleAgent(ai) {
  const list = document.getElementById(`findings-${ai}`);
  const toggle = document.getElementById(`toggle-${ai}`);
  const isHidden = list.classList.toggle('hidden');
  if (!isHidden) {
    toggle.style.transform = 'rotate(90deg)';
  } else {
    toggle.style.transform = '';
  }
}

function showList() {
  document.getElementById('list-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.add('hidden');
  history.pushState(null, '', '/scans');
}

// --- Modal ---
let currentTab = 'recent';

function openModal() {
  document.getElementById('scan-modal').classList.remove('hidden');
  document.getElementById('scan-repo').focus();
}

function closeModal() {
  document.getElementById('scan-modal').classList.add('hidden');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-recent').classList.toggle('active', tab === 'recent');
  document.getElementById('tab-maintenance').classList.toggle('active', tab === 'maintenance');
  document.getElementById('section-recent').classList.toggle('hidden', tab !== 'recent');
  document.getElementById('section-maintenance').classList.toggle('hidden', tab !== 'maintenance');
  const btn = document.getElementById('btn-start');
  if (tab === 'recent') {
    btn.textContent = 'Start Recent Changes Scan';
  } else {
    btn.textContent = 'Start Maintenance Scan';
  }
}
// init button label
switchTab('recent');

async function startScan() {
  const repo = document.getElementById('scan-repo').value.trim();
  if (!repo) {
    document.getElementById('scan-repo').focus();
    return;
  }

  const platform = document.getElementById('scan-platform').value;
  const btn = document.getElementById('btn-start');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  try {
    let url, body;
    if (currentTab === 'recent') {
      url = '/api/scan/recent';
      body = {
        repo,
        platform,
        time_window_days: parseInt(document.getElementById('scan-days').value) || 7,
      };
    } else {
      url = '/api/scan/maintenance';
      body = {
        repo,
        platform,
        staleness_months: parseInt(document.getElementById('scan-staleness').value) || 6,
        max_files: parseInt(document.getElementById('scan-max-files').value) || 50,
      };
    }

    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });

    if (!resp.ok) {
      const errData = await resp.json().catch(() => ({}));
      throw new Error(errData.detail || `HTTP ${resp.status}`);
    }

    closeModal();
    showToast(`Scan started for ${repo}`, 'success');
    // Refresh list after a short delay to let the scan record appear
    setTimeout(loadScans, 2000);
  } catch (e) {
    showToast('Failed: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    switchTab(currentTab); // restore button text
  }
}

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `pg-toast pg-toast-${type} show`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

// --- SSE: live progress ---
function connectSSE() {
  const es = new EventSource('/api/dashboard/events');
  es.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'connected') return;
      const scanType = data.extra?.scan_type;
      if (!scanType) return;
      // A scan event — refresh the list and stats
      if (data.stage === 'scan_complete' || data.stage === 'scan_error') {
        loadScans();
        loadStats();
        if (data.stage === 'scan_complete') {
          showToast(`Scan complete: ${data.repo} (${data.extra.scan_type})`, 'success');
        } else {
          showToast(`Scan failed: ${data.repo} — ${data.detail}`, 'error');
        }
      } else {
        // In-progress update — refresh list to show stage changes
        loadScans();
      }
    } catch {}
  };
  es.onerror = () => {
    es.close();
    setTimeout(connectSSE, 5000);
  };
}

// Init
loadStats();
if (SCAN_ID) {
  loadDetail(SCAN_ID);
} else {
  loadScans();
}
connectSSE();
</script>
</body>
</html>
