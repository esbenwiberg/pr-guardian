services:
  pr-guardian:
    build:
      context: ../..
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://guardian:${DB_PASSWORD:-guardian}@db:5432/prguardian
      # LLM provider credentials — set in .env file
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT:-}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY:-}
      # Platform credentials
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET:-}
      - ADO_PAT=${ADO_PAT:-}
      - ADO_ORG_URL=${ADO_ORG_URL:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=guardian
      - POSTGRES_PASSWORD=${DB_PASSWORD:-guardian}
      - POSTGRES_DB=prguardian
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guardian -d prguardian"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
